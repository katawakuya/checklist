<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>打ち合わせ議事録アプリ</title>
<style>
:root{
  --green-dark:#1B4332;
  --green-light:#B7D4C0;
  --green-bg:#F1F6F3;
  --navy-dark:#2E4057;
  --navy-light:#C8D8E8;
  --navy-bg:#EEF3F8;
  --accent-blue:#3D5A80;
  --gray-bg:#F8FAFC;
  --border:#D9E1E7;
  --text:#222;
  --check-on:#2E7D32;
  --check-off:#9AA5AE;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:#E9EEF1;color:var(--text);font-family:"Hiragino Sans","Yu Gothic",-apple-system,BlinkMacSystemFont,sans-serif;font-size:16px;-webkit-tap-highlight-color:transparent;}
button, select, input, textarea{font-family:inherit;font-size:16px;}
input, textarea, select{border:1px solid var(--border);border-radius:8px;padding:10px 12px;width:100%;background:#fff;min-height:44px;}
textarea{resize:vertical;min-height:44px;line-height:1.4;}
button{cursor:pointer;min-height:44px;border-radius:8px;border:none;}

/* ---------- Top bar ---------- */
#topbar{position:sticky;top:0;z-index:50;background:#fff;border-bottom:1px solid var(--border);padding:10px 14px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;box-shadow:0 2px 6px rgba(0,0,0,.06);}
#topbar h1{font-size:17px;margin:0 14px 0 0;color:var(--green-dark);white-space:nowrap;}
.tb-btn{padding:10px 14px;background:var(--gray-bg);border:1px solid var(--border);color:var(--text);font-weight:600;}
.tb-btn.primary{background:var(--green-dark);color:#fff;border-color:var(--green-dark);}
.tb-btn.navy{background:var(--navy-dark);color:#fff;border-color:var(--navy-dark);}
#saveStatus{margin-left:auto;font-size:13px;color:#6b7a83;white-space:nowrap;}

/* ---------- Layout ---------- */
#appWrap{max-width:1400px;margin:0 auto;padding:16px;display:flex;flex-direction:column;gap:16px;}
.headerCard{background:#fff;border-radius:14px;border:1px solid var(--border);padding:16px;}
.headerCard h2{margin:0 0 12px 0;font-size:15px;color:#555;}
.fieldGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;}
.field label{display:block;font-size:12px;font-weight:700;color:#666;margin-bottom:4px;}

#panels{display:grid;grid-template-columns:1fr;gap:16px;}
@media(min-width:980px){ #panels{grid-template-columns:1fr 1fr;} }

.panel{background:#fff;border-radius:14px;border:1px solid var(--border);overflow:hidden;}
.panel-head{padding:14px 16px;color:#fff;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.panel-head.green{background:var(--green-dark);}
.panel-head.navy{background:var(--navy-dark);}
.panel-head h2{margin:0;font-size:18px;}
.progressBadge{background:rgba(255,255,255,.18);padding:6px 12px;border-radius:20px;font-size:14px;font-weight:700;}

.panel-body{padding:12px;}

/* accordion section */
.section{border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden;}
.section-head{padding:12px 14px;font-weight:700;display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
.green .section-head{background:var(--green-light);color:var(--green-dark);}
.navy .section-head{background:var(--navy-light);color:var(--navy-dark);}
.section-head .chev{transition:transform .15s;font-size:12px;}
.section.closed .section-head .chev{transform:rotate(-90deg);}
.section.closed .section-body{display:none;}
.section-body{padding:10px 12px;background:#fff;}
.section-badge{font-size:12px;background:#fff;border-radius:12px;padding:2px 9px;font-weight:700;}
.green .section-badge{color:var(--green-dark);}
.navy .section-badge{color:var(--navy-dark);}

/* item row */
.itemRow{display:grid;grid-template-columns:1fr;gap:8px;padding:10px 6px;border-bottom:1px dashed var(--border);}
.itemRow:last-child{border-bottom:none;}
.itemTop{display:flex;justify-content:space-between;align-items:center;gap:8px;}
.itemLabel{font-weight:700;font-size:14px;color:#333;flex:1;}
.itemNo{display:inline-block;min-width:22px;text-align:center;background:var(--navy-dark);color:#fff;border-radius:6px;font-size:12px;padding:2px 5px;margin-right:6px;}
.itemControls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.checkToggle{min-width:52px;height:40px;font-weight:800;font-size:16px;color:#fff;background:var(--check-off);border-radius:8px;padding:0 10px;}
.checkToggle.on{background:var(--check-on);}
.assignSelect{width:110px;min-height:40px;padding:6px 8px;font-size:13px;}
.itemInputWrap textarea, .itemInputWrap input{width:100%;}
.rmBtn{background:none;color:#c0392b;font-size:13px;border:1px solid #eecfcf;padding:6px 10px;min-height:36px;}

/* worker table */
.workerTable{width:100%;border-collapse:collapse;margin-bottom:8px;}
.workerTable th{font-size:12px;color:#666;text-align:left;padding:4px 4px;}
.workerTable td{padding:4px;}
.workerTable input{min-height:40px;padding:8px;}
.workerRow .checkToggle{min-width:44px;height:40px;}

.addBtn{margin-top:6px;background:var(--gray-bg);border:1px dashed var(--border);color:#555;width:100%;padding:10px;font-weight:600;}

/* history modal */
.modalOverlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:100;padding:20px;}
.modalOverlay.show{display:flex;}
.modalBox{background:#fff;border-radius:14px;max-width:640px;width:100%;max-height:80vh;overflow:auto;padding:18px;}
.modalBox h3{margin-top:0;}
.histItem{border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;gap:10px;}
.histItem .info{flex:1;cursor:pointer;}
.histItem .info b{display:block;font-size:15px;}
.histItem .info span{font-size:12px;color:#777;}
.histDel{background:#fdecea;color:#c0392b;padding:8px 10px;font-size:13px;}
.closeModal{margin-top:8px;width:100%;background:var(--gray-bg);border:1px solid var(--border);padding:10px;font-weight:600;}
.emptyHist{color:#888;text-align:center;padding:20px 0;}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:10px 18px;border-radius:20px;font-size:14px;opacity:0;pointer-events:none;transition:opacity .3s;z-index:200;}
.toast.show{opacity:.92;}

@media print{
  #topbar, .addBtn, .rmBtn, .tb-btn{display:none !important;}
  body{background:#fff;}
  #appWrap{padding:0;max-width:100%;}
  .section.closed .section-body{display:block !important;}
  .section.closed .section-head .chev{display:none;}
  .panel, .headerCard, .section{break-inside:avoid;border-color:#999;}
  @page{size:A3 landscape;margin:10mm;}
}
</style>
</head>
<body>

<div id="topbar">
  <h1>📋 打ち合わせ議事録</h1>
  <button class="tb-btn primary" id="btnNew">＋ 新規作成</button>
  <button class="tb-btn" id="btnHistory">🕘 履歴一覧</button>
  <button class="tb-btn navy" id="btnPrint">🖨 PDF保存・印刷</button>
  <button class="tb-btn navy" id="btnExcel">📊 Excel出力</button>
  <span id="saveStatus">—</span>
</div>

<div id="appWrap">

  <div class="headerCard">
    <h2>基本情報</h2>
    <div class="fieldGrid">
      <div class="field"><label>現場名</label><input id="f_siteName" data-path="siteName" placeholder="現場名を入力"></div>
      <div class="field"><label>打合せ日時</label><input id="f_meetingDate" data-path="meetingDate" type="date"></div>
      <div class="field"><label>施工業者</label><input id="f_contractor" data-path="contractor" placeholder="施工業者名"></div>
      <div class="field"><label>施工班</label><input id="f_shikoHan" data-path="shikoHan" placeholder="施工班"></div>
      <div class="field"><label>担当者</label><input id="f_tantosha" data-path="tantosha" placeholder="担当者名"></div>
    </div>
  </div>

  <div id="panels">
    <div class="panel green" id="panelLeft">
      <div class="panel-head green">
        <h2>打ち合わせ議事録</h2>
      </div>
      <div class="panel-body" id="leftBody"></div>
    </div>

    <div class="panel navy" id="panelRight">
      <div class="panel-head navy">
        <h2>打ち合わせ確認事項</h2>
        <span class="progressBadge" id="progressBadge">0 / 0 件確認済み</span>
      </div>
      <div class="panel-body" id="rightBody"></div>
    </div>
  </div>

</div>

<div class="modalOverlay" id="histModal">
  <div class="modalBox">
    <h3>履歴一覧</h3>
    <div id="histList"></div>
    <button class="closeModal" id="closeHist">閉じる</button>
  </div>
</div>

<div class="toast" id="toast">保存しました</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
<script>
/* ========================= データ定義 ========================= */
const ASSIGN_OPTIONS = ["", "元請", "自社", "施工", "未定"];

const sectionsData = [
  { id:'basic', title:'▶ 基本情報', items:[
      {id:'chief', label:'所長・主任・担当', assign:false},

      {id:'tel', label:'現場TEL / FAX', assign:false},
    ], hasWorkers:true, itemsAfter:[
      {id:'orgchart', label:'施工体制台帳・組織図提出状況', assign:true},
    ]},
  { id:'schedule', title:'▶ 工程・図面', items:[
      {id:'process', label:'工程表（全体・3ヶ月）', assign:true},
      {id:'weekly', label:'週間工程・月間工程の確認', assign:true},
      {id:'general_plan', label:'総合仮設計画図', assign:true},
      {id:'crane_plan', label:'揚重機計画図', assign:true},
      {id:'retaining_plan', label:'山留計画図', assign:true},
      {id:'site_map', label:'現場案内図', assign:true},
    ]},
  { id:'transport', title:'▶ 搬出入・車両', items:[
      {id:'route', label:'搬出入ルート', assign:true},
      {id:'time', label:'搬出入時間（申請）', assign:true},
      {id:'tool_time', label:'作業員の道具降ろし時間', assign:true},
      {id:'traffic_rule', label:'車両通行厳守事項', assign:true},
      {id:'vehicle_pass', label:'工事車両用の車両証', assign:true},
    ]},
  { id:'safety', title:'▶ 作業・安全', items:[
      {id:'work_hours', label:'作業時間 / 休日', assign:true},
      {id:'morning', label:'朝礼・新規入場教育　時間', assign:true},
      {id:'emergency', label:'緊急連絡体制（事故・天災時）', assign:true},
      {id:'complaint', label:'苦情窓口の確認', assign:true},
      {id:'parking', label:'駐車場の有無', assign:true},
      {id:'green_site', label:'安全書類 / グリーンサイト', assign:true},
    ]},
  { id:'insurance', title:'▶ 工事・保険', items:[
      {id:'move_in', label:'乗込み予定', assign:true},
      {id:'labor_ins', label:'労災保険', assign:true},
      {id:'sub_adjust', label:'下請け業者との調整事項', assign:true},
    ]},

const checklistData = [
  { id:'kouki', title:'▶ 工期確認', items:[
      {no:1,label:'施工時の交通規制状況'},
      {no:2,label:'余掘りの確認（カッター幅）'},
    ]},
  { id:'zumen', title:'▶ 図面確認', items:[
      {no:3,label:'路盤構成下の使用材確認（埋め戻し使用材）'},
      {no:4,label:'路盤構成確認'},
      {no:5,label:'路盤構成に記載ない場合AS層間乳剤確認'},
      {no:6,label:'瀝青安定処理の仕様確認'},
      {no:7,label:'配管管台の使用条件'},
      {no:8,label:'配管離隔基準'},
      {no:9,label:'桝との離隔確認'},
      {no:10,label:'基準墨・墨出しは元請け合番か'},
      {no:11,label:'写真撮影項目の確認'},
      {no:12,label:'掘削出来形はWLの撮影場所確認。平時、水没時'},
      {no:13,label:'資材保管場所の確認'},
    ]},
  { id:'shorui', title:'▶ 書類確認', items:[
      {no:14,label:'新規書類確認'},
      {no:15,label:'KY活動用紙の確認'},
      {no:16,label:'毎日提出書類の確認'},
    ]},
  { id:'haiki', title:'▶ 廃棄物管理', items:[
      {no:17,label:'最終処分場会社名・住所'},
      {no:18,label:'各所運搬経路確認'},
      {no:19,label:'廃棄物処理委託契約書（多めに入手）'},
      {no:20,label:'マニフェストの運用（電子 or 紙）'},
    ]},
  { id:'sekou', title:'▶ 施工確認', items:[
      {no:21,label:'クレーンの配置'},
      {no:22,label:'高木の伐採・伐根'},
      {no:23,label:'特殊部の分割確認'},
    ]},
  { id:'rule', title:'▶ ルール確認', items:[
      {no:24,label:'作業手順書確認'},
    ]},
];

const DEFAULT_WORKERS = [
  {company:'株式会社型枠屋', name:'佐藤　嘉秀', tel:'090-2727-9654', confirm:''},
  {company:'株式会社型枠屋', name:'三枝　裕太', tel:'090-9290-1004', confirm:''},
  {company:'ｸﾗﾌﾄﾏﾝｼｯﾌﾟ・ﾊﾟｰﾄﾅｰｽﾞ', name:'萩原　一彦', tel:'090-8644-0519', confirm:''},
  {company:'ｸﾗﾌﾄﾏﾝｼｯﾌﾟ・ﾊﾟｰﾄﾅｰｽﾞ', name:'柴田　興平', tel:'080-5704-7075', confirm:''},
  {company:'', name:'', tel:'', confirm:''},
  {company:'', name:'', tel:'', confirm:''},
];

const STORAGE_KEY = 'meetingRecords_v1';
const CURRENT_KEY = 'meetingRecords_current';
let openState = {}; // sectionId -> bool open, persisted per browser only (not per record)

/* ========================= レコード生成 ========================= */
function todayISO(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function buildDefaultRecord(){
  const rec = {
    id: 'rec_'+Date.now(),
    siteName:'', meetingDate: todayISO(), contractor:'', shikoHan:'', tantosha:'',
    sections:{}, checklist:{}, updatedAt: Date.now(),
  };
  sectionsData.forEach(sec=>{
    rec.sections[sec.id] = { items:{}, custom:[] };
    sec.items.forEach(it=> rec.sections[sec.id].items[it.id] = {content:'', confirm:'', assign:''});
    if(sec.itemsAfter) sec.itemsAfter.forEach(it=> rec.sections[sec.id].items[it.id] = {content:'', confirm:'', assign:''});
    if(sec.hasWorkers){
      rec.sections[sec.id].workers = DEFAULT_WORKERS.map(w=>({...w}));
    }
  });
  checklistData.forEach(g=>{
    rec.checklist[g.id] = { items:{}, custom:[] };
    g.items.forEach(it=> rec.checklist[g.id].items[it.no] = {check:'', assign:'', note:''});
  });
  return rec;
}

/* ========================= ストレージ ========================= */
function loadAllRecords(){
  try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }catch(e){ return []; }
}
function saveAllRecords(list){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
}
function getCurrentId(){ return localStorage.getItem(CURRENT_KEY); }
function setCurrentId(id){ localStorage.setItem(CURRENT_KEY, id); }

let currentRecord = null;
let saveTimer = null;

function initRecord(){
  const list = loadAllRecords();
  const curId = getCurrentId();
  let rec = list.find(r=>r.id===curId);
  if(!rec){
    if(list.length>0){
      rec = list.sort((a,b)=>b.updatedAt-a.updatedAt)[0];
    } else {
      rec = buildDefaultRecord();
      list.push(rec);
      saveAllRecords(list);
    }
  }
  setCurrentId(rec.id);
  currentRecord = rec;
}

function persist(showToast){
  currentRecord.updatedAt = Date.now();
  let list = loadAllRecords();
  const idx = list.findIndex(r=>r.id===currentRecord.id);
  if(idx>=0) list[idx] = currentRecord; else list.push(currentRecord);
  saveAllRecords(list);
  document.getElementById('saveStatus').textContent = '保存済み ' + new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
  if(showToast) doToast();
}

function scheduleSave(){
  document.getElementById('saveStatus').textContent = '編集中…';
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>persist(false), 500);
}

function doToast(){
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1400);
}

/* ========================= path util ========================= */
function getDeep(obj, path){
  return path.split('.').reduce((o,k)=> (o==null?undefined:o[k]), obj);
}
function setDeep(obj, path, value){
  const keys = path.split('.');
  let o = obj;
  for(let i=0;i<keys.length-1;i++){ o = o[keys[i]]; }
  o[keys[keys.length-1]] = value;
}

/* ========================= レンダリング ========================= */
function el(tag, attrs={}, children=[]){
  const e = document.createElement(tag);
  for(const k in attrs){
    if(k==='class') e.className = attrs[k];
    else if(k==='html') e.innerHTML = attrs[k];
    else if(k.startsWith('on')) e.addEventListener(k.slice(2), attrs[k]);
    else e.setAttribute(k, attrs[k]);
  }
  (Array.isArray(children)?children:[children]).forEach(c=>{ if(c) e.appendChild(typeof c==='string'?document.createTextNode(c):c); });
  return e;
}

function makeCheckToggle(path, colorClassOn='on'){
  const val = getDeep(currentRecord, path) === '✓';
  const btn = el('button',{class:'checkToggle'+(val?' on':''), type:'button', 'data-path':path});
  btn.textContent = val ? '✓ 確認' : '－ 未';
  btn.addEventListener('click', ()=>{
    const cur = getDeep(currentRecord, path);
    const next = cur==='✓' ? '' : '✓';
    setDeep(currentRecord, path, next);
    btn.classList.toggle('on', next==='✓');
    btn.textContent = next==='✓' ? '✓ 確認' : '－ 未';
    scheduleSave();
    updateProgress();
  });
  return btn;
}

function makeAssignSelect(path){
  const sel = el('select',{class:'assignSelect','data-path':path});
  ASSIGN_OPTIONS.forEach(opt=>{
    const o = el('option',{value:opt}, opt===''?'担当?':opt);
    sel.appendChild(o);
  });
  sel.value = getDeep(currentRecord, path) || '';
  sel.addEventListener('change', ()=>{ setDeep(currentRecord, path, sel.value); scheduleSave(); });
  return sel;
}

function makeTextInput(path, placeholder, multiline){
  const input = el(multiline?'textarea':'input', {class:'', 'data-path':path, placeholder: placeholder||''});
  input.value = getDeep(currentRecord, path) || '';
  input.addEventListener('input', ()=>{ setDeep(currentRecord, path, input.value); scheduleSave(); });
  return input;
}

function renderLeftPanel(){
  const body = document.getElementById('leftBody');
  body.innerHTML = '';
  sectionsData.forEach(sec=>{
    const secState = currentRecord.sections[sec.id];
    const total = sec.items.length + (sec.itemsAfter?sec.itemsAfter.length:0) + secState.custom.length;
    let doneCount = 0;
    sec.items.forEach(it=>{ if(secState.items[it.id].confirm==='✓') doneCount++; });
    if(sec.itemsAfter) sec.itemsAfter.forEach(it=>{ if(secState.items[it.id].confirm==='✓') doneCount++; });
    secState.custom.forEach(c=>{ if(c.confirm==='✓') doneCount++; });

    const isOpen = openState['L_'+sec.id] !== false; // default open
    const wrap = el('div',{class:'section green'+(isOpen?'':' closed')});
    const head = el('div',{class:'section-head'},[
      el('span',{},sec.title),
      el('span',{},[ el('span',{class:'section-badge'}, `${doneCount}/${total}`), el('span',{class:'chev'},'▼') ])
    ]);
    head.addEventListener('click', ()=>{ openState['L_'+sec.id] = wrap.classList.toggle('closed') ? false : true; });
    const bodyDiv = el('div',{class:'section-body'});

    sec.items.forEach(it=> bodyDiv.appendChild(renderLeftItem(sec.id, it)));

    if(sec.hasWorkers){
      bodyDiv.appendChild(renderWorkerTable(sec.id));
    }
    if(sec.itemsAfter) sec.itemsAfter.forEach(it=> bodyDiv.appendChild(renderLeftItem(sec.id, it)));

    secState.custom.forEach((c,idx)=> bodyDiv.appendChild(renderLeftCustomItem(sec.id, idx)));

    const addBtn = el('button',{class:'addBtn', type:'button'}, '＋ 項目を追加');
    addBtn.addEventListener('click', ()=>{
      secState.custom.push({label:'', content:'', confirm:'', assign:''});
      scheduleSave();
      renderLeftPanel();
    });
    bodyDiv.appendChild(addBtn);

    wrap.appendChild(head);
    wrap.appendChild(bodyDiv);
    body.appendChild(wrap);
  });
}

function renderLeftItem(secId, it){
  const base = `sections.${secId}.items.${it.id}`;
  const row = el('div',{class:'itemRow'});
  const top = el('div',{class:'itemTop'},[
    el('span',{class:'itemLabel'}, it.label),
  ]);
  const controls = el('div',{class:'itemControls'});
  controls.appendChild(makeCheckToggle(base+'.confirm'));
  if(it.assign) controls.appendChild(makeAssignSelect(base+'.assign'));
  top.appendChild(controls);
  row.appendChild(top);
  row.appendChild(el('div',{class:'itemInputWrap'}, makeTextInput(base+'.content','内容・回答を入力')));
  return row;
}

function renderLeftCustomItem(secId, idx){
  const base = `sections.${secId}.custom.${idx}`;
  const c = currentRecord.sections[secId].custom[idx];
  const row = el('div',{class:'itemRow'});
  const labelInput = el('input',{placeholder:'項目名', style:'font-weight:700;margin-bottom:4px;'});
  labelInput.value = c.label || '';
  labelInput.addEventListener('input', ()=>{ c.label = labelInput.value; scheduleSave(); });

  const controls = el('div',{class:'itemControls'});
  controls.appendChild(makeCheckToggle(base+'.confirm'));
  controls.appendChild(makeAssignSelect(base+'.assign'));
  const rmBtn = el('button',{class:'rmBtn',type:'button'},'削除');
  rmBtn.addEventListener('click', ()=>{
    currentRecord.sections[secId].custom.splice(idx,1);
    scheduleSave();
    renderLeftPanel();
  });
  controls.appendChild(rmBtn);

  const top = el('div',{class:'itemTop'},[labelInput, controls]);
  row.appendChild(top);
  row.appendChild(el('div',{class:'itemInputWrap'}, makeTextInput(base+'.content','内容・回答を入力')));
  return row;
}

function renderWorkerTable(secId){
  const wrap = el('div',{});
  wrap.appendChild(el('div',{class:'itemLabel', style:'margin:6px 0;'}, '施工担当者'));
  const table = el('table',{class:'workerTable'});
  table.appendChild(el('tr',{},[
    el('th',{style:'width:26%'},'会社'), el('th',{style:'width:26%'},'氏名'), el('th',{style:'width:26%'},'TEL'), el('th',{style:'width:22%'},'確認')
  ]));
  currentRecord.sections[secId].workers.forEach((w, idx)=>{
    const base = `sections.${secId}.workers.${idx}`;
    const tr = el('tr',{class:'workerRow'});
    ['company','name','tel'].forEach(f=>{
      const td = el('td',{});
      td.appendChild(makeTextInput(base+'.'+f, f==='company'?'会社':f==='name'?'氏名':'TEL'));
      tr.appendChild(td);
    });
    const tdc = el('td',{});
    tdc.appendChild(makeCheckToggle(base+'.confirm'));
    tr.appendChild(tdc);
    table.appendChild(tr);
  });
  wrap.appendChild(table);
  return wrap;
}

function renderRightPanel(){
  const body = document.getElementById('rightBody');
  body.innerHTML = '';
  checklistData.forEach(g=>{
    const gState = currentRecord.checklist[g.id];
    const total = g.items.length + gState.custom.length;
    let doneCount = 0;
    g.items.forEach(it=>{ if(gState.items[it.no].check==='✓') doneCount++; });
    gState.custom.forEach(c=>{ if(c.check==='✓') doneCount++; });

    const isOpen = openState['R_'+g.id] !== false;
    const wrap = el('div',{class:'section navy'+(isOpen?'':' closed')});
    const head = el('div',{class:'section-head'},[
      el('span',{},g.title),
      el('span',{},[ el('span',{class:'section-badge'}, `${doneCount}/${total}`), el('span',{class:'chev'},'▼') ])
    ]);
    head.addEventListener('click', ()=>{ openState['R_'+g.id] = wrap.classList.toggle('closed') ? false : true; });
    const bodyDiv = el('div',{class:'section-body'});

    g.items.forEach(it=> bodyDiv.appendChild(renderRightItem(g.id, it)));
    gState.custom.forEach((c,idx)=> bodyDiv.appendChild(renderRightCustomItem(g.id, idx)));

    const addBtn = el('button',{class:'addBtn', type:'button'}, '＋ 確認事項を追加');
    addBtn.addEventListener('click', ()=>{
      const maxNo = getMaxChecklistNo();
      gState.custom.push({no:maxNo+1, label:'', check:'', assign:'', note:''});
      scheduleSave();
      renderRightPanel();
      updateProgress();
    });
    bodyDiv.appendChild(addBtn);

    wrap.appendChild(head);
    wrap.appendChild(bodyDiv);
    body.appendChild(wrap);
  });
  updateProgress();
}

function getMaxChecklistNo(){
  let max = 0;
  checklistData.forEach(g=> g.items.forEach(it=>{ if(it.no>max) max=it.no; }));
  Object.values(currentRecord.checklist).forEach(gs=> gs.custom.forEach(c=>{ if(c.no>max) max=c.no; }));
  return max;
}

function renderRightItem(gId, it){
  const base = `checklist.${gId}.items.${it.no}`;
  const row = el('div',{class:'itemRow'});
  const top = el('div',{class:'itemTop'},[
    el('span',{class:'itemLabel'},[ el('span',{class:'itemNo'}, String(it.no)), it.label ]),
  ]);
  const controls = el('div',{class:'itemControls'});
  const chk = makeCheckToggle(base+'.check');
  controls.appendChild(chk);
  controls.appendChild(makeAssignSelect(base+'.assign'));
  top.appendChild(controls);
  row.appendChild(top);
  row.appendChild(el('div',{class:'itemInputWrap'}, makeTextInput(base+'.note','備考・回答')));
  return row;
}

function renderRightCustomItem(gId, idx){
  const base = `checklist.${gId}.custom.${idx}`;
  const c = currentRecord.checklist[gId].custom[idx];
  const row = el('div',{class:'itemRow'});
  const labelInput = el('input',{placeholder:'確認事項を入力', style:'font-weight:700;margin-bottom:4px;'});
  labelInput.value = c.label || '';
  labelInput.addEventListener('input', ()=>{ c.label = labelInput.value; scheduleSave(); });

  const controls = el('div',{class:'itemControls'});
  controls.appendChild(makeCheckToggle(base+'.check'));
  controls.appendChild(makeAssignSelect(base+'.assign'));
  const rmBtn = el('button',{class:'rmBtn',type:'button'},'削除');
  rmBtn.addEventListener('click', ()=>{
    currentRecord.checklist[gId].custom.splice(idx,1);
    scheduleSave();
    renderRightPanel();
  });
  controls.appendChild(rmBtn);

  const top = el('div',{class:'itemTop'},[
    el('span',{class:'itemLabel'},[ el('span',{class:'itemNo'}, String(c.no)) ]),
    controls
  ]);
  row.appendChild(top);
  row.appendChild(labelInput);
  row.appendChild(el('div',{class:'itemInputWrap'}, makeTextInput(base+'.note','備考・回答')));
  return row;
}

function updateProgress(){
  let total=0, done=0;
  checklistData.forEach(g=>{
    g.items.forEach(it=>{ total++; if(currentRecord.checklist[g.id].items[it.no].check==='✓') done++; });
    currentRecord.checklist[g.id].custom.forEach(c=>{ total++; if(c.check==='✓') done++; });
  });
  document.getElementById('progressBadge').textContent = `${done} / ${total} 件確認済み`;
}

function renderHeaderFields(){
  ['siteName','meetingDate','contractor','shikoHan','tantosha'].forEach(k=>{
    const input = document.getElementById('f_'+k);
    input.value = currentRecord[k] || (k==='meetingDate' ? todayISO() : '');
    input.oninput = ()=>{ currentRecord[k] = input.value; scheduleSave(); refreshHistTitle(); };
  });
}

function refreshHistTitle(){ /* no-op placeholder for future use */ }

function renderAll(){
  renderHeaderFields();
  renderLeftPanel();
  renderRightPanel();
}

/* ========================= 履歴モーダル ========================= */
function openHistory(){
  const list = loadAllRecords().sort((a,b)=>b.updatedAt-a.updatedAt);
  const histList = document.getElementById('histList');
  histList.innerHTML = '';
  if(list.length===0){
    histList.appendChild(el('div',{class:'emptyHist'},'履歴はありません'));
  }
  list.forEach(r=>{
    const item = el('div',{class:'histItem'});
    const info = el('div',{class:'info'},[
      el('b',{}, (r.siteName||'（現場名未入力）') + (r.id===currentRecord.id?'　【編集中】':'')),
      el('span',{}, `${r.meetingDate||''}　${r.contractor||''}　更新: ${new Date(r.updatedAt).toLocaleString('ja-JP')}`)
    ]);
    info.addEventListener('click', ()=>{
      persist(false);
      currentRecord = r;
      setCurrentId(r.id);
      renderAll();
      closeHistory();
    });
    const delBtn = el('button',{class:'histDel',type:'button'},'削除');
    delBtn.addEventListener('click', (e)=>{
      e.stopPropagation();
      if(!confirm('この記録を削除しますか？')) return;
      let all = loadAllRecords().filter(x=>x.id!==r.id);
      saveAllRecords(all);
      if(r.id===currentRecord.id){
        if(all.length>0){ currentRecord = all.sort((a,b)=>b.updatedAt-a.updatedAt)[0]; }
        else { currentRecord = buildDefaultRecord(); saveAllRecords([currentRecord]); }
        setCurrentId(currentRecord.id);
        renderAll();
      }
      openHistory();
    });
    item.appendChild(info);
    item.appendChild(delBtn);
    histList.appendChild(item);
  });
  document.getElementById('histModal').classList.add('show');
}
function closeHistory(){ document.getElementById('histModal').classList.remove('show'); }

function base64ToArrayBuffer(base64){
  const binary = atob(base64);
  const len = binary.length;
  const bytes = new Uint8Array(len);
  for(let i=0;i<len;i++) bytes[i] = binary.charCodeAt(i);
  return bytes.buffer;
}

const LEFT_ROW_MAP = {
  'basic.chief':7, 'basic.staff':8, 'basic.tel':9, 'basic.orgchart':17,
  'schedule.process':19, 'schedule.weekly':20, 'schedule.general_plan':21, 'schedule.crane_plan':22, 'schedule.retaining_plan':23, 'schedule.site_map':24,
  'transport.route':26, 'transport.time':27, 'transport.tool_time':28, 'transport.traffic_rule':29, 'transport.vehicle_pass':30,
  'safety.work_hours':32, 'safety.morning':33, 'safety.emergency':34, 'safety.complaint':35, 'safety.parking':36, 'safety.green_site':37,
  'insurance.move_in':39, 'insurance.labor_ins':40, 'insurance.sub_adjust':41,
};
const WORKER_START_ROW = 11;
const LEFT_CUSTOM_START_ROW = 42;
const LEFT_CUSTOM_MAX_ROW = 63;

const CHECKLIST_ROW_MAP = {1:7,2:8,3:10,4:11,5:12,6:13,7:14,8:15,9:16,10:17,11:18,12:19,13:20,14:22,15:23,16:24,17:26,18:27,19:28,20:29,21:31,22:32,23:33,24:35};
const RIGHT_CUSTOM_START_ROW = 36;
const RIGHT_CUSTOM_MAX_ROW = 63;

function formatDateJP(iso){
  if(!iso) return '';
  const d = new Date(iso+'T00:00:00');
  const days = ['日','月','火','水','木','金','土'];
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${days[d.getDay()]}）`;
}

function writeLeftItem(ws, secId, it){
  const row = LEFT_ROW_MAP[secId+'.'+it.id];
  if(!row) return;
  const d = currentRecord.sections[secId].items[it.id];
  ws.getCell('B'+row).value = d.content || '';
  ws.getCell('E'+row).value = d.confirm || '';
  if(it.assign) ws.getCell('F'+row).value = d.assign || '';
}

async function exportToExcel(){
  if(typeof ExcelJS === 'undefined'){
    alert('Excel出力機能の読み込みに失敗しました。インターネット接続を確認してから、もう一度お試しください。');
    return;
  }
  const btn = document.getElementById('btnExcel');
  const origText = btn.textContent;
  btn.textContent = '出力中…';
  btn.disabled = true;
  try{
    const wb = new ExcelJS.Workbook();
    await wb.xlsx.load(base64ToArrayBuffer(TEMPLATE_BASE64));
    const ws = wb.getWorksheet('A3打ち合わせ');

    ws.getCell('B2').value = currentRecord.siteName || '';
    ws.getCell('B3').value = formatDateJP(currentRecord.meetingDate);
    ws.getCell('B4').value = currentRecord.contractor || '';
    ws.getCell('I2').value = currentRecord.shikoHan || '';
    ws.getCell('I4').value = currentRecord.tantosha || '';

    sectionsData.forEach(sec=>{
      sec.items.forEach(it=> writeLeftItem(ws, sec.id, it));
      if(sec.itemsAfter) sec.itemsAfter.forEach(it=> writeLeftItem(ws, sec.id, it));
    });

    const workers = currentRecord.sections.basic.workers;
    workers.forEach((w, idx)=>{
      const r = WORKER_START_ROW + idx;
      ws.getCell('B'+r).value = w.company || '';
      ws.getCell('C'+r).value = w.name || '';
      ws.getCell('D'+r).value = w.tel || '';
      ws.getCell('E'+r).value = w.confirm || '';
    });

    let leftCustomRow = LEFT_CUSTOM_START_ROW;
    sectionsData.forEach(sec=>{
      currentRecord.sections[sec.id].custom.forEach(c=>{
        if(leftCustomRow > LEFT_CUSTOM_MAX_ROW) return;
        ws.getCell('A'+leftCustomRow).value = c.label || '';
        ws.getCell('B'+leftCustomRow).value = c.content || '';
        ws.getCell('E'+leftCustomRow).value = c.confirm || '';
        ws.getCell('F'+leftCustomRow).value = c.assign || '';
        leftCustomRow++;
      });
    });

    checklistData.forEach(g=>{
      g.items.forEach(it=>{
        const r = CHECKLIST_ROW_MAP[it.no];
        const d = currentRecord.checklist[g.id].items[it.no];
        ws.getCell('J'+r).value = d.check || '';
        ws.getCell('K'+r).value = d.assign || '';
        ws.getCell('L'+r).value = d.note || '';
      });
    });

    let rightCustomRow = RIGHT_CUSTOM_START_ROW;
    checklistData.forEach(g=>{
      currentRecord.checklist[g.id].custom.forEach(c=>{
        if(rightCustomRow > RIGHT_CUSTOM_MAX_ROW) return;
        ws.getCell('H'+rightCustomRow).value = c.no || '';
        ws.getCell('I'+rightCustomRow).value = c.label || '';
        ws.getCell('J'+rightCustomRow).value = c.check || '';
        ws.getCell('K'+rightCustomRow).value = c.assign || '';
        ws.getCell('L'+rightCustomRow).value = c.note || '';
        rightCustomRow++;
      });
    });

    wb.calcProperties.fullCalcOnLoad = true;

    const outBuf = await wb.xlsx.writeBuffer();
    const blob = new Blob([outBuf], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const fname = `打ち合わせ議事録_${currentRecord.siteName||'現場'}_${currentRecord.meetingDate||''}.xlsx`;
    a.href = url;
    a.download = fname;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url), 3000);
  }catch(e){
    console.error(e);
    alert('Excel出力に失敗しました: '+e.message);
  }finally{
    btn.textContent = origText;
    btn.disabled = false;
  }
}

/* ========================= イベント ========================= */
document.getElementById('btnNew').addEventListener('click', ()=>{
  if(!confirm('新しい記録を作成します。現在の内容は履歴に保存されます。よろしいですか？')) return;
  persist(false);
  currentRecord = buildDefaultRecord();
  let list = loadAllRecords();
  list.push(currentRecord);
  saveAllRecords(list);
  setCurrentId(currentRecord.id);
  renderAll();
});
document.getElementById('btnHistory').addEventListener('click', openHistory);
document.getElementById('closeHist').addEventListener('click', closeHistory);
document.getElementById('histModal').addEventListener('click', (e)=>{ if(e.target.id==='histModal') closeHistory(); });
document.getElementById('btnExcel').addEventListener('click', exportToExcel);
document.getElementById('btnPrint').addEventListener('click', ()=>{
  document.querySelectorAll('.section.closed').forEach(s=>s.classList.remove('closed'));
  window.print();
});

/* ========================= 初期化 ========================= */
initRecord();
renderAll();
window.addEventListener('beforeunload', ()=>persist(false));
</script>
