  (function(){
    if(_honNormArr.length === 0) return;
    var _sHon3 = _dynHonBurialSection.items;
    if(_sHon3.some(function(x){ return x._isDynHonNorm; })) return; // 二重挿入防止
    // Step1: 静的 基層転圧・表層転圧・非_isSpecialタックコートを除去
    _dynHonBurialSection.items = _sHon3 = _sHon3.filter(function(x){
      if(x._isSpecial || x._isGfLayer || x._isDynHonNorm) return true;
      var n = x.n || '';
      if(n.indexOf('本復旧') >= 0 && n.indexOf('基層転圧') >= 0) return false;
      if(n.indexOf('本復旧') >= 0 && n.indexOf('表層転圧') >= 0) return false;
      if(n.indexOf('本復旧') >= 0 && n.indexOf('タックコート') >= 0) return false;
      return true;
    });
    // Step2: 挿入位置 = 最後の_isSpecial項目の次 or プライムコートの次
    var insertAt = -1;
    for(var _xi = _sHon3.length - 1; _xi >= 0; _xi--){
      if(_sHon3[_xi]._isSpecial){ insertAt = _xi + 1; break; }
    }
    if(insertAt < 0){
      for(var _pi2 = 0; _pi2 < _sHon3.length; _pi2++){
        if(_sHon3[_pi2].n && _sHon3[_pi2].n.indexOf('プライムコート') >= 0){
          insertAt = _pi2 + 1; break;
        }
      }
    }
    if(insertAt < 0) insertAt = _sHon3.length;
    // 仕上げ系項目（白線・復旧延長・施工後・道路ライン）の手前に収める
    var _finishKW = ['白線', '復旧延長', '施工後', '道路ライン'];
    for(var _qi = insertAt; _qi < _sHon3.length; _qi++){
      var _qn = _sHon3[_qi].n || '';
      if(_finishKW.some(function(kw){ return _qn.indexOf(kw) >= 0; })){ insertAt = _qi; break; }
    }
    // Step3: 通常AS層を深い順（基層→中間層→表層）に動的生成
    var _revNorm = _honNormArr.slice().reverse(); // [最深, ..., 最浅（表層）]
    var _normTotalM = _honNormArr.reduce(function(s,a){ return s + (a.t||0)/1000; }, 0);
    var _normGLBottom = parseFloat(_normTotalM.toFixed(4));
    var _dynNormItems = [];
    _revNorm.forEach(function(layer, idx){
      var isSurface = (idx === _revNorm.length - 1);
      var tMm = Math.round(layer.t || 0);
      var tM  = tMm / 1000;
      var bottomGL = parseFloat(_normGLBottom.toFixed(4));
      _normGLBottom = parseFloat((_normGLBottom - tM).toFixed(4));
      var nm = normalizeMaterialName(layer.name || layer.preset || layer.custom || '');
      if(isSurface){
        _dynNormItems.push({
          n: '本復旧　表層転圧',
          dim: 't＝' + tMm + 'mm',
          note: 'AS表層をローラー（振動ローラーまたはランマー）で転圧している状況を撮影。転圧後の仕上がり面も撮影。スケールで幅を実測・撮影。',
          _isDynHonNorm: true
        });
      } else {
        var itemNm = (idx === 0)
          ? '本復旧　基層転圧'
          : '本復旧　中間層転圧（' + nm + '）';
        var noteStr = (idx === 0)
          ? '粗粒度AS基層をランマーで転圧。転圧後スケールでGL値と幅を実測・撮影。黒板に敷均し・締固め状況と記載。'
          : nm + 'をランマーで転圧。転圧後スケールでGL値と幅を実測・撮影。黒板に敷均し・締固め状況と記載。';
        _dynNormItems.push({
          n: itemNm,
          dim: 'GL-' + bottomGL.toFixed(3) + 'm（t=' + tMm + 'mm）',
          note: noteStr,
          _isDynHonNorm: true
        });
        _dynNormItems.push({
          n: '本復旧　タックコート散布',
          note: '基層面にPK-4乳剤を散布。散布直後の状態で全景を撮影する。',
          _isDynHonNorm: true
        });
      }
    });
    if(_dynNormItems.length > 0){
      _sHon3.splice.apply(_sHon3, [insertAt, 0].concat(_dynNormItems));
    }
  })();

  // 土被りGL（DP入力後にgl:1/2タグで動的表示）→ dim は 'DP=m' のまま

  // TYPE_CHECKLISTSのベースをディープコピーして値を上書き
  // type_import_* キー（Firestoreマスタ由来）は resolveBaseKey がキー内の数字を誤検出する場合がある。
  // type_import_* の場合は resolveBaseKey の結果に関わらず以下の優先順位で型を決定:
  //   ① presetType.ckType（_ckRbMasterToTypeObj が設定）
  //   ② グローバル _typeKey（buildTypeSelect が設定した 85/40 等）
  //   ③ 現場名に「小田原」が含まれる場合は 85型
  //   ④ resolveBaseKey の結果にフォールバック
  var baseKey = (function(){
    var k = resolveBaseKey(presetType.key);
    if (String(presetType.key||'').indexOf('type_import_') === 0) {
      // ① presetType.ckType
      var _ptCk = presetType.ckType || '';
      if (_ptCk && TYPE_CHECKLISTS[_ptCk]) return _ptCk;
      // ② _typeKey（セレクタ選択値のプレフィックス）
      if (_typeKey && _typeKey !== '40' && TYPE_CHECKLISTS[_typeKey]) return _typeKey;
      // ③ 現場名フォールバック
      var _scObj = _sites && _sites.find(function(s){ return s.id === _siteId; });
      var _scName = _scObj ? (_scObj.name || '') : '';
      if (_scName.indexOf('小田原') >= 0 && TYPE_CHECKLISTS['85']) return '85';
    }
    return k;
  })();
  console.log('[CK] buildChecklistFromPreset baseKey='+baseKey+' _typeKey='+_typeKey+' ckType='+(presetType.ckType||'')
    +' rmH='+(presetType.rmH||0)+' totalH='+(presetType.totalH||0)+' asLayers='+(presetType.asLayers||[]).length);
  var base = TYPE_CHECKLISTS[baseKey];
  if(!base){
    // ベースなし: 最低限の構成で返す
    return { sections:[{phase:'施工前・施工中', items:[{n:'施工前状況'}]}], roadbedInfo:roadbedInfo };
  }

  // ディープコピー
  var sections = base.sections.map(function(sec){
    return {
      phase: sec.phase,
      items: sec.items.map(function(item){
        return Object.assign({}, item);
      })
    };
  });

  // ── 値を動的に上書き ──
  sections.forEach(function(sec){
    var _rcIdx = 0, _rmIdx = 0, _simpleRbIdx = 0;
    sec.items.forEach(function(item){
      var n = item.n || '';

      // 舗装厚確認: glType='paveThick' に変更し、仮/本/両方モードで動的表示
      if(n.indexOf('舗装厚確認') >= 0){
        item.glType = 'paveThick';
        item._paveKariH = asTotal;
        item._paveHonH  = (presetType.genkyoAsH && presetType.genkyoAsH > 0) ? presetType.genkyoAsH : asTotal;
        item.dim = ''; // 動的表示のため静的dimは空
      }

      // 路盤構成変更点
      if(n.indexOf('路盤構成変更') >= 0){
        item.dim = 'GL-'+totalH.toFixed(3)+'m';
        item.note = '路盤構成変更箇所（床付けGL）';
      }

      // 土被り確認（DP=）→ glタグが動的表示するため dim はそのまま
      // ただし DP=1.1m などのハードコードがあれば 'DP=m' に正規化
      if(n.indexOf('土被り確認') >= 0){
        item.dim = 'DP=m';
      }

      // RC下層路盤転圧：rcLayersから順番に割り当て
      if(n.indexOf('下層路盤転圧') >= 0){
        if(rcLayers.length > 0){
          var idx = _rcIdx++;
          if(idx < rcLayers.length){
            item.dim = rcLayers[idx].dim;
            item.n   = rcLayers[idx].n;
            item.note = 'ランマーで転圧している状況とスケールで確認している状況を撮影。';
          } else {
            item._remove = true;
          }
        } else {
          item._remove = true; // RC=0の構成なら削除
        }
      }

      // RM上層路盤転圧：rmLayersから順番に割り当て
      if(n.indexOf('上層路盤転圧') >= 0){
        if(rmLayers.length > 0){
          var idx2 = _rmIdx++;
          if(idx2 < rmLayers.length){
            item.dim = rmLayers[idx2].dim;
            item.n   = rmLayers[idx2].n;
            item.note = 'ランマーで転圧している状況とスケールで確認している状況を撮影。';
          } else {
            item._remove = true;
          }
        } else {
          item._remove = true; // RMなし構成なら削除
        }
      }

      // RMのない型で「路盤転圧」の場合（30/20/14型など）
      if(n.indexOf('路盤転圧') >= 0 && n.indexOf('上層')<0 && n.indexOf('下層')<0){
        if(rcLayers.length > 0){
          var idx3 = _simpleRbIdx++;
          if(idx3 < rcLayers.length){
            item.dim = rcLayers[idx3].dim;
            item.n   = rcLayers[idx3].n;
            item.note = 'ランマーで転圧している状況とスケールで確認している状況を撮影。';
          } else {
            item._remove = true;
          }
        } else {
          item._remove = true;
        }
      }

      // 鉄板設置：静的項目は常に_remove（動的挿入で管理）
      if(n.indexOf('鉄板設置') >= 0 && !item._isTeppan){
        item._remove = true;
      }

      // 基層転圧：基層がない場合は削除
      if(n.indexOf('基層転圧') >= 0){
        var _isHonBaseItem = n.indexOf('本復旧') >= 0;
        var _bMm = _isHonBaseItem ? honBaseMm : baseMm;
        if(_bMm > 0){
          var _bGL = _isHonBaseItem
            ? ((_honNormArr.length>0 ? (_honNormArr[0].t||0)/1000 : 0) || (presetType.genkyoAsH && presetType.genkyoAsH>0 ? presetType.genkyoAsH : (asLayers[0]||{t:0.05}).t))
            : asLayers[0].t;
          item.dim = 'GL-'+parseFloat(_bGL).toFixed(3)+'m（基層 t='+_bMm+'mm）';
        } else {
          item._remove = true;
        }
      }

      // タックコート：なければ削除（仮/本復旧で独立判定）
      if(n.indexOf('タックコート') >= 0){
        var _isHonTack = n.indexOf('本復旧') >= 0;
        if(!(_isHonTack ? honHasTack : hasTack)) item._remove = true;
      }

      // プライムコート：なければ削除
      if(n.indexOf('プライムコート') >= 0){
        if(!hasPrime) item._remove = true;
      }
    });

    // _removeフラグの付いた余剰項目を削除
    sec.items = sec.items.filter(function(x){ return !x._remove; });

    // ── extraMaterials（コンクリート・調整層等）転圧項目を挿入 ──
    // RC下層路盤の直後（またはプライムコートの直前）に追加
    if(extraLayers.length > 0){
      // すでに同名のextra項目があれば追加しない
      var hasExtra = sec.items.some(function(x){ return x._isExtra; });
      if(!hasExtra){
        var extraInsertIdx = -1;
        for(var ei=0; ei<sec.items.length; ei++){
          if(sec.items[ei].n && sec.items[ei].n.indexOf('下層路盤転圧')>=0) extraInsertIdx = ei;
          if(sec.items[ei].n && sec.items[ei].n.indexOf('路盤転圧')>=0 && sec.items[ei].n.indexOf('上層')<0 && sec.items[ei].n.indexOf('下層')<0) extraInsertIdx = ei;
        }
        if(extraInsertIdx < 0){
          for(var ei2=0; ei2<sec.items.length; ei2++){
            if(sec.items[ei2].n && sec.items[ei2].n.indexOf('中間転圧')>=0) extraInsertIdx = ei2;
          }
        }
        if(extraInsertIdx >= 0){
          var newExtraItems = extraLayers.map(function(l){
            return {n:l.n, dim:l.dim, note:'ランマーで転圧している状況とスケールで確認している状況を撮影。転圧後に黒板を持った状態でGL値が読めるよう撮影すること。スケールで幅を実測・撮影。黒板に敷均し・締固め状況と記載。【小田原仕様】', _isExtra:true};
          });
          sec.items.splice.apply(sec.items, [extraInsertIdx+1, 0].concat(newExtraItems));
        }
      }
    }

    // ── 鉄板設置項目を挿入（中間転圧＝路盤変更点の直後） ──
    if(hasTeppan){
      var hasTeppanItem = sec.items.some(function(x){ return x._isTeppan; });
      if(!hasTeppanItem){
        // 中間転圧（最後＝路盤変更点）の直後
        var teppanInsertIdx = -1;
        for(var ti=0; ti<sec.items.length; ti++){
          if(sec.items[ti].n && sec.items[ti].n.indexOf('中間転圧')>=0) teppanInsertIdx = ti;
        }
        // 中間転圧がなければ水締めの直後
        if(teppanInsertIdx < 0){
          for(var ti2=0; ti2<sec.items.length; ti2++){
            if(sec.items[ti2].n && sec.items[ti2].n.indexOf('水締め')>=0) teppanInsertIdx = ti2;
          }
        }
        if(teppanInsertIdx >= 0){
          sec.items.splice(teppanInsertIdx+1, 0, {
            n:'仮復旧　鉄板設置',
            dim: (presetType.teppan && presetType.teppan.memo) ? presetType.teppan.memo : '仕様未定',
            note:'鉄板の仕様が確定次第、設置状況を撮影。設置位置・枚数・寸法を黒板に記載して撮影すること。',
            na: !!(presetType.teppan && presetType.teppan.pending),
            _isTeppan:true
          });
        }
      }
    }

    // ── specialAsLayers（瀝青安定処理・既設路盤等）転圧項目を挿入 ──
    // 挿入位置：プライムコートの直前（RC/RM路盤の上、ASの直下）
    if(specialAsLayers.length > 0){
      var hasSpecial = sec.items.some(function(x){ return x._isSpecial; });
      if(!hasSpecial){
        var specialInsertIdx = -1;
        // プライムコートの直前
        for(var si1=0; si1<sec.items.length; si1++){
          if(sec.items[si1].n && sec.items[si1].n.indexOf('プライムコート')>=0){
            specialInsertIdx = si1 - 1;
            break;
          }
        }
        // プライムコートなし → 基層転圧の直前
        if(specialInsertIdx < 0){
          for(var si2=0; si2<sec.items.length; si2++){
            if(sec.items[si2].n && sec.items[si2].n.indexOf('基層転圧')>=0){
              specialInsertIdx = si2 - 1;
              break;
            }
          }
        }
        // それもない → 表層転圧の直前
        if(specialInsertIdx < 0){
          for(var si3=0; si3<sec.items.length; si3++){
            if(sec.items[si3].n && sec.items[si3].n.indexOf('表層転圧')>=0){
              specialInsertIdx = si3 - 1;
              break;
            }
          }
        }
        if(specialInsertIdx >= 0){
          // specialAsLayersのGL計算:
          // actualAsTotal = asLayers(非special)の合計厚 = ASの合計
          // specialは上から順(登録順)に並んでいる（例: 瀝青→既設路盤）
          // topGLをactualAsTotalから下に積み上げていく
          var actualAsTotal = asLayers.reduce(function(s,a){ return s + (a.t||0); }, 0);
          var spStart = actualAsTotal; // AS下端=specialの最上層の上端
          var spItems = [];
          specialAsLayers.forEach(function(sp){
            var topGL = parseFloat(spStart.toFixed(4));
            var dispName = normalizeMaterialName(sp.name) + '転圧';
            compactLayers(topGL, sp.t, dispName).forEach(function(l){
              spItems.push({
                n: l.n, dim: l.dim,
                note: 'ランマーで転圧している状況とスケールで確認している状況を撮影。転圧後に黒板を持った状態でGL値が読めるよう撮影すること。',
                _isSpecial: true
              });
            });
            spStart = parseFloat((spStart + sp.t).toFixed(4)); // 下層へ
          });
          sec.items.splice.apply(sec.items, [specialInsertIdx+1, 0].concat(spItems));
        }
      }
    }

    // ── RM層がある場合、転圧項目を動的に追加 ──
    // 名前置換済み（例: '既設路盤転圧'）の項目も含めて検索
    var rmItems = sec.items.filter(function(x){
      if(!x.n) return false;
      if(x.n.indexOf('上層路盤転圧')>=0) return true;
      return rmLayers.some(function(rl){ return x.n === rl.n; });
    });
    if(rmH > 0 && rmItems.length === 0){
      // ベースにRM項目がない型（30/20/14）にRM層を追加
      var insertIdx = -1;
      for(var ii=0; ii<sec.items.length; ii++){
        if(sec.items[ii].n && sec.items[ii].n.indexOf('下層路盤転圧')>=0) insertIdx = ii;
        if(sec.items[ii].n && sec.items[ii].n.indexOf('プライムコート')>=0){
          if(insertIdx < 0) insertIdx = ii - 1;
          break;
        }
      }
      if(insertIdx >= 0){
        var newRmItems = rmLayers.map(function(l){
          return {n:l.n, dim:l.dim, note:'ランマーで転圧している状況とスケールで確認している状況を撮影。転圧後に黒板を持った状態でGL値が読めるよう撮影すること。スケールで幅を実測・撮影。黒板に敷均し・締固め状況と記載。【小田原仕様】'};
        });
        sec.items.splice.apply(sec.items, [insertIdx+1, 0].concat(newRmItems));
      }
    } else if(rmH > 0 && rmItems.length < rmLayers.length){
      // 既存RM項目が足りない場合は末尾に追加
      var lastRmIdx = -1;
      for(var ii3=0; ii3<sec.items.length; ii3++){
        if(sec.items[ii3].n && (sec.items[ii3].n.indexOf('上層路盤転圧')>=0 || rmLayers.some(function(rl){ return sec.items[ii3].n === rl.n; }))) lastRmIdx = ii3;
      }
      for(var ri4=rmItems.length; ri4<rmLayers.length; ri4++){
        sec.items.splice(lastRmIdx+1+(ri4-rmItems.length), 0,
          {n:rmLayers[ri4].n, dim:rmLayers[ri4].dim, note:'ランマーで転圧している状況とスケールで確認している状況を撮影。転圧後に黒板を持った状態でGL値が読めるよう撮影すること。スケールで幅を実測・撮影。黒板に敷均し・締固め状況と記載。【小田原仕様】'});
      }
    }

    // RC転圧項目数調整（既存より多い場合は追加）
    var rcItems = sec.items.filter(function(x){
      if(!x.n) return false;
      if(x.n.indexOf('下層路盤転圧')>=0) return true;
      if(x.n.indexOf('路盤転圧')>=0&&x.n.indexOf('上層')<0&&x.n.indexOf('下層')<0) return true;
      return rcLayers.some(function(rl){ return x.n === rl.n; });
    });
    if(rcLayers.length > rcItems.length && rcItems.length > 0){
      var lastRcIdx = -1;
      for(var ii2=0; ii2<sec.items.length; ii2++){
        if(sec.items[ii2].n && (sec.items[ii2].n.indexOf('下層路盤転圧')>=0||(sec.items[ii2].n.indexOf('路盤転圧')>=0&&sec.items[ii2].n.indexOf('上層')<0&&sec.items[ii2].n.indexOf('下層')<0)||rcLayers.some(function(rl){ return sec.items[ii2].n===rl.n; }))){
          lastRcIdx = ii2;
        }
      }
      for(var ri3=rcItems.length; ri3<rcLayers.length; ri3++){
        sec.items.splice(lastRcIdx+1+(ri3-rcItems.length), 0,
          {n:rcLayers[ri3].n, dim:rcLayers[ri3].dim, note:'ランマーで転圧している状況とスケールで確認している状況を撮影。転圧後に黒板を持った状態でGL値が読めるよう撮影すること。スケールで幅を実測・撮影。黒板に敷均し・締固め状況と記載。【小田原仕様】'});
      }
    }
  });

  return { sections: sections, roadbedInfo: roadbedInfo, _dynHonBurial: _dynHonBurialSection };
}

// typeKeyからTYPE_CHECKLISTSの対応キーを取得
function resolveBaseKey(typeKey){
  if(!typeKey) return '40';
  var clean = String(typeKey).replace('dyntype_','');
  if(TYPE_CHECKLISTS[clean]) return clean;
  // 型名に数字が含まれていれば照合
  for(var i=0;i<TYPE_MAP.length;i++){
    if(TYPE_MAP[i].re.test(clean)) return TYPE_MAP[i].key;
  }
  return '40'; // デフォルト
}

var _siteId = '';
var _typeKey = '';
var _kojiKbn = 'kari';     // 'kari' | 'hon'
var _kussuri_kbn = 'kari'; // 'kari' | 'hon' | 'both'  掘削路盤確認モード
var _presetTypeKey = '';  // プリセット型の元キー（type_XXXXX等）
var _sites = [];
var _checks = {};   // {itemKey: bool}
var _naItems = {};  // {itemKey: bool} 対象外
var _subChecks = {}; // {subChkKey: bool} DP個別チェック（土被り・水締め複数DP用）
var _hataEntry = null;
var _gl1 = ''; var _gl2 = '';
var _pipeCount = 1;            // 表示中の管種行数（1 or 2）
var _pipeTypes = ['通信管', '電力管', '', '']; // 各行の管種名
var _pipeCustomNames = ['', '', '', '']; // 「その他」選択時のフリー入力名

function loadSites(){
  // v20との共有キー: 'site_master' (v20では getSites() が site_master を使用)
  // フォールバックとして 'sites' も確認
  try{
    var raw = localStorage.getItem('site_master') || localStorage.getItem('sites') || '[]';
    _sites = JSON.parse(raw);
  }catch(e){ _sites=[]; }
  var sel = document.getElementById('selSite');
  sel.innerHTML = '<option value="">── 現場を選択 ──</option>';
  _sites.forEach(function(s){
    var o = document.createElement('option');
    o.value = s.id; o.textContent = s.name;
    sel.appendChild(o);
  });
  var lastSite = localStorage.getItem('cl_last_site');
  if(lastSite && _sites.find(function(s){return s.id===lastSite;})){
    sel.value = lastSite; onSiteChange(true);
  } else {
    // 現場未選択でもデフォルト5型を表示
    buildTypeSelect('');
    renderMain();
  }
}

    var t1 = subChkSpan('pave_kari', '<span class="tag tag-blue">t＝'+kariH.toFixed(3)+'m（仮復旧）</span>');

function onSiteChange(silent){
  _siteId = document.getElementById('selSite').value;
  var typeRow = document.getElementById('typeRow');
  typeRow.style.display = 'flex'; // 常に型選択を表示

  var badge = document.getElementById('linkedBadge');
  var v20site = localStorage.getItem('current_site_id');
  badge.style.display = (_siteId && _siteId===v20site) ? '' : 'none';

  if(_siteId){
    localStorage.setItem('cl_last_site', _siteId);
  }
  // 旗揚げマスタ・路盤マスタを Firestore から並列ロードしてから UI を更新
  var _syncDone = 0;
  function _onBothSynced() {
    _syncDone++;
    if(_syncDone < 2) return; // 両方完了待ち
    // 現場切替後に road_presets の honFreeRows 欠落を再補完（110型など対応）
    try { _ckEnrichPresetsFromMasters(); } catch(e) {}
    buildTypeSelect(_siteId);
    if(!silent){ _checks={}; _naItems={}; _subChecks={}; }
    restoreState();
    renderMain();
    if(_pendingSlope){
      var _ps = _pendingSlope; _pendingSlope = null;
      var _applied = false;
      Object.keys(_ps).forEach(function(id){ if(_ps[id]){ sv(id, _ps[id]); _applied=true; } });
      if(_applied) recalcGL();
    }
  }
  fbSyncHataMasterForSite(_siteId, _onBothSynced);
  fbSyncRoadbedMasterForSite(_siteId, _onBothSynced);
}

function buildTypeSelect(siteId){
  var site = _sites.find(function(s){return s.id===siteId;});
  var sel = document.getElementById('selType');
  sel.innerHTML = '<option value="">── 型を選択 ──</option>';

  // v20のデータ構造: sites[].presetId → road_presets[].types[].{key,label}
  // または sites[].types (旧形式)
  var types = null;
  // 現場名から小田原仕様を自動検出（Firestoreマスタのkeyがrb_xxxxx形式で型番を含まない場合のフォールバック）
  var _siteNameForCk = site ? (site.name || '') : '';

  // 0) roadbed_masters_{siteId} を最優先（明示的に登録済みのデータが最新）
  if(!types && siteId){
    try{
      var _rbRawPri = localStorage.getItem('roadbed_masters_'+siteId);
      var _rbMastersPri = _rbRawPri ? JSON.parse(_rbRawPri) : null;
      if(_rbMastersPri && _rbMastersPri.length){
        types = _rbMastersPri.map(function(m){
          // ckType: 保存値 → キーにodawaraを含む場合は'85' → 現場名に小田原を含む場合は'85' → フォールバック
          var inferredCk = m.ckType
            || ((m.key||'').toLowerCase().indexOf('odawara')>=0 ? '85' : '')
            || (_siteNameForCk.indexOf('小田原') >= 0 ? '85' : '');
          return { key: m.key||m.label, name: m.label||m.key, ckType: inferredCk };
        });
      }
    }catch(e){}
  }

  // 1) site.types が直接ある場合（旧形式）
  if(!types && site && site.types && site.types.length){
    types = site.types;
  }

  // 2) site.presetId → road_presetsを参照（v20の現行形式・フォールバック）
  if(!types && site && site.presetId){
    try{
      var presetsRaw = localStorage.getItem('road_presets');
      var presets = presetsRaw ? JSON.parse(presetsRaw) : [];
      // アーカイブ（環状2号線）も含めて探す
      var archiveRaw = localStorage.getItem('kanjyo2_preset');
      if(archiveRaw){ try{ presets.unshift(JSON.parse(archiveRaw)); }catch(e){} }
      var preset = presets.find(function(p){ return p.id===site.presetId; });
      // アーカイブはIDがkanjyo2_archiveなど固定の場合も対応
      if(!preset){
        preset = presets.find(function(p){ return p.isArchive; });
      }
      if(preset && preset.types && preset.types.length){
        // road_presetsのtypesは {key, label, ...} 形式
        types = preset.types.map(function(t){
          return { key: t.key||t.label, name: t.label||t.key };
        });
      }
    }catch(e){}
  }

  // 3) roadbed_masters_{siteId} または roadbed_masters から登録済みマスタを読む
  if(!types || !types.length){
    try{
      var _rbRaw = siteId
        ? (localStorage.getItem('roadbed_masters_'+siteId) || localStorage.getItem('roadbed_masters'))
        : localStorage.getItem('roadbed_masters');
      var _rbMasters = _rbRaw ? JSON.parse(_rbRaw) : null;
      if(!_rbMasters || !_rbMasters.length){
        // グローバルキーもフォールバック
        var _rbRaw2 = localStorage.getItem('roadbed_masters');
        _rbMasters = _rbRaw2 ? JSON.parse(_rbRaw2) : null;
      }
      if(_rbMasters && _rbMasters.length){
        types = _rbMasters.map(function(m){
          var inferredCk = m.ckType
            || ((m.key||'').toLowerCase().indexOf('odawara')>=0 ? '85' : '')
            || (_siteNameForCk.indexOf('小田原') >= 0 ? '85' : '');
          return { key: m.key||m.label, name: m.label||m.key, ckType: inferredCk };
        });
      }
    }catch(e){}
  }

  // 4) どこにもなければデフォルト5型
  if(!types || !types.length){
    types = [
      {key:'85',name:'車道部 85型'},{key:'40',name:'車道/乗入れ 40型'},
      {key:'30',name:'歩道/乗入れ 30型'},{key:'20',name:'歩道/乗入れ 20型'},
      {key:'14',name:'歩道部 14型'}
    ];
  }
  types.forEach(function(t){
    var o = document.createElement('option');
    // TYPE_CHECKLISTSの対応キー: 明示的ckType → resolveTypeKey推定
    var ck = t.ckType || resolveTypeKey(t.key||t.name);
    // value: 「ckKey|presetOrigKey|labelName」の3パート構成
    // → getPresetTypeDataでpresetOrigKeyを使ってプリセット型を正確に取得
    var origKey = t.key || t.name || '';
    o.value = ck+'|'+origKey+'|'+(t.name||t.key);
    o.textContent = t.name||t.key;
    sel.appendChild(o);
  });

  var lastType = localStorage.getItem('cl_last_type_'+siteId);
  if(lastType){
    sel.value = lastType;
    // ckKeyが変わった場合（例: "40|rb_xxx|NO5" → "85|rb_xxx|NO5"）: ラベル名で再マッチ
    if(!sel.value && lastType.indexOf('|') >= 0){
      var _lastName = lastType.split('|').pop();
      for(var oi=0; oi<sel.options.length; oi++){
        var _ov = sel.options[oi].value;
        if(_ov && _ov.split('|').pop() === _lastName){
          sel.value = _ov;
          break;
        }
      }
    }
  }
  onTypeChange(true);
}

function resolveTypeKey(nameOrKey){
  if(!nameOrKey) return '40';
  var s = String(nameOrKey);
  if(TYPE_CHECKLISTS[s]) return s;
  // 数字のみ
  if(TYPE_CHECKLISTS[s.trim()]) return s.trim();
  // 型マップで照合（全角数字・半角数字どちらも）
  var normalized = s.replace(/[０-９]/g, function(c){ return String.fromCharCode(c.charCodeAt(0)-0xFEE0); });
  for(var i=0;i<TYPE_MAP.length;i++){
    if(TYPE_MAP[i].re.test(normalized)) return TYPE_MAP[i].key;
  }
  return '40';
}

function onTypeChange(silent){
  var val = document.getElementById('selType').value;
  if(!val){ _typeKey=''; _presetTypeKey=''; if(!silent) renderMain(); return; }
  var parts = val.split('|');
  _typeKey = parts[0];                          // TYPE_CHECKLISTSキー（85/40等）
  _presetTypeKey = parts.length>=3 ? parts[1] : parts[0]; // プリセット元キー
  if(_siteId) localStorage.setItem('cl_last_type_'+_siteId, val);
  // 型変更時に旗揚げ番号を維持するため、変更前の値を退避
  var _savedHataVal = !silent ? ($v('hataInput') || '').trim() : '';
  if(!silent){ _checks={}; _naItems={}; _subChecks={}; restoreState(); }
  // 小田原型自動検出：型キー/型名/現場名に「odawara」「小田原」が含まれる場合は自動ON
  (function(){
    var selEl = document.getElementById('selType');
    var optText = (selEl && selEl.options[selEl.selectedIndex]) ? (selEl.options[selEl.selectedIndex].textContent || '') : '';
    var siteObj = _sites.find(function(s){ return s.id === _siteId; });
    var siteName = siteObj ? (siteObj.name || '') : '';
    var isOdawara = val.toLowerCase().indexOf('odawara') >= 0
                 || _typeKey.toLowerCase().indexOf('odawara') >= 0
                 || optText.indexOf('小田原') >= 0
                 || siteName.indexOf('小田原') >= 0;
    _showOdawara = isOdawara;
    var odaChk = document.getElementById('chkOdawaraGlobal');
    if(odaChk) odaChk.checked = _showOdawara;
  })();
  renderMain();
  // 型変更時: 旗揚げ番号を復元してloadHataで再検索
  if(!silent && _savedHataVal){
    var _hataElRestore = document.getElementById('hataInput');
    if(_hataElRestore){ _hataElRestore.value = _savedHataVal; loadHata(); }
  }
  // pendingSlope が onTypeChange 経路でセットされた場合も適用
  if(_pendingSlope){
    var _ps2 = _pendingSlope; _pendingSlope = null;
    Object.keys(_ps2).forEach(function(id){ if(_ps2[id]) sv(id, _ps2[id]); });
  }
}

function saveState(){
  if(!_siteId||!_typeKey) return;
  var data = {
    date:$v('inDate'),mgmt:$v('inMgmtNo'),rec:$v('inRecorder'),
    dp1:$v('inDP1'),dp2:$v('inDP2'),dph:$v('inDPH'),dph2:$v('inDPH2'),dp3:$v('inDP3'),dph3:$v('inDPH3'),dp4:$v('inDP4'),dph4:$v('inDPH4'),bh:$v('inBH'),extra:$v('inExtra'),pipeCount:_pipeCount,pipeTypes:_pipeTypes,pipeCustomNames:_pipeCustomNames,showDummy:_showDummy,pipeGradient:_pipeGradient,
    dp1s:$v('inDP1s'),dph1s:$v('inDPH1s'),dp2s:$v('inDP2s'),dph2s:$v('inDPH2s'),dp3s:$v('inDP3s'),dph3s:$v('inDPH3s'),dp4s:$v('inDP4s'),dph4s:$v('inDPH4s'),
    hata:$v('hataInput'),checks:_checks,na:_naItems,subChecks:_subChecks,kojiKbn:_kojiKbn,kussKbn:_kussuri_kbn
  };
  localStorage.setItem(storeKey(), JSON.stringify(data));
}
function restoreState(){
  var raw = localStorage.getItem(storeKey());
  if(!raw) return;
  try{
    var d = JSON.parse(raw);
    sv('inDate',d.date); sv('inMgmtNo',d.mgmt); sv('inRecorder',d.rec);
    if(d.pipeCount) _pipeCount = d.pipeCount;
    if(d.pipeTypes) _pipeTypes = d.pipeTypes;
    if(d.pipeCustomNames) _pipeCustomNames = d.pipeCustomNames;
    if(d.showDummy   !== undefined) _showDummy   = d.showDummy;
    if(d.showOdawara !== undefined) _showOdawara = d.showOdawara;
    if(d.pipeGradient !== undefined) _pipeGradient = d.pipeGradient;
    // 勾配②端DP値をDOM生成後（renderMain後）に適用するため仮保存
    _pendingSlope = {
      inDP1s:d.dp1s||'', inDPH1s:d.dph1s||'',
      inDP2s:d.dp2s||'', inDPH2s:d.dph2s||'',
      inDP3s:d.dp3s||'', inDPH3s:d.dph3s||'',
      inDP4s:d.dp4s||'', inDPH4s:d.dph4s||''
    };
    // GL計算欄・旗揚げ番号は起動時にクリア（前回の情報を引き継がない）
    ['inDP1','inDP2','inDPH','inDPH2','inBH','inExtra'].forEach(function(id){
      var el=document.getElementById(id); if(el) el.value='';
    });
    var hataEl = document.getElementById('hataInput');
    if(hataEl) hataEl.value = '';
    _hataEntry = null;
    closeDiagram();
    _checks = d.checks||{}; _naItems = d.na||{}; _subChecks = d.subChecks||{};
    if(d.kojiKbn)  _kojiKbn     = d.kojiKbn;
    if(d.kussKbn)  _kussuri_kbn = d.kussKbn;
  }catch(e){}
}
function $v(id){ var el=document.getElementById(id); return el?el.value:''; }
function sv(id,v){ var el=document.getElementById(id); if(el&&v!==undefined&&v!==null&&v!=='') el.value=v; }

function renderMain(){
  // プリセットから動的チェックリストを取得（あれば優先使用）
  // _presetTypeKey（プリセット元キー）を優先して正確に型を取得
  var _presetType = getPresetTypeData(_siteId, _typeKey, _presetTypeKey);
  var _dynChecklist = _presetType ? buildChecklistFromPreset(_presetType) : null;
  var ck = _dynChecklist ? _dynChecklist : TYPE_CHECKLISTS[_typeKey];

  // 仮復旧路盤が未登録（totalH=0）かつ本復旧路盤がある場合は自動で本復旧タブを選択
  // ただしユーザーが明示的に仮復旧を選んでいた場合（前回保存）はそちらを尊重しない
  // → 保存時に kojiKbn が 'kari' のまま残るケースは「本復旧のみ」構成と見なして自動切替
  if (_presetType && _kojiKbn === 'kari') {
    var _kariTotal = (_presetType.totalH || 0);
    var _honHasData = (_presetType.genkyoRC||0) > 0 || (_presetType.genkyoRM||0) > 0
                   || (_presetType.genkyoAsH||0) > 0 || (_presetType.genkyoTotalH||0) > 0;
    if (_kariTotal === 0 && _honHasData) {
      _kojiKbn = 'hon';
    }
  }

  var html = '<main>';

  // 基本情報パネル（最上部）
  html += '<div class="input-panel">' +
    '<div class="panel-title">基本情報</div>' +
    '<div class="field-row c2">' +
      '<div class="field"><label>作業日</label><input type="date" id="inDate" onchange="saveState()"></div>' +
      '<div class="field"><label>管理番号</label><input type="text" id="inMgmtNo" placeholder="例: K-12" onchange="saveState()"></div>' +
    '</div>' +
    '<div class="field-row c2">' +
      '<div class="field"><label>記録者</label><input type="text" id="inRecorder" placeholder="氏名" onchange="saveState();_saveRecorderName(this.value)"></div>' +
    '</div>' +
    '<div class="field-row" style="margin-top:4px">' +
      '<div class="field">' +
        '<label>施工区分</label>' +
        '<div class="seg-wrap">' +

  if(ck){
    // GL計算パネル（動的管種セレクタ）
    html += renderGLPanel();
    html += '<button class="btn-calc" onclick="recalcGL()">▶ 計算してリストを更新</button>';

    // 路盤構成 簡易表示＋詳細ボタン（orderの表示と統一・写真は層ごとに撮るため層数を明示／計算リストの直下に表示）
    var _rbInfo = (_dynChecklist && _dynChecklist.roadbedInfo) ? _dynChecklist.roadbedInfo : _ckArchiveRoadbedInfo(_typeKey);
    if(_rbInfo){
      var rb = _rbInfo;
      var _rbDiffers = (rb._differs !== undefined) ? rb._differs : _ckKariHonDiffers(_presetType);
      var _rbTitle = _rbDiffers ? '仮復旧・路盤先行 構成（固定値）' : '路盤構成';
      var _asDesc = rb.asLayers.map(function(a){ return a.name+' t='+Math.round(a.t*1000)+'mm'; }).join(' ／ ');
      var _noticeParts = [];
      if(_asDesc) _noticeParts.push(_asDesc);

      if(rb.rcH>0) _noticeParts.push('<span style="color:#059669;font-weight:700;">'+(rb.rcLabel||'RC-'+rb.rcSize)+' '+ckLayerCompactStr(rb._kariRC_layers, rb.rcH*1000)+'</span>');
      (rb.extraMaterials||[]).forEach(function(em){

      });
      if(rb.teppan&&rb.teppan.use) _noticeParts.push('<span style="color:#b45309;font-weight:700;">🔩 鉄板'+(rb.teppan.pending?'（仕様未定）':'')+'</span>');
      var _rbDetailId = 'ckRbDetail_'+((_presetType&&_presetType.key)||_typeKey||'x');
      // 詳細パネル用チップ生成（仮復旧／現況・本復旧 共通フォーマット・orderのbuildRoadbedChipsに準拠）
      var _ckRbAsChip = function(name, tmm){
        return '<div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:7px;padding:8px 12px;"><div style="font-size:13px;color:#1e40af;margin-bottom:3px;">'+name+'</div><div style="font-weight:700;font-size:16px;color:#2563eb;font-family:monospace;">t = '+tmm+'mm</div></div>';
      };
      var _ckRbRmcChip = function(label, val, tone){
        var bg = (tone==='hon') ? '#ede9fe' : '#d1fae5';
        var bd = (tone==='hon') ? '#ddd6fe' : '#a7f3d0';
        var lc = (tone==='hon') ? '#5b21b6' : '#065f46';
        var vc = (tone==='hon') ? '#7c3aed' : '#059669';
        return '<div style="background:'+bg+';border:1px solid '+bd+';border-radius:7px;padding:8px 12px;"><div style="font-size:13px;color:'+lc+';margin-bottom:3px;">'+label+'</div><div style="font-weight:700;font-size:16px;color:'+vc+';font-family:monospace;">'+val+'</div></div>';
      };
      // 🔧 仮復旧（路盤先行）側チップ：AS層 → 上層路盤工RM → 下層路盤工RC
      var _kariChips = [];

      if(rb.rmH>0) {
        var _kariRmChipLabel = (rb.rmLabel && !String(rb.rmLabel).startsWith('RM-')) ? rb.rmLabel : ('上層路盤工 RM-'+rb.rmSize);

      // 🏗 現況・本復旧側チップ：honAsLayersが無い場合はgenkyoAsHから単層フォールバック
      var _honAsArr = (rb.honAsLayers && rb.honAsLayers.length) ? rb.honAsLayers
        : ((rb.genkyoAsH||0) > 0 ? [{name:'AS混合物', t: Math.round(rb.genkyoAsH*1000)}] : []);
      // 現況・本復旧チップ: honFreeRows があれば層順に展開
      var _honChips = [];
      var _frsHon = (rb.honFreeRows||[]).filter(function(r){ return (r.t||0)>0; });
      if(_frsHon.length > 0){
        _frsHon.forEach(function(r){
          if(r.type==='concrete'||r.type==='コンクリート'){
            _honChips.push('<div style="background:#fff7ed;border:1px solid #f97316;border-radius:7px;padding:8px 12px;"><div style="font-size:13px;color:#c2410c;margin-bottom:3px;">'+(r.name||'コンクリート')+'</div><div style="font-weight:700;font-size:16px;color:#f97316;font-family:monospace;">'+r.t+'mm</div></div>');
          } else if(r.type==='cn_rc'){
            _honChips.push('<div style="background:#fff7ed;border:1px solid #fb923c;border-radius:7px;padding:8px 12px;"><div style="font-size:13px;color:#c2410c;margin-bottom:3px;">CN間路盤材 '+(r.subcat||'RC-40')+'（別途発注）</div><div style="font-weight:700;font-size:16px;color:#fb923c;font-family:monospace;">'+r.t+'mm</div></div>');
          } else if(r.type==='upper_rb'){
            _honChips.push(_ckRbRmcChip('上層路盤工 '+(r.subcat||'RM-40'), ckLayerAdditionStr(rb._honRM_layers, rb.genkyoRM*1000), 'hon'));
          } else if(r.type==='lower_rb'){
            _honChips.push(_ckRbRmcChip('下層路盤工 '+(r.subcat||'RC-40'), ckLayerAdditionStr(rb._honRC_layers, rb.genkyoRC*1000), 'hon'));
          }
        });
        // cn_rc型行が無くてもgenkyoCnRCがある場合（旧ロジック計算値）はフォールバック
        var _frsHonHasCnRc = _frsHon.some(function(r){ return r.type==='cn_rc'; });
        if(!_frsHonHasCnRc && (rb.genkyoCnRC||0)>0){ var _cnRcSubFB=rb.genkyoCnRCSubcat||'RM-40'; _honChips.push('<div style="background:#fff7ed;border:1px solid #fb923c;border-radius:7px;padding:8px 12px;"><div style="font-size:13px;color:#c2410c;margin-bottom:3px;">CN間路盤材 '+_cnRcSubFB+'（別途発注）</div><div style="font-weight:700;font-size:16px;color:#fb923c;font-family:monospace;">'+Math.round(rb.genkyoCnRC*1000)+'mm</div></div>'); }
      } else {
        _honAsArr.forEach(function(a){ _honChips.push(_ckRbAsChip(a.name, a.t)); });
        if((rb.genkyoCnH||0)>0) _honChips.push('<div style="background:#fff7ed;border:1px solid #f97316;border-radius:7px;padding:8px 12px;"><div style="font-size:13px;color:#c2410c;margin-bottom:3px;">コンクリート層</div><div style="font-weight:700;font-size:16px;color:#f97316;font-family:monospace;">'+Math.round(rb.genkyoCnH*1000)+'mm</div></div>');
        if((rb.genkyoCnRC||0)>0){ var _cnRcSub=rb.genkyoCnRCSubcat||'RC-40'; _honChips.push('<div style="background:#fff7ed;border:1px solid #fb923c;border-radius:7px;padding:8px 12px;"><div style="font-size:13px;color:#c2410c;margin-bottom:3px;">CN間路盤材 '+_cnRcSub+'（別途発注）</div><div style="font-weight:700;font-size:16px;color:#fb923c;font-family:monospace;">'+Math.round(rb.genkyoCnRC*1000)+'mm</div></div>'); }
        if((rb.genkyoRM||0)>0) _honChips.push(_ckRbRmcChip('上層路盤工 RM-'+(rb.honRmSize||rb.rmSize), ckLayerAdditionStr(rb._honRM_layers, rb.genkyoRM*1000), 'hon'));
        if((rb.genkyoRC||0)>0) _honChips.push(_ckRbRmcChip('下層路盤工 RC-'+(rb.honRcSize||rb.rcSize), ckLayerAdditionStr(rb._honRC_layers, rb.genkyoRC*1000), 'hon'));
        // フリー層（既設路盤など）
        (rb.genkyoFreeRows||[]).forEach(function(r){

            _honChips.push('<div style="background:#fffbeb;border:1px solid #fcd34d;border-radius:7px;padding:8px 12px;"><div style="font-size:13px;color:#92400e;margin-bottom:3px;">'+nm+'</div><div style="font-weight:700;font-size:16px;color:#d97706;font-family:monospace;">t = '+r.t+'mm</div></div>');

      }
      // 現況・本復旧 notice用 層展開ヘルパー
      var _buildHonNotice = function(rb){

        if(frs.length){
          frs.forEach(function(r){

              parts.push('<span style="color:#0284c7;font-weight:700;">'+(r.subcat||'RM-40')+' '+r.t+'mm</span>');
            else if(r.type==='lower_rb')
              parts.push('<span style="color:#059669;font-weight:700;">'+(r.subcat||'RC-40')+' '+r.t+'mm</span>');
          });
          // cn_rc型行が無くてもgenkyoCnRCがある場合（旧ロジック計算値）はフォールバック
          var _bnHasCnRc = frs.some(function(r){ return r.type==='cn_rc'; });
          if(!_bnHasCnRc && (rb.genkyoCnRC||0)>0) parts.push('<span style="color:#fb923c;font-weight:700;">CN間路盤材 '+(rb.genkyoCnRCSubcat||'RM-40')+' '+Math.round(rb.genkyoCnRC*1000)+'mm（別途発注）</span>');
        } else {
          if((rb.genkyoCnH||0)>0) parts.push('<span style="color:#f97316;font-weight:700;">コンクリート '+Math.round(rb.genkyoCnH*1000)+'mm</span>');
          if((rb.genkyoCnRC||0)>0) parts.push('<span style="color:#fb923c;font-weight:700;">CN間路盤材 '+(rb.genkyoCnRCSubcat||'RC-40')+' '+Math.round(rb.genkyoCnRC*1000)+'mm（別途発注）</span>');
          // AS層：honAsLayersがあれば展開、なければgenkyoAsHから単層フォールバック
          if((rb.genkyoAsH||0)>0){
            var _bhnAsArr = (rb.honAsLayers&&rb.honAsLayers.length) ? rb.honAsLayers : [{name:'AS混合物', t:Math.round(rb.genkyoAsH*1000)}];
            _bhnAsArr.forEach(function(a){ parts.push('<span style="color:#7c3aed;font-weight:700;">'+a.name+' '+a.t+'mm</span>'); });
          }
          if((rb.genkyoRM||0)>0) parts.push('<span style="color:#0284c7;font-weight:700;">RM-'+(rb.honRmSize||rb.rmSize||40)+' '+Math.round(rb.genkyoRM*1000)+'mm</span>');
          if((rb.genkyoRC||0)>0) parts.push('<span style="color:#059669;font-weight:700;">RC-'+(rb.honRcSize||rb.rcSize||40)+' '+Math.round(rb.genkyoRC*1000)+'mm</span>');
          // フリー層（既設路盤など RM/RC 以外の路盤工層）
          (rb.genkyoFreeRows||[]).forEach(function(r){
            if((r.t||0)>0) parts.push('<span style="color:#d97706;font-weight:700;">'+(r.name||'フリー層')+' '+r.t+'mm</span>');
          });
        }
        return parts.join(' ／ ');
      };
      var _honTotalMm = Math.round(((rb.genkyoTotalH||0)||((rb.genkyoAsH||0)+(rb.genkyoRM||0)+(rb.genkyoRC||0)+(rb.genkyoCnRC||0)+(rb.genkyoCnH||0)+(rb.genkyoFreeH||0)))*1000)||Math.round(rb.totalH*1000);

      var _honWarnBadge  = _rbDiffers ? ' <span style="display:inline-block;margin-left:6px;background:rgba(239,68,68,0.2);color:#b91c1c;font-size:13px;font-weight:700;padding:1px 7px;border-radius:4px;white-space:nowrap;">⚠️ 仮復旧路盤は異なる</span>' : '';
      html += '<div style="background:#f0f9ff;border:1px solid #bae6fd;border-radius:8px;padding:8px 12px;margin:10px 0;">'

        +'</div>'
        +(_rbDiffers
          ? '<div style="font-size:16px;color:#7c3aed;line-height:1.7;margin-top:4px;">🏗 <strong>現況・本復旧 H='+_honTotalMm+'mm</strong>： '+_buildHonNotice(rb)+_honWarnBadge+'</div>'

        +'</div>'
        +'<button id="'+_rbDetailId+'-btn" type="button" onclick="toggleCkRoadbedDetail(\''+_rbDetailId+'\')" style="margin-top:6px;font-size:13px;font-weight:700;color:#0369a1;background:#e0f2fe;border:1px solid #bae6fd;border-radius:5px;padding:3px 10px;cursor:pointer;">詳細を見る ▼</button>'
        +'<div id="'+_rbDetailId+'" style="display:none;margin-top:8px;padding-top:8px;border-top:1px solid #bae6fd;">'
          +((_rbDiffers && _honChips.length)
            ? ('<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">'
                +'<div><div style="font-size:12px;font-weight:700;color:#ea580c;letter-spacing:1px;margin-bottom:5px;">🔧 仮復旧（路盤先行）</div><div style="display:flex;flex-direction:column;gap:5px;">'+_kariChips.join('')+'</div></div>'
                +'<div><div style="font-size:12px;font-weight:700;color:#7c3aed;letter-spacing:1px;margin-bottom:5px;">🏗 現況・本復旧</div><div style="display:flex;flex-direction:column;gap:5px;">'+_honChips.join('')+'</div></div>'
              +'</div>')
            : ('<div style="display:flex;flex-wrap:wrap;gap:6px;">'+_kariChips.join('')+'</div>'))
          +'<div style="font-size:13px;color:#0369a1;margin-top:6px;">合計H = '+Math.round(rb.totalH*1000)+'mm　※転圧ポイントはこの構成から自動計算</div>'
        +'</div>'
        +'</div>';
    }
  }

  // 進捗
  html += '<div class="progress-wrap">' +

  '</div>';

  if(!_typeKey){
    html += '<div style="text-align:center;color:var(--text3);padding:20px;font-size:17px;">型を選択するとチェックリストが表示されます</div>';
  } else {
    var _effSections = getEffectiveSections(ck, _typeKey);
    if(_effSections.length===0){
      html += '<div style="text-align:center;color:var(--text3);padding:20px;font-size:17px;">チェックリスト未設定です</div>';
    } else {
      _effSections.forEach(function(sec, si){
        html += renderSection(sec, si);
      });
    }
  }

  html += '</main>';
  document.getElementById('checkMain').innerHTML = html;

  // 状態復元（ここでloadHata→imgBtn操作が走る）
  _hataEntry = null; // 一旦クリアしてloadHataで再セット
  restoreState();

  // 日付は常に今日に設定（restoreState で古い日付が入る場合があるため後から上書き）
  var dateEl = document.getElementById('inDate');
  var _today = new Date().toISOString().slice(0,10);
  if(dateEl) dateEl.value = _today;

  // ── 記録者デバイス記憶 ──────────────────────────────────
  var _recEl = document.getElementById('inRecorder');
  var _savedRec = localStorage.getItem('checklist_recorder') || '';
  if(_recEl) {
    var _stateRec = (_recEl.value || '').trim();
    if(!_stateRec && _savedRec) {
      // 状態に名前がなければデバイス記憶から補完
      _recEl.value = _savedRec;
    } else if(_stateRec && _savedRec && _stateRec !== _savedRec) {
      // 状態の名前とデバイス記憶が異なる場合に確認アラート
      var _useDevice = confirm(
        '⚠ 記録者の確認\n\n' +
        'このデバイスの登録者: 【' + _savedRec + '】\n' +
        '前回のセッションの記録者: 【' + _stateRec + '】\n\n' +
        '「OK」→ デバイス登録者（' + _savedRec + '）を使用\n' +
        '「キャンセル」→ 前回の記録者（' + _stateRec + '）を維持'
      );
      if(_useDevice) _recEl.value = _savedRec;
    } else if(!_stateRec && !_savedRec) {
      // どちらもなければ空のまま（入力を促す）
    }
  }
  // ──────────────────────────────────────────────────────
  // Firestore管種設定（管理者登録済みの場合はそちらを優先）
  // localStorage個人設定よりFirestore共通設定を優先して上書き
  loadPipeSettingsFromFb();
  // pipe2Wrap の初期表示制御（_pipeCountに基づく）
  var _p2w = document.getElementById('pipe2Wrap');
  var _aBtn = document.getElementById('addPipeBtn');
  if(_p2w) _p2w.style.display = _pipeCount >= 2 ? 'contents' : 'none';
  if(_aBtn) _aBtn.style.display = _pipeCount >= 2 ? 'none' : 'inline-block';
  recalcGL();
  updatePipeItems();
  updateDummyItems();
  updateProgress();
}

function renderSection(sec, si, isHon){
  // ロックセクション（ヘッダーのみ表示）
  if(sec._locked){
    return '<div class="checklist-section">'
      + '<div class="section-header locked-hdr">'
      + '<span class="stitle">'+sec.phase+'</span>'
      + '<span class="locked-note">本復旧モード中（非対象）</span>'
      + '</div></div>';
  }
  var _isBurial = sec._isHonBurial;
  var hdrCls = 'section-header open' + (isHon ? ' hon-hdr' : '') + (_isBurial ? ' hon-burial-hdr' : '');
  var html = '<div class="checklist-section">' +
    '<div class="' + hdrCls + '" onclick="toggleSection(this)">' +
    '<span class="stitle">'+(_isBurial?'🏗 ':(isHon?'🏗 ':''))+sec.phase+'</span>' +
    '<span class="sarrow">▾</span>' +
    '</div><div class="check-items">';

  sec.items.forEach(function(item, ii){
    // 埋設シート敷設の直後の中間転圧は、深さ順インターリーブ表示のため埋設シート行に統合（個別行は省略）
    if(item.glType === 'midList' && ii>0 && sec.items[ii-1] && sec.items[ii-1].glType === 'sheet'){
      return;
    }
    var k = itemKey(si,ii);
    var isDone = !!_checks[k];
    var isNA = !!_naItems[k];
    var cls = 'check-item' + (isDone?' checked':'') + (isNA?' na':'');

    var tags = '';
    var gt = item.glType || '';
    // 埋設シート敷設の直後に中間転圧が続く場合は1行に統合表示（深さ順インターリーブ）
    var _comboPair = (gt === 'sheet' && sec.items[ii+1] && sec.items[ii+1].glType === 'midList');

    if(gt === 'mizu'){
      tags = '<div class="tags"><span class="tag-mizu"><span class="tag tag-blue">①通信 DP入力後に計算</span></span></div>';
    } else if(_comboPair){
      var _midNote = (sec.items[ii+1].note||'').replace(/"/g,'&quot;');
      tags = '<div class="tags combo-wrap" data-si="'+si+'" data-ii="'+ii+'" data-mid-note="'+_midNote+'"><span class="tag tag-yellow">DP入力後に順序を計算</span></div>';
    } else if(gt === 'sheet'){
      tags = '<div class="tags"><span class="tag-sheet"><span class="tag tag-blue">①通信 DP入力後に計算</span></span></div>';
    } else if(gt === 'midList'){
      tags = '<div class="tags mid-list-wrap"><span class="tag tag-yellow">DP入力後にGL値・繰り返し回数を計算</span></div>';
    } else if(gt === 'roadbedChg'){
      tags = '<div class="tags"><span class="tag tag-yellow tag-roadbedchg">' + (item.dim||'GL-??') + '</span></div>';
    } else if(gt === 'paveThick'){
      tags = '<div class="tags"><div class="pave-thick-wrap" data-kari="'+(item._paveKariH||0).toFixed(3)+'" data-hon="'+(item._paveHonH||0).toFixed(3)+'"></div></div>';
    } else {
      if(item.gl===1) tags += '<span class="gl1-dp-wrap"><span class="tag tag-blue">'+glTagStr(1)+'</span></span>';
      if(item.gl===2) tags += '<span class="gl2-dp-wrap"><span class="tag tag-green">'+glTagStr(2)+'</span></span>';
      if(item.gl==='mid') tags += '<span class="tag tag-yellow">BH掘削 GL-'+fmtBH()+'m</span>';
      if(tags) tags = '<div class="tags">'+tags+'</div>';
    }

    // note：glTypeごとに専用クラス付与（動的更新のためdata-base-note属性も設定）
    var noteClass = gt==='sheet' ? 'cnote note-sheet' :
                    gt==='roadbedChg' ? 'cnote note-roadbedchg' : 'cnote';
    var noteAttr = (gt==='sheet'||gt==='roadbedChg') ? ' data-base-note="'+((item.note||'').replace(/"/g,'&quot;'))+'"' : '';
    var noteHtml = item.note
      ? '<div class="'+noteClass+'"'+noteAttr+'>'+item.note+'</div>'
      : '';

    // 管種スロット検出
    var _pipeSlot = 0;
    var _PIPE_SLOT_TYPES = ['通信管', '電力管'];
    for(var _pi=0; _pi<_PIPE_SLOT_TYPES.length; _pi++){
      if(item.n.indexOf(_PIPE_SLOT_TYPES[_pi]+'\u3000')===0 || item.n.indexOf(_PIPE_SLOT_TYPES[_pi]+' ')===0){
        _pipeSlot = _pi+1; break;
      }
    }
    var _pipeSlotAttr = _pipeSlot > 0
      ? ' data-pipe-slot="'+_pipeSlot+'" data-orig-n="'+item.n.replace(/"/g,'&quot;')+'"' : '';
    // ダミー管項目の検出
    var _isDummyItem = item.n.indexOf('ダミー管') >= 0;
    var _dummyAttr = _isDummyItem ? ' data-dummy-item="1"' : '';
    // 舗装切断工項目の検出
    var _isCutterItem = !!item.cutter;
    var _cutterAttr = _isCutterItem ? ' data-cutter-item="1"' : '';
    // 小田原仕様項目の検出（noteに【小田原仕様】があれば小田原現場以外では非表示）
    var _isOdawaraItem = !!(item.note && item.note.indexOf('【小田原仕様】') >= 0);
    var _odawaraAttr = _isOdawaraItem ? ' data-odawara-item="1"' : '';
    var _combinedStyle = (_isDummyItem && !_showDummy) || (_isCutterItem && !_showCutter) || (_isOdawaraItem && !_showOdawara) ? ' style="display:none;"' : '';
    html += '<div class="'+cls+'"'+_combinedStyle+' onclick="toggleCheck('+si+','+ii+')" data-k="'+k+'"'+_pipeSlotAttr+_dummyAttr+_cutterAttr+_odawaraAttr+'>' +
      '<div class="check-box">'+(isNA?'－':(isDone?'✓':''))+'</div>' +
      '<div class="check-label">' +
        '<div class="cname">'+(_comboPair ? '埋設シート・中間転圧' : item.n)+'</div>' +
        (item.dim && gt!=='roadbedChg' ? '<div class="cdim">'+item.dim+'</div>':'') +
        tags +
        noteHtml +
        (_comboPair ? '<div class="combo-mid-note"></div>' : '') +
      '</div>' +
      (item.na?'<button class="btn-na" onclick="toggleNA(event,'+si+','+ii+')">'+(isNA?'対象に戻す':'対象外')+'</button>':'') +
    '</div>';
  });

  html += '</div></div>';
  return html;
}

function toggleSection(hdr){
  var items = hdr.nextElementSibling;
  var open = hdr.classList.contains('open');
  hdr.classList.toggle('open', !open);
  items.style.display = open ? 'none' : '';
}

function toggleCheck(si, ii){
  var k = itemKey(si,ii);
  if(_naItems[k]) return; // 対象外はチェック不可
  _checks[k] = !_checks[k];
  var el = document.querySelector('[data-k="'+k+'"]');
  if(el){
    el.classList.toggle('checked', !!_checks[k]);
    el.querySelector('.check-box').textContent = _checks[k]?'✓':'';
  }
  updateProgress();
  saveState();
}

function toggleNA(e, si, ii){
  e.stopPropagation();
  var k = itemKey(si,ii);
  _naItems[k] = !_naItems[k];
  if(_naItems[k]) _checks[k] = false;
  // 再描画（このセクションだけ）
  var ck = TYPE_CHECKLISTS[_typeKey];
  if(!ck) return;
  var secs = document.querySelectorAll('.checklist-section');
  // セクション全体再描画
  var container = document.querySelector('#checkMain');
  var sectionsHtml = '';
  getEffectiveSections(ck, _typeKey).forEach(function(sec,s){ sectionsHtml += renderSection(sec,s); });
  // 既存セクションを置き換え
  var tmpDiv = document.createElement('div');
  tmpDiv.innerHTML = sectionsHtml;
  var newSecs = tmpDiv.querySelectorAll('.checklist-section');
  secs.forEach(function(old,i){ if(newSecs[i]) old.parentNode.replaceChild(newSecs[i],old); });
  updateProgress();
  saveState();
}

// 個別DP用サブチェック（例：□DP①通信管DP=00m □DP②通信管DP=00m）
// 撮影済みかどうかを個別に記録・保存できるチェックボックス
function subChkSpan(key, innerHtml){
  var on = !!_subChecks[key];
  return '<span class="subchk-item'+(on?' on':'')+'" data-subchk-key="'+key+'" onclick="toggleSubChk(event,this)">'
       + '<span class="subchk-box">'+(on?'✓':'')+'</span>'
       + innerHtml
       + '</span>';
}
function toggleSubChk(e, el){
  e.stopPropagation();
  if(!el) return;
  var key = el.getAttribute('data-subchk-key');
  if(!key) return;
  _subChecks[key] = !_subChecks[key];
  el.classList.toggle('on', !!_subChecks[key]);
  var box = el.querySelector('.subchk-box');
  if(box) box.textContent = _subChecks[key] ? '✓' : '';
  saveState();
}

// =====================================================
// 管下H 計算補助
// =====================================================
function calcDPH(pipe){
  var p1id = pipe===1 ? 'dphPipe1' : 'dphPipe3';
  var b1id = pipe===1 ? 'dphBase1' : 'dphBase2';
  var p2id = pipe===1 ? 'dphPipe2' : 'dphPipe4';
  var resId = pipe===1 ? 'dphResult1' : 'dphResult2';
  var dphId = pipe===1 ? 'inDPH' : 'inDPH2';

  var p1 = parseFloat($v(p1id)) || 0;
  var b1 = parseFloat($v(b1id)) || 0;
  var p2 = parseFloat($v(p2id)) || 0;

  var resEl = document.getElementById(resId);
  var dphEl = document.getElementById(dphId);
  if(!p1){ if(resEl) resEl.textContent=''; return; }

  var total = p1 + b1 + p2; // mm
  var totalM = (total / 1000).toFixed(3);

  var expr = p1 + (b1 ? '＋管台' + b1 : '') + (p2 ? '＋' + p2 : '') + ' ＝ ' + total + 'mm ＝ ' + totalM + 'm';
  if(resEl) resEl.innerHTML = '管下H：' + expr +
    ' <button onclick="applyDPH(' + pipe + ',' + totalM + ')" style="margin-left:8px;padding:2px 10px;font-size:14px;background:#0ea5e9;color:#fff;border:none;border-radius:4px;cursor:pointer;font-weight:700;">①管下Hにセット</button>';
}

function applyDPH(pipe, val){
  var id = pipe===1 ? 'inDPH' : 'inDPH2';
  var el = document.getElementById(id);
  if(el){ el.value = val; recalcGL(); }
  // ボタンラベルを「セット済」に変更
  var resId = pipe===1 ? 'dphResult1' : 'dphResult2';
  var resEl = document.getElementById(resId);
  if(resEl){
    var btns = resEl.querySelectorAll('button');
    btns.forEach(function(b){ b.textContent='✓ セット済'; b.style.background='#059669'; });
  }
}



// 管種名（スロット番号①②なし）を返す
function getPipeBaseName(idx){
  var rawType = (_pipeTypes && _pipeTypes[idx]!=null) ? _pipeTypes[idx] : '';
  if(!rawType) return idx===0?'通信管':idx===1?'電力管':'管'+(idx+1);
  if(rawType==='その他') return (_pipeCustomNames[idx]||'').trim()||'その他';
  return rawType;
}
// GL値フォーマット（例: -1.50 → "GL-1.50m"）
function fmtGL(v){ return 'GL-' + Math.abs(parseFloat(v)).toFixed(3) + 'm'; }
// 勾配①端/②端用ラベル生成（DP①通信管 GL-Xm 形式）
function glGradLbl(pipeIdx, endNum, v){
  var bn = getPipeBaseName(pipeIdx);
  var ep = endNum===1 ? 'DP①' : 'DP②';
  return v!=='' ? ep+bn+' '+fmtGL(v) : ep+bn+' DP入力後に計算';
}

// 中間転圧GLリスト生成（start自体を含み、limit未満まで@200）
function midList(start, limit, max){
  max = max || 8;
  if(start === '' || start === null) return [];
  var r = [], cur = start;
  for(var i = 0; i < max; i++){
    if(cur >= limit) break;
    r.push(cur);
    cur = parseFloat((cur + 0.2).toFixed(4));
  }
  return r;
}

  if (t === 'その他') {
    var custom = (_pipeCustomNames[idx] || '').trim();
    t = custom || 'その他';

  return h;

function saveDpDphToMaster(){
  if(!_isAdmin){ alert('管理者のみDP/管下Hを保存できます'); return; }
  var num = $v('hataInput').trim();
  if(!num){ alert('旗揚げ番号が未入力です'); return; }
  var dp  = parseFloat($v('inDP1'));
  var dph = parseFloat($v('inDPH'));
  if(!dp || !dph){ alert('DP と 管下H を入力してください'); return; }

  // localStorage を更新
  var mkKey = _siteId ? 'hata_master_'+_siteId : 'hata_master';
  var arr = [];
  try{ arr = JSON.parse(localStorage.getItem(mkKey)||'[]'); }catch(e){}
  var idx = arr.findIndex(function(e){ return String(e.hata)===String(num); });
  if(idx < 0){ alert('No.'+num+' はマスタに見つかりません'); return; }

  arr[idx].dp   = dp;
  arr[idx].dph  = dph;
  // 勾配②端DP値も保存（入力があれば）
  var dp1sVal  = parseFloat($v('inDP1s'))  || null;
  var dph1sVal = parseFloat($v('inDPH1s')) || null;
  if(dp1sVal  !== null) arr[idx].dp1s  = dp1sVal;
  if(dph1sVal !== null) arr[idx].dph1s = dph1sVal;
  arr[idx].updatedAt = new Date().toISOString().slice(0,10);
  localStorage.setItem(mkKey, JSON.stringify(arr));

  // メモリ上の_hataEntryも更新
  if(_hataEntry){
    _hataEntry.dp = dp; _hataEntry.dph = dph;
    if(dp1sVal  !== null) _hataEntry.dp1s  = dp1sVal;
    if(dph1sVal !== null) _hataEntry.dph1s = dph1sVal;
  }

  // Firestore に保存（imgDataを除いて保存）
  if(_fbDb){
    var docKey = _siteId ? 'hata_master_'+_siteId : 'hata_master_global';
    var stripped = arr.map(function(e){
      if(e.imgData){
        var c = Object.assign({}, e);
        delete c.imgData;
        c.hasImg = true;
        return c;
      }
      return e;
    });
    var payload = { data: stripped, updatedAt: new Date().toISOString() };
    var sz = 0;
    try{ sz = new Blob([JSON.stringify(payload)]).size; }catch(e){}
    if(sz > 990000){ alert('データが大きすぎて保存できません ('+Math.round(sz/1024)+'KB)'); return; }
    _fbDb.collection('masters').doc(docKey).set(payload)
      .then(function(){ alert('✅ No.'+num+' の DP/管下H をマスタに保存しました'); loadHata(); })
      .catch(function(e){ alert('保存エラー: '+e.message); });
  } else {
    alert('✅ No.'+num+' の DP/管下H をローカルに保存しました（Firestore未接続）');
    loadHata();
  }
}

function recalcGL(){
  var dp1  = parseFloat($v('inDP1'))  || 0;
  var dph1 = parseFloat($v('inDPH'))  || 0;
  var dp2  = parseFloat($v('inDP2'))  || 0;
  var dph2 = parseFloat($v('inDPH2')) || 0;
  // 勾配②端（深側）
  var dp1s  = (_pipeGradient[0] ? parseFloat($v('inDP1s'))  : 0) || 0;
  var dph1s = (_pipeGradient[0] ? parseFloat($v('inDPH1s')) : 0) || 0;
  var dp2s  = (_pipeGradient[1] ? parseFloat($v('inDP2s'))  : 0) || 0;
  var dph2s = (_pipeGradient[1] ? parseFloat($v('inDPH2s')) : 0) || 0;
  var dp3   = _pipeCount>=3 ? (parseFloat($v('inDP3'))  || 0) : 0;
  var dph3  = _pipeCount>=3 ? (parseFloat($v('inDPH3')) || 0) : 0;
  var dp3s  = (_pipeCount>=3 && _pipeGradient[2]) ? (parseFloat($v('inDP3s')) || 0) : 0;
  var dph3s = (_pipeCount>=3 && _pipeGradient[2]) ? (parseFloat($v('inDPH3s'))|| 0) : 0;
  var dp4   = _pipeCount>=4 ? (parseFloat($v('inDP4'))  || 0) : 0;
  var dph4  = _pipeCount>=4 ? (parseFloat($v('inDPH4')) || 0) : 0;
  var dp4s  = (_pipeCount>=4 && _pipeGradient[3]) ? (parseFloat($v('inDP4s')) || 0) : 0;
  var dph4s = (_pipeCount>=4 && _pipeGradient[3]) ? (parseFloat($v('inDPH4s'))|| 0) : 0;

  // ② 土被り = DP値のみ（管上端からGL）
  _gl1 = dp1 > 0 ? dp1.toFixed(3) : '';
  _gl2 = dp2 > 0 ? dp2.toFixed(3) : '';
  _gl3 = dp3 > 0 ? dp3.toFixed(3) : '';
  _gl4 = dp4 > 0 ? dp4.toFixed(3) : '';

  // 床付け = DP + 管下H
  var yuka1 = dp1 > 0 ? (dp1 + dph1).toFixed(3) : '';
  var yuka2 = dp2 > 0 ? (dp2 + dph2).toFixed(3) : '';

  // 計算結果表示
  var res = document.getElementById('glResult');
  if(res){
    if(dp1 > 0 || dp2 > 0 || dp3 > 0 || dp4 > 0){
      var lines = [];
      function makeLine(piIdx, dpV, dphV, dpSv, dphSv){
        var line = getPipeLbl(piIdx)+'　土被り DP='+dpV.toFixed(3)+'m　床付け H='+(dpV+dphV).toFixed(3)+'m';
        if(_pipeGradient[piIdx] && dpSv>0)
          line += '　／　DP②端='+dpSv.toFixed(3)+'m　床付け H='+(dpSv+dphSv).toFixed(3)+'m';
        return line;
      }
      if(dp1>0) lines.push(makeLine(0, dp1, dph1, dp1s, dph1s));
      if(dp2>0) lines.push(makeLine(1, dp2, dph2, dp2s, dph2s));
      if(dp3>0) lines.push(makeLine(2, dp3, dph3, dp3s, dph3s));
      if(dp4>0) lines.push(makeLine(3, dp4, dph4, dp4s, dph4s));
      res.innerHTML = lines.join('<br>');
      res.style.display = '';
    } else {
      res.style.display = 'none';
    }
  }

  // 型キー・路盤パラメータ取得
  var tk = _typeKey || '85';
  var embedMm = EMBED_MM[tk] || 300;
  var emb = embedMm / 1000;
  var f40 = ROADBED_GL[tk] || -0.85;
  var f40_hon = f40; // 本復旧路盤変更点（仮復旧と異なる場合に上書き）
  var _presetType = getPresetTypeData(_siteId, _typeKey, _presetTypeKey);
  if(_presetType){
    if(_presetType.totalH){
      // totalH = AS含む全路盤構成合計（order側で計算済みの値を優先）
      f40 = -_presetType.totalH;
      // 本復旧路盤が仮復旧より深い場合は本復旧深さを優先（路盤変更点は本復旧基準）
      var _honTH = _presetType.genkyoTotalH ||
        parseFloat(((_presetType.genkyoAsH||0)+(_presetType.genkyoRM||0)+(_presetType.genkyoRC||0)+
          (_presetType.genkyoCnH||0)+(_presetType.genkyoCnRC||0)+(_presetType.genkyoFreeH||0)).toFixed(4));
      // genkyoRM>0 のとき（=本復旧に上層路盤あり）のみ本復旧深さを採用
      // 切り下げ部等（RM=0）はkari深さを使用（honTH > totalHでも適用しない）
      // 本復旧路盤変更点: f40=kariTotalH基準（固定）、f40_honは本復旧totalHを独立適用
      f40_hon = (_honTH > 0 && _honTH > _presetType.totalH) ? -_honTH : f40;
      console.log('[CK] recalcGL: totalH='+(_presetType.totalH||0).toFixed(3)+' genkyoTotalH='+(_presetType.genkyoTotalH||0).toFixed(3)+' genkyoRM='+(_presetType.genkyoRM||0).toFixed(3)+' genkyoRC='+(_presetType.genkyoRC||0).toFixed(3)+' _honTH='+(_honTH||0).toFixed(3)+' f40='+f40);
    } else {
      // totalHがない場合はAS+RC+RM+specialから再計算
      var _asT = (((_presetType.asT密粒||0)+(_presetType.asT粗粒||0))/1000);
      var _rcH = _presetType.rcH||0, _rmH = _presetType.rmH||0;
      var _spT = (_presetType.asLayers||[]).reduce(function(s,a){
        if(!a.memo&&(a.t||0)>0&&a.role!=='tack'&&a.role!=='prime'){
          var nm=(a.preset==='その他（自由入力）'||!a.preset)?(a.custom||''):a.preset;
          var isSpecial=nm&&(nm.indexOf('瀝青')>=0||nm.indexOf('既設')>=0||nm.indexOf('安定処理')>=0||nm.indexOf('コンクリート')>=0||nm.indexOf('調整')>=0||nm.indexOf('改良')>=0);
          if(isSpecial) return s+(a.t/1000);
        }
        return s;
      },0);
      var _tot = _asT + _rcH + _rmH + _spT;
      if(_tot > 0) f40 = -_tot;
      // 仮復旧なし（kariTotalH=0 かつ _tot=0）の場合は現況・本復旧の路盤合計をフォールバック
      // ※ AS層のみ（路盤工なし）は路盤変更点を算出しない（RM/RC/フリー層=0 ならスキップ）
      if(_tot <= 0) {
        var _honRM    = _presetType.genkyoRM    || 0;
        var _honRC    = _presetType.genkyoRC    || 0;
        var _honFreeH = _presetType.genkyoFreeH || 0;
        // RM/RC またはフリー層（既設路盤など）がある場合のみ路盤変更点を算出
        if((_honRM + _honRC + _honFreeH) > 0) {
          var _honAsH = _presetType.genkyoAsH || 0;
          var _genTotal = _presetType.genkyoTotalH || parseFloat((_honRM + _honRC + _honAsH + _honFreeH).toFixed(4));
          if(_genTotal > 0) f40 = -_genTotal;
        }
      }
    }
  }

  // ① 通信管（水締め・埋設シート計算はDP値=土被りGL基準）
  var f23 = dp1 > 0 ? parseFloat((-dp1).toFixed(4)) : '';
  var f28 = f23 !== '' ? parseFloat((f23 + 0.1).toFixed(4)) : '';
  // ルール①: 水締めGLが路盤構成内に入る場合（鉄板など）は路盤構成下端に合わせる
  if(f28 !== '' && f40 !== '' && f28 > f40) f28 = f40;
  var raw30 = f23 !== '' ? parseFloat((f23 + emb).toFixed(4)) : '';
  var f30 = raw30 !== '' ? (raw30 > f40 ? f40 : raw30) : '';
  // 安全キャップ: 埋設シートは水締め（管天端+100mm）より深くなれない
  if(f30 !== '' && f28 !== '' && f30 < f28) f30 = f28;

  // ② 電力管
  var g25 = dp2 > 0 ? parseFloat((-dp2).toFixed(4)) : '';
  var g28 = g25 !== '' ? parseFloat((g25 + 0.1).toFixed(4)) : '';
  // ルール①: 水締めGLが路盤構成内に入る場合は路盤構成下端に合わせる
  if(g28 !== '' && f40 !== '' && g28 > f40) g28 = f40;
  var rawG30 = g25 !== '' ? parseFloat((g25 + emb).toFixed(4)) : '';
  var g30 = rawG30 !== '' ? (rawG30 > f40 ? f40 : rawG30) : '';
  if(g30 !== '' && g28 !== '' && g30 < g28) g30 = g28;

  // ① 通信管・勾配②端（浅側）GL計算
  var f23s = (dp1s > 0) ? parseFloat((-dp1s).toFixed(4)) : '';
  var f28s = f23s !== '' ? parseFloat((f23s + 0.1).toFixed(4)) : '';
  // ルール①: 水締めGLが路盤構成内に入る場合は路盤構成下端に合わせる
  if(f28s !== '' && f40 !== '' && f28s > f40) f28s = f40;
  var raw30s = f23s !== '' ? parseFloat((f23s + emb).toFixed(4)) : '';
  var f30s = raw30s !== '' ? (raw30s > f40 ? f40 : raw30s) : '';
  if(f30s !== '' && f28s !== '' && f30s < f28s) f30s = f28s;
  // ② 電力管・勾配②端（浅側）GL計算
  var g25s = (dp2s > 0) ? parseFloat((-dp2s).toFixed(4)) : '';
  var g28s = g25s !== '' ? parseFloat((g25s + 0.1).toFixed(4)) : '';
  // ルール①: 水締めGLが路盤構成内に入る場合は路盤構成下端に合わせる
  if(g28s !== '' && f40 !== '' && g28s > f40) g28s = f40;
  var rawG30s = g25s !== '' ? parseFloat((g25s + emb).toFixed(4)) : '';
  var g30s = rawG30s !== '' ? (rawG30s > f40 ? f40 : rawG30s) : '';
  if(g30s !== '' && g28s !== '' && g30s < g28s) g30s = g28s;

  // ── pipe3 GL ──
  var h23  = dp3  > 0 ? parseFloat((-dp3 ).toFixed(4)) : '';
  var h28  = h23  !== '' ? parseFloat((h23 +0.1).toFixed(4)) : '';
  // ルール①: 水締めGLが路盤構成内に入る場合は路盤構成下端に合わせる
  if(h28 !== '' && f40 !== '' && h28 > f40) h28 = f40;
  var rawH30 = h23!==''  ? parseFloat((h23 +emb).toFixed(4)) : '';
  var h30  = rawH30!=='' ? (rawH30>f40?f40:rawH30) : '';
  if(h30!==''&&h28!==''&&h30<h28) h30=h28;
  var h23s = dp3s > 0 ? parseFloat((-dp3s).toFixed(4)) : '';
  var h28s = h23s !== '' ? parseFloat((h23s+0.1).toFixed(4)) : '';
  // ルール①: 水締めGLが路盤構成内に入る場合は路盤構成下端に合わせる
  if(h28s !== '' && f40 !== '' && h28s > f40) h28s = f40;
  var rawH30s=h23s!==''  ? parseFloat((h23s+emb).toFixed(4)) : '';
  var h30s = rawH30s!==''? (rawH30s>f40?f40:rawH30s) : '';
  if(h30s!==''&&h28s!==''&&h30s<h28s) h30s=h28s;
  // ── pipe4 GL ──
  var i23  = dp4  > 0 ? parseFloat((-dp4 ).toFixed(4)) : '';
  var i28  = i23  !== '' ? parseFloat((i23 +0.1).toFixed(4)) : '';
  // ルール①: 水締めGLが路盤構成内に入る場合は路盤構成下端に合わせる
  if(i28 !== '' && f40 !== '' && i28 > f40) i28 = f40;
  var rawI30 = i23!==''  ? parseFloat((i23 +emb).toFixed(4)) : '';
  var i30  = rawI30!=='' ? (rawI30>f40?f40:rawI30) : '';
  if(i30!==''&&i28!==''&&i30<i28) i30=i28;
  var i23s = dp4s > 0 ? parseFloat((-dp4s).toFixed(4)) : '';
  var i28s = i23s !== '' ? parseFloat((i23s+0.1).toFixed(4)) : '';
  // ルール①: 水締めGLが路盤構成内に入る場合は路盤構成下端に合わせる
  if(i28s !== '' && f40 !== '' && i28s > f40) i28s = f40;
  var rawI30s=i23s!==''  ? parseFloat((i23s+emb).toFixed(4)) : '';
  var i30s = rawI30s!==''? (rawI30s>f40?f40:rawI30s) : '';
  if(i30s!==''&&i28s!==''&&i30s<i28s) i30s=i28s;

  // ── 中間転圧リスト（勾配時：②深側@200 → ①浅側の路盤変更点を追加）──
  function buildMidGrad(dpShallow, dpDeep, f28Sh, f28De, f30Sh){
    // 勾配あり: ②深側水締め+0.2 スタートの@200リスト
    var fss = parseFloat((f28De+0.2).toFixed(4));
    var deepList = midList(fss, f40);
    var shList   = f28Sh!=='' ? midList(parseFloat((f28Sh+0.2).toFixed(4)), f40) : [];
    var merged   = deepList.slice();
    shList.forEach(function(v){
      if(!merged.some(function(m){return Math.abs(m-v)<0.005;})) merged.push(v);
    });

  function buildMidSimple(f28Sh){

    // 路盤変更点(f40)は＠200ステップが届かなくても（リストが空でも）必ず最終転圧箇所として追加（路盤変更点は必ず撮影）

var _gl3='', _gl4='';
function glTagStr(pipe){
  var v = pipe===1?_gl1:pipe===2?_gl2:pipe===3?_gl3:_gl4;
  var lbl = getPipeLbl(pipe-1);
  return v ? lbl+' GL-'+v+'m' : lbl+' DP入力後に計算';
}
function fmtBH(){
  var dp1=parseFloat($v('inDP1'))||0, dp2=parseFloat($v('inDP2'))||0;
  var dph1=parseFloat($v('inDPH'))||0, dph2=parseFloat($v('inDPH2'))||0;
  var bh=parseFloat($v('inBH'))||0.5, ext=parseFloat($v('inExtra'))||0;
  // 床付けの深い方を基準にBH掘削GL算出
  var yuka1=dp1>0?dp1+dph1:0, yuka2=dp2>0?dp2+dph2:0;
  var md=Math.max(yuka1,yuka2);
  return md>0?(md+bh+ext).toFixed(3):'??';
}

var _PIPE_SLOT_ORIG = ['通信管', '電力管']; // スロット別・元の管種名

function updatePipeItems() {
  document.querySelectorAll('[data-pipe-slot]').forEach(function(el) {
    var slot = parseInt(el.getAttribute('data-pipe-slot')); // 1 or 2
    var idx  = slot - 1;
    var origN = el.getAttribute('data-orig-n') || '';
    var origType = _PIPE_SLOT_ORIG[idx] || '';

    // ── 表示制御 ──
    // スロット2は管種追加時のみ
    if (slot >= 2 && _pipeCount < 2) { el.style.display = 'none'; return; }
    el.style.display = '';

    // ── 管種名の解決（「その他」はカスタム名を使用） ──
    var rawType = (_pipeTypes[idx] !== undefined && _pipeTypes[idx] !== null)
      ? _pipeTypes[idx] : origType;
    var curType = (rawType === 'その他')
      ? ((_pipeCustomNames[idx] || '').trim() || 'その他')
      : rawType;

    // 項目名を現在の管種に変換
    var cname = el.querySelector('.cname');
    if (cname && origN) {
      var newN = curType
        ? origN.replace(origType, curType)
        : origN.replace(origType + '\u3000', '').replace(origType + ' ', '');
      cname.textContent = newN;
    }
  });
}

function updateProgress(){
  var _presetType2 = getPresetTypeData(_siteId, _typeKey, _presetTypeKey);
  var _dynCk2 = _presetType2 ? buildChecklistFromPreset(_presetType2) : null;
  var ck = _dynCk2 || TYPE_CHECKLISTS[_typeKey];
  if(!ck){ document.getElementById('progText')&&(document.getElementById('progText').textContent=''); return; }
  var total=0,done=0;
  var _upSections = getEffectiveSections(ck, _typeKey);
  _upSections.forEach(function(sec,si){
    if(sec._locked) return; // ロックセクションはカウント外
    sec.items.forEach(function(item,ii){
      if(item.glType === 'midList' && ii>0 && sec.items[ii-1] && sec.items[ii-1].glType === 'sheet') return; // 統合表示のため非表示
      var k=itemKey(si,ii);
      if(_naItems[k]) return;
      total++;
      if(_checks[k]) done++;
    });
  });
  var pct = total>0 ? Math.round(done/total*100) : 0;
  var pf = document.getElementById('progFill');
  var pt = document.getElementById('progText');
  if(pf) pf.style.width=pct+'%';
  if(pt) pt.textContent = done+' / '+total+' 完了　（'+pct+'%）';
  var btn = document.getElementById('btnSave');
  if(btn){
    btn.classList.toggle('all-done', done===total&&total>0);
    btn.textContent = (done===total&&total>0) ? '🎉 全完了！記録を保存' : '💾 記録を保存';
  }
}

var _hataPopupItems = [];
var _hataPopupIdx = -1;

function _buildHataPopupList(){
  var items = [];
  if(_siteId){
    try{ var sr=localStorage.getItem('hata_master_'+_siteId); if(sr){var sp=JSON.parse(sr);if(Array.isArray(sp))items=items.concat(sp);} }catch(e){}
  }
  try{ var gr=localStorage.getItem('hata_master'); if(gr){var gp=JSON.parse(gr);if(Array.isArray(gp))items=items.concat(gp);} }catch(e){}
  // 重複除去（hata番号優先）
  var seen={};
  items=items.filter(function(e){ var k=String(e.hata||e.num||''); if(!k||seen[k])return false; seen[k]=true; return true; });
  // 数値ソート
  items.sort(function(a,b){ return (+(a.hata||a.num||0))-(+(b.hata||b.num||0)); });
  return items;
}

function showHataPopup(){
  _hataPopupItems=_buildHataPopupList();
  _hataPopupIdx=-1;
  filterHataPopup();
}

function filterHataPopup(){
  var popup=document.getElementById('hataPopup');
  if(!popup) return;
  var val=((document.getElementById('hataInput')||{}).value||'').trim();
  var filtered=_hataPopupItems.filter(function(e){
    var k=String(e.hata||e.num||'');
    return !val || k.indexOf(val)===0;
  });
  if(!filtered.length){
    popup.innerHTML='<div class="hata-popup-empty">該当なし</div>';
    popup.style.display=filtered.length===0&&val===''&&_hataPopupItems.length===0?'none':'block';
    if(_hataPopupItems.length===0) popup.style.display='none';
    return;
  }
  popup.innerHTML=filtered.map(function(e){
    var k=String(e.hata||e.num||'');
    var nm=e.name||'';
    var dpStr=e.dp!=null?' DP:'+e.dp+'m':'';
    var meta=(nm||dpStr)? (nm+dpStr) : '';
    return '<div class="hata-popup-item" data-hata="'+k+'" onmousedown="event.preventDefault();selectHataItem(this.dataset.hata)">'+
      '<span class="hata-popup-num">No.'+k+'</span>'+
      (meta?'<span class="hata-popup-meta">'+meta+'</span>':'')+
    '</div>';
  }).join('');
  popup.style.display='block';
  _hataPopupIdx=-1;
}

function selectHataItem(num){
  var el=document.getElementById('hataInput');
  if(el) el.value=num;
  closeHataPopup();
  loadHata();
}

function closeHataPopup(){
  var popup=document.getElementById('hataPopup');
  if(popup) popup.style.display='none';
}

function hataKeyNav(e){
  var popup=document.getElementById('hataPopup');
  if(!popup||popup.style.display==='none'){
    if(e.key==='ArrowDown'||e.key==='ArrowUp'){ showHataPopup(); e.preventDefault(); return; }
    if(e.key==='Enter'){ loadHata(); return; }
    return;
  }
  var items=popup.querySelectorAll('.hata-popup-item');
  if(!items.length){ if(e.key==='Enter'){closeHataPopup();loadHata();} if(e.key==='Escape')closeHataPopup(); return; }
  if(e.key==='ArrowDown'){ e.preventDefault(); _hataPopupIdx=Math.min(_hataPopupIdx+1,items.length-1); _hataPopupHL(items); }
  else if(e.key==='ArrowUp'){ e.preventDefault(); _hataPopupIdx=Math.max(_hataPopupIdx-1,-1); _hataPopupHL(items); }
  else if(e.key==='Enter'){ e.preventDefault();
    if(_hataPopupIdx>=0&&items[_hataPopupIdx]) selectHataItem(items[_hataPopupIdx].dataset.hata);
    else{ closeHataPopup(); loadHata(); }
  }
  else if(e.key==='Escape'){ closeHataPopup(); }
}

function _hataPopupHL(items){
  items.forEach(function(el,i){
    el.classList.toggle('hpop-active',i===_hataPopupIdx);
    if(i===_hataPopupIdx) el.scrollIntoView({block:'nearest'});
  });
}

function loadHata(){
  var num = $v('hataInput').trim();
  if(!num) return;
  // 現場別 + グローバル を全結合して検索（breakで途中離脱しない）
  var _allHataEntries = [];
  // 現場別を優先して追加
  if(_siteId){
    try{ var _sr=localStorage.getItem('hata_master_'+_siteId); if(_sr){var _sp=JSON.parse(_sr);if(Array.isArray(_sp))_allHataEntries=_allHataEntries.concat(_sp);} }catch(e){}
  }
  // グローバルも追加（重複は hata番号で後から dedup）
  try{ var _gr=localStorage.getItem('hata_master'); if(_gr){var _gp=JSON.parse(_gr);if(Array.isArray(_gp))_allHataEntries=_allHataEntries.concat(_gp);} }catch(e){}
  var infoEl = document.getElementById('hataInfo');
  if(!_allHataEntries.length){ if(infoEl) infoEl.innerHTML='<span style="color:var(--yellow)">⚠ 旗揚げマスタ未登録（発注アプリで登録してください）</span>'; return; }
  // roadbed.html は num フィールド、order.html は hata フィールドを使用するため両対応
  var entry = _allHataEntries.find(function(e){ return String(e.hata||e.num||'')===String(num); });
  if(!entry){ if(infoEl) infoEl.innerHTML='<span style="color:var(--text3)">No.'+num+' は未登録</span>'; return; }
  _hataEntry = entry;
  var _dbBtn=document.getElementById('debugBtn'); if(_dbBtn)_dbBtn.style.display='';
  var _dpBtn=document.getElementById('saveDpBtn'); if(_dpBtn)_dpBtn.style.display=(_isAdmin?'':'none');
  // ① 主管（深側）DP/管下H: 新フォーマット(dp/dph) → roadbed.html形式(kanH) → rangeFrom(深側始点) → 旧形式(dp1)
  var _dp  = entry.dp  != null ? entry.dp  : (entry.dp1 != null ? entry.dp1 : (entry.rangeFrom != null ? entry.rangeFrom : null));
  var _dph = entry.dph != null ? entry.dph : (entry.kanH != null ? entry.kanH : (entry.dph1 != null ? entry.dph1 : null));
  sv('inDP1', _dp); sv('inDPH', _dph);
  // ② 2本目管のDP/管下H: entry.dp2 のみ有効
  // ※ rangeTo / dp_end は「勾配②端（浅側）DP」= 1本目管のもう一方の端であり2本目管ではない → 除外
  var dp2val  = entry.dp2 || '';
  var dph2val = entry.dp2 ? (entry.dph2 || '') : '';
  if(dp2val)  sv('inDP2', dp2val);
  if(dph2val) sv('inDPH2', dph2val);
  // 勾配②端（浅側）DP/管下H: 新フォーマット(dp1s/dph1s) → roadbed.html形式(rangeTo/dph2) → 旧形式(dp_end)
  // ※ rangeFrom は深側DPのため使用不可（上の inDP1 側で使用）
  var _dp1s  = entry.dp1s  != null ? entry.dp1s  : (entry.rangeTo  != null ? entry.rangeTo  : (entry.dp_end  != null ? entry.dp_end  : null));
  var _dph1s = entry.dph1s != null ? entry.dph1s : (entry.dph2     != null ? entry.dph2     : null);
  // 旗揚げマスタに勾配②端データがあればチェックなしでも自動でON
  if(_dp1s != null && !_pipeGradient[0]) {
    toggleGradient(0, true);
    var _gcb0 = document.getElementById('chkGrad0');
    if(_gcb0) _gcb0.checked = true;
  }
  if(_dp1s  != null) sv('inDP1s',  _dp1s);
  if(_dph1s != null) sv('inDPH1s', _dph1s);
  if(entry.dp2s != null && !_pipeGradient[1]) {
    toggleGradient(1, true);
    var _gcb1 = document.getElementById('chkGrad1');
    if(_gcb1) _gcb1.checked = true;
  }
  if(entry.dp2s  != null) sv('inDP2s',  entry.dp2s);
  if(entry.dph2s != null) sv('inDPH2s', entry.dph2s);
  var info = entry.name?entry.name+'　':'';
  info += '①DP:'+(_dp!=null?_dp+'m':'未登録')+' 管下H:'+(_dph!=null?_dph+'m':'未登録');
  if(dp2val) info += '　②DP:'+dp2val+'m 管下H:'+(dph2val||_dph)+'m';
  if(_dp1s != null) info += '　勾配②端DP:'+_dp1s+'m';
  if(infoEl) infoEl.innerHTML='<span style="color:#78350f">'+info+'</span>';
  // 図面: imgData(order.html形式) または img(roadbed.html形式) を統合してチェック
  var _rawImg = entry.imgData || entry.img || '';
  var hasImg = !!(_rawImg && (
    _rawImg.startsWith('data:image') ||
    _rawImg.startsWith('data:application/pdf')
  ));
  // img フィールドを imgData に正規化（表示を統一するため）
  if (!entry.imgData && entry.img) entry.imgData = entry.img;
  if (hasImg) {
    showDiagram(entry, true);
    recalcGL();
    saveState();
  } else if (entry.hasImg && _fbDb) {
    // imgData が別ドキュメントに保存されている場合、Firestore から取得
    var _imgKey = (_siteId ? 'hata_master_' + _siteId : 'hata_master_global') + '_img_' + num;
    _fbDb.collection('masters').doc(_imgKey).get()
      .then(function(imgDoc) {
        if (imgDoc.exists && imgDoc.data().imgData) {
          entry.imgData = imgDoc.data().imgData;
          // localStorageのエントリも更新してキャッシュ
          var mkLocal = _siteId ? 'hata_master_' + _siteId : 'hata_master';
          try {
            var localArr = JSON.parse(localStorage.getItem(mkLocal)||'[]');
            var idx = localArr.findIndex(function(r){ return String(r.hata||r.num||'')===String(num); });
            if (idx >= 0) { localArr[idx].imgData = entry.imgData; localStorage.setItem(mkLocal, JSON.stringify(localArr)); }
          } catch(e) {}
          showDiagram(entry, true);
        } else {
          showDiagram(entry, false);
        }
      }).catch(function() { showDiagram(entry, false); });
    recalcGL();
    saveState();
  } else {
    showDiagram(entry, false);
    recalcGL();
    saveState();
  }
}

function showDiagram(e, hasImg){
  var diag = document.getElementById('hataDiagram');
  if(!diag) return;
  var zCtrl = document.getElementById('ckDiagZoomCtrl');
  if(!hasImg){
    diag.className='hata-diagram';
    if(zCtrl) zCtrl.style.display='none';
    return;
  }
  // タイトル（hata||num 両対応）
  var title = document.getElementById('diagTitle');
  if(title) title.textContent = '📐 旗揚げ No.'+(e.hata||e.num||'')+(e.name?'  '+e.name:'');
  // 数値タグ
  var vals = document.getElementById('diagVals');
  if(vals){
    var v = '<span class="dval">① DP '+e.dp+'m</span>';
    v += '<span class="dval g">① 管下H '+e.dph+'m</span>';
    var dp2 = e.dp2||e.dp_end||'';
    if(dp2) v += '<span class="dval">② DP '+dp2+'m</span>';
    if(e.pipetype) v += '<span class="dval">'+e.pipetype+'</span>';
    if(e.note) v += '<span style="font-size:13px;color:#555;padding:3px 4px">'+e.note+'</span>';
    vals.innerHTML = v;
  }
  // 画像①（imgData=order.html形式 / img=roadbed.html形式 両対応）
  var imgSrc  = e.imgData || e.img  || '';
  var imgSrc2 = e.img2 || '';
  var wrap  = document.getElementById('diagImgWrap');
  var wrap2 = document.getElementById('diagImgWrap2');
  _ckDiagZoomLv=1.0; _ckDiagBaseW=0;

  function _renderImgPanel(el, src, idSuffix){
    if(!el) return;
    if(src && src.startsWith('data:image')){
      el.innerHTML = '<img class="diagram-img" id="ckDiagImg'+idSuffix+'" src="'+src+'" alt="図面" style="width:100%;">';
      var _imgEl = el.querySelector('img');
      if(_imgEl && !idSuffix) _imgEl.onload=function(){_ckDiagBaseW=_imgEl.naturalWidth||_imgEl.offsetWidth||600;};
    } else if(src && src.startsWith('data:application/pdf')){
      el.innerHTML = '<div class="diagram-noimg">📄 PDF図面</div>';
    } else {
      el.innerHTML = '';
    }
  }

  if(wrap){
    _renderImgPanel(wrap, imgSrc, '');
    if(imgSrc && imgSrc.startsWith('data:image')){
      if(zCtrl){ zCtrl.style.display='flex'; }
      var lbl=document.getElementById('ckDiagZoomLv'); if(lbl) lbl.textContent='100%';
    } else {
      if(zCtrl) zCtrl.style.display='none';
    }
  }
  if(wrap2){
    if(imgSrc2 && imgSrc2.startsWith('data:image')){
      _renderImgPanel(wrap2, imgSrc2, '2');
      wrap2.style.display='';
    } else {
      wrap2.innerHTML='';
      wrap2.style.display='none';
    }
  }
  diag.className = 'hata-diagram show';
  // 旗揚げエリアの下角を四角に
  var ha = document.querySelector('.hata-area');
  if(ha) ha.classList.add('diagram-open');
}

  if(diag) diag.className = 'hata-diagram';
  var ha = document.querySelector('.hata-area');
  if(ha) ha.classList.remove('diagram-open');
}

function saveRecord(){
  var date = $v('inDate');
  if(!date){ showWarningBanner('作業日を入力してください', 'inDate'); return; }
  var recorder = ($v('inRecorder')||'').trim();
  if(!recorder){ showWarningBanner('記録者（氏名）を入力してください', 'inRecorder'); return; }
  // 記録者名をデバイスに保存（次回起動時に自動入力）
  _saveRecorderName(recorder);
  var _doneCount = Object.keys(_checks).filter(function(k){ return _checks[k]; }).length;
  if(_doneCount === 0){
    if(!confirm('チェック済み項目が0件です。このまま保存しますか？')){ return; }
  }
  var ck = TYPE_CHECKLISTS[_typeKey];
  var total=0, done=0;
  if(ck){
    var recSecs = getEffectiveSections(ck, _typeKey);
    recSecs.forEach(function(sec,si){ if(sec._locked) return; sec.items.forEach(function(item,ii){ if(item.glType==='midList'&&ii>0&&sec.items[ii-1]&&sec.items[ii-1].glType==='sheet') return; var k=itemKey(si,ii); if(!_naItems[k]){total++;if(_checks[k])done++;} }); });
  }

  var siteName=''; var typeName='';
  var site = _sites.find(function(s){return s.id===_siteId;});
  if(site) siteName=site.name;
  var selType = document.getElementById('selType');
  if(selType&&selType.selectedIndex>0) typeName=selType.options[selType.selectedIndex].text;

  _history.unshift({
    id:Date.now(), date:date, siteName:siteName, siteId:_siteId,
    typeName:typeName, typeKey:_typeKey,
    company:_myCompany||'', team:_myTeam||'',
    mgmt:$v('inMgmtNo'), recorder:$v('inRecorder'), hata:$v('hataInput'),
    done:done, total:total,
    checks:JSON.parse(JSON.stringify(_checks)),
    na:JSON.parse(JSON.stringify(_naItems))
  });
  if(_history.length>200) _history.pop();
  saveHistory();
  if(_history.length > 0) fbSaveRecord('cl_records', _history[0]);
  alert('✅ 保存しました（'+done+'/'+total+' 完了）');
}
