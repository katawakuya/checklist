<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f5f4f0">
<title>写真撮影チェックリスト v2</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;font-size:14px;color:#1a1a1a;background:#f5f4f0;min-height:100vh}
.app{max-width:720px;margin:0 auto;padding:1rem}
.hd{background:#fff;border:1px solid #e0dfd8;border-radius:12px;padding:12px 16px;margin-bottom:.75rem;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.hd h1{font-size:16px;font-weight:600}
.hd p{font-size:11px;color:#888;margin-top:3px}
.tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:.75rem}
.tab{padding:6px 11px;border:1px solid #d0cfc8;border-radius:8px;background:#fff;cursor:pointer;font-size:11px;color:#666;transition:all .15s}
.tab.active{background:#dbeafe;border-color:#3b82f6;color:#1d4ed8;font-weight:600}
.tab:hover:not(.active){background:#f5f4f0}
.input-panel{background:#fff;border:1px solid #e0dfd8;border-radius:12px;padding:12px 16px;margin-bottom:.75rem;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.input-panel h2{font-size:12px;font-weight:600;margin-bottom:8px;color:#555}
.pavement-box{background:#f9f8f5;border:1px solid #e0dfd8;border-radius:8px;padding:8px 10px;margin-bottom:10px}
.pb-title{font-weight:600;font-size:11px;color:#666;margin-bottom:5px}
.pavement-layer{display:flex;align-items:center;gap:7px;padding:2px 0}
.layer-bar{width:8px;height:14px;border-radius:2px;flex-shrink:0}
.layer-label{font-size:11px;color:#555;flex:1}
.layer-t{font-size:12px;font-weight:600;color:#1a1a1a;min-width:40px;text-align:right}
.input-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.grp-label{grid-column:1/-1;font-size:11px;font-weight:600;color:#1d4ed8;background:#dbeafe;padding:3px 8px;border-radius:6px;margin-top:5px}
.input-group{display:flex;flex-direction:column;gap:2px}
.input-group label{font-size:11px;color:#555}
.input-group input{width:100%;padding:6px 8px;border:1px solid #d0cfc8;border-radius:6px;background:#fff;color:#1a1a1a;font-size:13px;font-family:inherit;transition:border-color .15s}
.input-group input:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 2px rgba(59,130,246,.15)}
.input-hint{font-size:10px;color:#aaa;margin-top:1px}
.calc-btn{margin-top:10px;padding:7px 18px;border:none;border-radius:8px;background:#3b82f6;color:#fff;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;transition:background .15s}
.calc-btn:hover{background:#2563eb}
.prog-bar{height:6px;background:#e0dfd8;border-radius:3px;margin-bottom:.75rem;overflow:hidden}
.prog-fill{height:100%;background:#22c55e;border-radius:3px;transition:width .35s}
.stats{display:flex;gap:8px;margin-bottom:.75rem}
.stat{flex:1;padding:8px;background:#fff;border:1px solid #e0dfd8;border-radius:10px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.stat .num{font-size:20px;font-weight:700}
.stat .lbl{font-size:10px;color:#888;margin-top:1px}
.section{margin-bottom:.75rem;border:1px solid #e0dfd8;border-radius:12px;overflow:hidden;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.sec-hd{padding:8px 13px;background:#f5f4f0;display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
.sec-title{font-size:12px;font-weight:600;flex:1}
.sec-badge{font-size:10px;padding:2px 8px;border-radius:10px;background:#dcfce7;color:#15803d;font-weight:600}
.sec-badge.warn{background:#fef9c3;color:#92400e}
.chev{font-size:10px;color:#888;transition:transform .2s;display:inline-block}
.chev.open{transform:rotate(180deg)}
.items{display:none}
.items.open{display:block}
.item{padding:9px 13px;border-top:1px solid #f0efe8}
.item:hover{background:#fafaf8}
.item-row{display:flex;align-items:flex-start;gap:8px}
.cbtn{width:26px;height:26px;border-radius:6px;border:1px solid #d0cfc8;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;margin-top:1px;transition:all .1s;font-family:inherit}
.cbtn:hover{background:#f5f4f0}
.cbtn.done{background:#dcfce7;border-color:#22c55e;color:#15803d}
.cbtn.na{background:#f5f4f0;border-color:#aaa;color:#666}
.item-body{flex:1;min-width:0}
.item-name{font-size:13px;font-weight:600;line-height:1.4}
.timing-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.timing-tag{display:inline-block;padding:2px 9px;border-radius:9px;font-size:11px;font-weight:600;background:#dbeafe;color:#1d4ed8;border:1px solid #bfdbfe}
.timing-tag.p2{background:#dcfce7;color:#166534;border-color:#bbf7d0}
.timing-tag.yuka{background:#fef3c7;color:#92400e;border-color:#fde68a}
.timing-tag.pending{background:#f5f4f0;color:#888;border:1px dashed #ccc;font-style:italic;font-weight:400}
.item-note{font-size:11px;color:#666;margin-top:5px;line-height:1.6;padding:5px 9px;background:#f9f8f5;border-radius:6px;border-left:2px solid #d0cfc8}
.actions{display:flex;gap:8px;margin-bottom:.75rem;align-items:center}
.reset-btn{padding:6px 13px;border:1px solid #fca5a5;border-radius:8px;background:#fff;color:#dc2626;cursor:pointer;font-size:11px;font-family:inherit;transition:all .15s}
.reset-btn:hover{background:#fee2e2}
.hata-area{background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:10px 13px;margin-bottom:10px}
.hata-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.hata-row label{font-size:12px;font-weight:600;color:#92400e;white-space:nowrap}
.hata-input{width:90px;padding:6px 8px;border:1.5px solid #fbbf24;border-radius:6px;background:#fff;font-size:15px;font-weight:700;font-family:inherit;color:#1a1a1a;text-align:center}
.hata-input:focus{outline:none;border-color:#f59e0b;box-shadow:0 0 0 2px rgba(251,191,36,.25)}
.hata-btn{padding:6px 12px;border:none;border-radius:6px;background:#f59e0b;color:#fff;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit}
.hata-btn:hover{background:#d97706}
.hata-info{margin-top:8px;font-size:11px;color:#78350f;background:#fef3c7;border-radius:6px;padding:6px 10px;display:none;line-height:1.7}
.hata-info.show{display:block}
.hata-img-btn{padding:4px 11px;border:1px solid #f59e0b;border-radius:6px;background:#fff;color:#92400e;cursor:pointer;font-size:11px;font-weight:600;font-family:inherit}
.hata-img-btn:hover{background:#fef3c7}
.hata-notfound{margin-top:8px;font-size:11px;color:#dc2626;display:none}
.hata-notfound.show{display:block}
.popup-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:9000;align-items:center;justify-content:center;padding:16px}
.popup-overlay.show{display:flex}
.popup-box{background:#fff;border-radius:14px;padding:18px;max-width:92vw;max-height:92vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.35);position:relative;min-width:260px}
.popup-close{position:absolute;top:10px;right:12px;background:none;border:none;font-size:22px;cursor:pointer;color:#888;line-height:1;padding:0 4px}
.popup-close:hover{color:#1a1a1a}
.popup-title{font-size:14px;font-weight:700;margin-bottom:3px;padding-right:30px;color:#1a1a1a}
.popup-meta{font-size:11px;color:#888;margin-bottom:10px}
.popup-vals{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}
.popup-val{background:#dbeafe;color:#1d4ed8;border-radius:6px;padding:4px 11px;font-size:12px;font-weight:700}
.popup-val.green{background:#dcfce7;color:#166534}
.popup-img{max-width:100%;border-radius:8px;border:1px solid #e0dfd8;display:block;margin:0 auto}
.popup-noimg{text-align:center;color:#aaa;font-size:12px;padding:20px 0}
/* 画面切替 */
.screen{display:none}.screen.active{display:block}
.screen-nav{display:flex;gap:6px;margin-bottom:.75rem}
.snav-btn{flex:1;padding:8px;border:1px solid #d0cfc8;border-radius:8px;background:#fff;cursor:pointer;font-size:12px;font-weight:600;color:#666;font-family:inherit;transition:all .15s}
.snav-btn.active{background:#1d4ed8;color:#fff;border-color:#1d4ed8}
/* マスタ画面 */
.master-card{background:#fff;border:1px solid #e0dfd8;border-radius:12px;padding:14px 16px;margin-bottom:.75rem;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.master-card h2{font-size:13px;font-weight:700;margin-bottom:12px;color:#1a1a1a}
.mfield{display:flex;flex-direction:column;gap:3px;margin-bottom:8px}
.mfield label{font-size:11px;color:#555;font-weight:600}
.mfield input,.mfield select{padding:7px 9px;border:1px solid #d0cfc8;border-radius:6px;font-size:13px;font-family:inherit;color:#1a1a1a;background:#fff}
.mfield input:focus,.mfield select:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 2px rgba(59,130,246,.15)}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.mgrid-full{grid-column:1/-1}
.msave-btn{width:100%;padding:9px;border:none;border-radius:8px;background:#22c55e;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:8px}
.msave-btn:hover{background:#16a34a}
.mclear-btn{width:100%;padding:7px;border:1px solid #d0cfc8;border-radius:8px;background:#fff;color:#555;font-size:12px;cursor:pointer;font-family:inherit}
.mlist-item{background:#f9f8f5;border:1px solid #e0dfd8;border-radius:8px;padding:10px 12px;margin-bottom:7px;display:flex;align-items:flex-start;gap:10px}
.mlist-no{font-size:20px;font-weight:900;color:#3b82f6;min-width:36px}
.mlist-body{flex:1;min-width:0}
.mlist-name{font-size:12px;font-weight:700;color:#1a1a1a}
.mlist-vals{font-size:11px;color:#555;margin-top:2px}
.mlist-acts{display:flex;gap:5px;flex-shrink:0}
.mact-btn{padding:4px 9px;border-radius:6px;border:1px solid #d0cfc8;background:#fff;cursor:pointer;font-size:11px;font-family:inherit}
.mact-del{color:#dc2626;border-color:#fca5a5}
.mact-del:hover{background:#fee2e2}
.mact-edit:hover{background:#f5f4f0}
.img-upload-area{border:2px dashed #d0cfc8;border-radius:8px;padding:14px;text-align:center;cursor:pointer;color:#888;font-size:12px;margin-bottom:8px;transition:border-color .15s}
.img-upload-area:hover{border-color:#3b82f6;color:#3b82f6}
.img-preview{margin-top:8px;display:none}
.img-preview img{max-width:100%;max-height:200px;border-radius:6px;border:1px solid #e0dfd8}
.mbadge{display:inline-block;background:#3b82f6;color:#fff;border-radius:10px;padding:1px 7px;font-size:10px;font-weight:700;margin-left:5px}
/* 施工日エリア */
.kojibi-area{background:#fff;border:1.5px solid #d0cfc8;border-radius:10px;padding:9px 13px;margin-bottom:8px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.kojibi-area label{font-size:12px;font-weight:700;color:#1a1a1a;white-space:nowrap}
.kojibi-input{padding:6px 10px;border:1.5px solid #3b82f6;border-radius:6px;font-size:14px;font-weight:700;font-family:inherit;color:#1a1a1a;background:#fff}
.kojibi-fixed{font-size:11px;color:#22c55e;font-weight:600;background:#dcfce7;padding:3px 9px;border-radius:6px;display:none}
.kojibi-fixed.show{display:inline-block}
/* ===== スマホ最適化 ===== */
/* タップ時のハイライト除去 */
*{-webkit-tap-highlight-color:transparent}
/* ボタン・入力のフォントサイズを16px以上に（iOS自動ズーム防止） */
input,select,button{font-size:16px}
/* チェックボタンをスマホで押しやすく大きく */
.cbtn{width:44px;height:44px;font-size:18px;border-radius:8px}
/* 項目の余白を広めに */
.item{padding:11px 12px}
/* ナビタブを小さくして3つ並ぶように */
.snav-btn{font-size:11px;padding:9px 4px;flex:1;min-width:0}
/* 型式タブも折り返しやすく */
.tab{padding:8px 10px;font-size:12px}
/* 入力パネルのグリッドをスマホで1列に */
@media(max-width:480px){
  .input-grid{grid-template-columns:1fr}
  .grp-label{margin-top:8px}
  .mgrid{grid-template-columns:1fr}
  .stats{gap:5px}
  .stat .num{font-size:17px}
  .hata-row{gap:6px}
  .hata-input{width:80px;font-size:16px}
  .screen-nav{gap:4px}
  .snav-btn{font-size:10px;padding:8px 3px}
  .popup-box{padding:14px;max-height:88vh}
  .kojibi-area{gap:7px}
  .kojibi-input{font-size:16px}
  /* ポップアップ内の入力幅をスマホに合わせる */
  input[id^="pop-"]{width:72px!important;font-size:15px!important}
  .mlist-acts{flex-direction:column}
}
/* 進捗バーを少し太く（タップしやすい視認性） */
.prog-bar{height:8px}
/* セクションヘッダをタップしやすく */
.sec-hd{padding:12px 13px;min-height:44px}
/* アクションボタン余白確保 */
.actions{margin-bottom:1rem}
/* ポップアップ閉じるボタン大きく */
.popup-close{font-size:26px;padding:4px 8px;top:8px;right:8px}
/* マスタ画面の保存・削除ボタンをタップしやすく */
.msave-btn{padding:13px;font-size:15px}
.mact-btn{padding:8px 13px;font-size:12px}
.mact-del{padding:8px 13px}
/* 施工記録画面CSVボタン */
.csv-btn{padding:10px 18px;font-size:13px}
/* 安全エリア対応（iPhone ノッチ・ホームバー） */
body{padding-bottom:env(safe-area-inset-bottom)}
.app{padding-bottom:calc(1rem + env(safe-area-inset-bottom))}
/* 施工記録画面 */
.rec-item{background:#f9f8f5;border:1px solid #e0dfd8;border-radius:8px;padding:10px 12px;margin-bottom:7px}
.rec-hata{font-size:18px;font-weight:900;color:#3b82f6}
.rec-date{font-size:12px;color:#555;font-weight:600}
.rec-vals{font-size:11px;color:#555;margin-top:3px}
.rec-progress{display:inline-block;padding:2px 8px;border-radius:9px;font-size:10px;font-weight:700}
.rec-done{background:#dcfce7;color:#15803d}
.rec-partial{background:#fef9c3;color:#92400e}
.csv-btn{padding:7px 16px;border:1px solid #3b82f6;border-radius:8px;background:#fff;color:#1d4ed8;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;margin-bottom:10px}
.csv-btn:hover{background:#dbeafe}
</style>
</head>
<body>
<div class="app">
<div class="hd">
  <h1>写真撮影チェックリスト v2</h1>
  <p>DP・配管下H を入力して計算ボタンを押すとGL値・床付け寸法が自動計算されます</p>
</div>
<!-- 画面切替ナビ -->
<div class="screen-nav">
  <button class="snav-btn active" id="snav-check" onclick="switchScreen('check')">📋 撮影チェック</button>
  <button class="snav-btn" id="snav-master" onclick="switchScreen('master')">🗂 旗揚げマスタ <span class="mbadge" id="m-badge">0</span></button>
  <button class="snav-btn" id="snav-records" onclick="switchScreen('records')">📊 施工記録 <span class="mbadge" id="rec-badge" style="background:#f59e0b">0</span></button>
  <button class="snav-btn" id="snav-itemlist" onclick="switchScreen('itemlist')">📷 品目一覧</button>
</div>

<!-- 撮影チェック画面 -->
<div class="screen active" id="screen-check">
<!-- 施工日エリア -->
<div class="kojibi-area">
  <label>📅 施工日</label>
  <input type="date" id="kojibi-input" class="kojibi-input">
  <span class="kojibi-fixed" id="kojibi-fixed">🔒 固定済み</span>
  <button onclick="unlockKojibi()" style="padding:4px 10px;border:1px solid #d0cfc8;border-radius:6px;background:#fff;font-size:11px;cursor:pointer;color:#555;font-family:inherit;">修正</button>
</div>
<div class="tabs" id="tabs"></div>
<div class="input-panel">
  <h2 id="inp-title">入力項目</h2>
  <!-- 旗揚げ番号エリア -->
  <div class="hata-area">
    <div class="hata-row">
      <label>🚩 旗揚げ番号</label>
      <input type="number" id="hata-num" class="hata-input" placeholder="例: 35"
        oninput="onHataInput(this.value)">
      <button class="hata-btn" onclick="applyHata()">読込</button>
      <button class="hata-img-btn" id="hata-img-btn" onclick="openHataPopup()" style="display:none">📐 図面</button>
      <button class="hata-img-btn" onclick="debugMaster()" style="background:#f5f4f0;color:#555;border-color:#ccc;margin-left:4px;">🔍 DB確認</button>
    </div>
    <div class="hata-info" id="hata-info"></div>
    <div class="hata-notfound" id="hata-notfound">⚠ この番号はマスタに登録されていません（右上の「旗揚げマスタ」タブで登録できます）</div>
  </div>
  <div id="pavement-display"></div>
  <div id="inp-grid" class="input-grid"></div>
  <button class="calc-btn" onclick="recalc()">計算して撮影リストを更新</button>
</div>
<!-- ポップアップ -->
<div class="popup-overlay" id="popup-overlay" onclick="closePopupOutside(event)">
  <div class="popup-box" id="popup-box">
    <button class="popup-close" onclick="closePopup()">✕</button>
    <div class="popup-title" id="popup-title"></div>
    <div class="popup-meta" id="popup-meta"></div>
    <div class="popup-vals" id="popup-vals"></div>
    <div id="popup-img-wrap"></div>
  </div>
</div>
<div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
<div class="stats">
  <div class="stat"><div class="num" id="s-total">0</div><div class="lbl">総項目</div></div>
  <div class="stat"><div class="num" id="s-done" style="color:#22c55e">0</div><div class="lbl">完了</div></div>
  <div class="stat"><div class="num" id="s-na" style="color:#888">0</div><div class="lbl">対象外</div></div>
  <div class="stat"><div class="num" id="s-pct" style="color:#3b82f6">0%</div><div class="lbl">進捗</div></div>
</div>
<div class="actions"><button class="reset-btn" onclick="resetCurrent()">チェックリセット</button></div>
<div id="list"></div>
</div><!-- /screen-check -->

<!-- 旗揚げマスタ画面 -->
<div class="screen" id="screen-master">
  <div class="master-card">
    <h2>🗂 旗揚げ番号マスタ登録</h2>
    <div class="mgrid">
      <div class="mfield"><label>旗揚げ番号 ＊</label><input type="number" id="mm-hata" placeholder="例: 35"></div>
      <div class="mfield"><label>管路名称（任意）</label><input type="text" id="mm-name" placeholder="例: A区間 φ200"></div>
      <div class="mfield"><label>DP（m） ＊</label><input type="number" step="0.001" id="mm-dp" placeholder="1.10"></div>
      <div class="mfield"><label>管下H（m） ＊</label><input type="number" step="0.001" id="mm-dph" placeholder="0.509"></div>
      <div class="mfield"><label>勾配始点DP（m）</label><input type="number" step="0.001" id="mm-dp1" placeholder="省略可"></div>
      <div class="mfield"><label>勾配始点管下H（m）</label><input type="number" step="0.001" id="mm-dph1" placeholder="省略可"></div>
      <div class="mfield"><label>勾配終点DP（m）</label><input type="number" step="0.001" id="mm-dp2" placeholder="省略可"></div>
      <div class="mfield"><label>勾配終点管下H（m）</label><input type="number" step="0.001" id="mm-dph2" placeholder="省略可"></div>
      <div class="mfield"><label>管種（任意）</label>
        <select id="mm-pipetype">
          <option value="">―選択―</option>
          <option>BD管φ200</option><option>FA管φ150</option>
          <option>E街ELφ100</option><option>E割φ100</option>
          <option>ELφ100</option><option>ETφ100</option>
          <option>Eφ130</option><option>KD/Yφ75</option>
          <option>BD管φ250</option>
        </select>
      </div>
      <div class="mfield"><label>備考</label><input type="text" id="mm-note" placeholder="メモ（任意）"></div>
    </div>
    <!-- 画像アップロード -->

<script>
const nv=v=>{if(v===""||v===null||v===undefined)return "";const x=parseFloat(v);return isNaN(x)?"":x;};
const gl=v=>(v!==""&&v!==null&&v!==undefined)?"GL-"+Math.abs(parseFloat(v)).toFixed(2)+"m":null;
const ft=v=>(v!==""&&v!==null&&v!==undefined)?"t="+parseFloat(v).toFixed(2)+"m":null;

function midList(start,limit,max){
  max=max||8;
  if(start===""||start===null)return [];
  var r=[],cur=start;
  for(var i=0;i<max;i++){var nx=parseFloat((cur+0.2).toFixed(4));if(nx>=limit)break;r.push(nx);cur=nx;}
  return r;
}

var PAVEMENT={
  "車道乗入れ40型":{c4:0.05,roadbed:0.35,layers:[
    {lb:"表層　再生密粒度AS混合物",t:50,type:"as"},
    {lb:"プライムコート（PK-3）",t:null,type:""},
    {lb:"上層路盤　RM-40",t:150,type:"rm"},
    {lb:"下層路盤　RC-40",t:200,type:"rc"}
  ]},
  "車道85型":{c4:0.10,roadbed:0.75,layers:[
    {lb:"表層　再生密粒度AS混合物",t:50,type:"as"},
    {lb:"タックコート（PK-4）",t:null,type:""},
    {lb:"基層　再生粗粒度AS混合物",t:50,type:"as"},
    {lb:"プライムコート（PK-3）",t:null,type:""},
    {lb:"上層路盤　RM-40",t:150,type:"rm"},
    {lb:"上層路盤　RM-40",t:150,type:"rm"},
    {lb:"上層路盤　RM-40",t:150,type:"rm"},
    {lb:"下層路盤　RC-40",t:150,type:"rc"},
    {lb:"下層路盤　RC-40",t:150,type:"rc"}
  ]},
  "歩道乗入れ30型":{c4:0.05,roadbed:0.25,layers:[
    {lb:"表層　再生密粒度AS混合物",t:50,type:"as"},
    {lb:"プライムコート（PK-3）",t:null,type:""},
    {lb:"路盤　RC-40",t:100,type:"rc"},
    {lb:"路盤　RC-40",t:150,type:"rc"}
  ]},
  "歩道乗入れ20型":{c4:0.05,roadbed:0.15,layers:[
    {lb:"表層　再生密粒度AS混合物",t:50,type:"as"},
    {lb:"プライムコート（PK-3）",t:null,type:""},
    {lb:"路盤　RC-40",t:150,type:"rc"}
  ]},
  "歩道14型":{c4:0.04,roadbed:0.10,layers:[
    {lb:"表層　再生密粒度AS混合物",t:40,type:"as"},
    {lb:"プライムコート（PK-3）",t:null,type:""},
    {lb:"路盤　RC-40",t:100,type:"rc"}
  ]}
};

var SHEETS={
  "車道乗入れ40型":{embedMm:300,sheetType:"40"},
  "車道85型":{embedMm:300,sheetType:"85"},
  "歩道乗入れ30型":{embedMm:200,sheetType:"30"},
  "歩道乗入れ20型":{embedMm:200,sheetType:"20"},
  "歩道14型":{embedMm:200,sheetType:"14"}
};

var PIPE_PARAMS=[
  {k:"c9", lb:"①通信管 DP (m)",           grp:"①通信管（直線部）",   def:"",hint:"例: 1.10　空白=なし"},
  {k:"c10",lb:"①通信管 配管下H (m)",       grp:null,                  def:"",hint:"例: 0.10"},
  {k:"c13",lb:"①通信管 勾配時DP (m)",      grp:"①通信管（勾配終点）", def:"",hint:"勾配終点のDP　空白=勾配なし"},
  {k:"c14",lb:"①通信管 勾配時配管下H (m)", grp:null,                  def:"",hint:"勾配終点の配管下H"},
  {k:"c17",lb:"②電力管 DP (m)",            grp:"②電力管（直線部）",   def:"",hint:"例: 1.10　空白=なし"},
  {k:"c18",lb:"②電力管 配管下H (m)",       grp:null,                  def:"",hint:"例: 0.10"},
  {k:"c21",lb:"②電力管 勾配時DP (m)",      grp:"②電力管（勾配終点）", def:"",hint:"勾配終点のDP　空白=勾配なし"},
  {k:"c22",lb:"②電力管 配管下H (m)",       grp:null,                  def:"",hint:"勾配終点の配管下H"}
];

function calcAll(p,pv,sheetType,embedMm){
  var c4=pv.c4,roadbed=pv.roadbed;
  var f40=parseFloat((-(c4+roadbed)).toFixed(4));
  var c9=nv(p.c9),c10=nv(p.c10)||0,c13=nv(p.c13),c14=nv(p.c14)||0;
  var c17=nv(p.c17),c18=nv(p.c18)||0,c21=nv(p.c21),c22=nv(p.c22)||0;
  var yuka1  = c9!==""  ? parseFloat((c9+c10).toFixed(4))   : "";
  var yuka1g = c13!=="" ? parseFloat((c13+c14).toFixed(4))  : "";
  var yuka2  = c17!=="" ? parseFloat((c17+c18).toFixed(4))  : "";
  var yuka2g = c21!=="" ? parseFloat((c21+c22).toFixed(4))  : "";
  var f23 = c9!==""  ? parseFloat((-c9).toFixed(4))  : "";
  var f24 = c13!=="" ? parseFloat((-c13).toFixed(4)) : "";
  var g25 = c17!=="" ? parseFloat((-c17).toFixed(4)) : "";
  var g26 = c21!=="" ? parseFloat((-c21).toFixed(4)) : "";
  var f28 = f23!=="" ? parseFloat((f23+0.1).toFixed(4)) : "";
  var f29 = f24!=="" ? parseFloat((f24+0.1).toFixed(4)) : "";
  var g28 = g25!=="" ? parseFloat((g25+0.1).toFixed(4)) : "";
  var g29 = g26!=="" ? parseFloat((g26+0.1).toFixed(4)) : "";
  var emb=embedMm/1000;
  function embed(dp,limit){if(dp==="")return "";var raw=parseFloat((dp+emb).toFixed(4));return raw>limit?limit:raw;}
  var f30 = c9!==""  ? embed(f23,f40) : "";
  var f31 = c13!=="" ? embed(f24,f40) : "";
  var g30 = c17!=="" ? embed(g25,f40) : "";
  var g31 = c21!=="" ? embed(g26,f40) : "";
  function midStart(ws,wsg){if(ws==="")return "";if(wsg==="")return parseFloat((ws+0.2).toFixed(4));return Math.abs(wsg-ws)>=0.3?parseFloat((wsg+0.2).toFixed(4)):parseFloat((ws+0.2).toFixed(4));}
  var fs=midStart(f28,f29),gs=midStart(g28,g29);
  var f_mid=fs!==""?midList(fs,f40):[];
  var g_mid=gs!==""?midList(gs,f40):[];
  return {c4:c4,f40:f40,yuka1:yuka1,yuka1g:yuka1g,yuka2:yuka2,yuka2g:yuka2g,
    f23:f23,f24:f24,g25:g25,g26:g26,f28:f28,f29:f29,g28:g28,g29:g29,
    f30:f30,f31:f31,g30:g30,g31:g31,f_mid:f_mid,g_mid:g_mid,
    hasT1:c9!=="",hasT1g:c13!=="",hasT2:c17!=="",hasT2g:c21!=="",
    embedMm:embedMm,sheetType:sheetType};
}

function glTag(v,pipe){
  var lbl=pipe===1?"①通信":"②電力";
  if(v!==""&&v!==null&&v!==undefined)
    return '<span class="timing-tag '+(pipe===2?"p2":"")+'">'+lbl+" "+gl(v)+"</span>";
  return '<span class="timing-tag pending">'+lbl+" DP入力後に計算</span>";
}

function buildItems(r){
  var items=[];
  var em=r.embedMm,st=r.sheetType;
  var showT1g=r.hasT1g,showT2g=r.hasT2g;
  function add(name,timingHtml,note,extra){
    items.push({name:name,timingHtml:timingHtml||"",note:note||"",extra:extra||[]});
  }
  function tr(html){return '<div class="timing-row">'+html+"</div>";}
  function tag(txt){return '<span class="timing-tag">'+txt+"</span>";}

  add("施工前状況","","規制をする前の状況写真。工事関係物が一切写っていないものが望ましい。道路全体が見える位置から撮影すること。");
  add("舗装壊し状況","","舗装をカッターや重機で壊している途中の状況を撮影。破断面がわかるように撮影する。");
  add("舗装積込み状況","","ASガラをダンプトラックへ積み込む状況を撮影。ナンバープレート・積載重量・許可番号が読めるように撮影。");
  add("舗装厚確認",tr(tag(ft(r.c4))),"剥がした舗装断面にスケールを当てて厚さを確認。カッターの切断面も一緒に撮影すること。");
  add("路盤積込み状況","","路盤材をダンプトラックへ積み込む状況を撮影。ナンバー・積載重量・許可番号が読めるように撮影。");
  add("手掘り状況","","既設管や構造物周辺を手掘りしている状況を撮影。掘削工具と作業者が写るようにすること。");
  add("発生土積込み状況","","掘削した発生土をダンプへ積み込む状況を撮影。ナンバー・積載重量が読めるように撮影。");

  var sParts=[],eParts=[];
  if(r.hasT1)  sParts.push("①通信管 床付け="+r.yuka1.toFixed(2)+"m");
  if(r.hasT2)  sParts.push("②電力管 床付け="+r.yuka2.toFixed(2)+"m");
  if(r.hasT1g) eParts.push("①通信管（勾配終点）床付け="+r.yuka1g.toFixed(2)+"m");
  if(r.hasT2g) eParts.push("②電力管（勾配終点）床付け="+r.yuka2g.toFixed(2)+"m");
  var noYuka=!r.hasT1&&!r.hasT2;
  var hintTh=noYuka?tr('<span class="timing-tag pending">DP入力後に床付け寸法を計算</span>'):"";
  var yukaNote="黒板に寸法（L・W・H）を記載してから撮影。床付け深さ（DP+配管下H）は下記の計算値を黒板に記入すること。";
  if(!showT1g&&!showT2g){
    add("掘削出来形検測",hintTh,yukaNote,sParts);
  } else {
    add("掘削出来形検測（始点側）","",yukaNote,sParts);
    add("掘削出来形検測（終点側・勾配低い方）","","勾配終点側でもL・W・Hを確認して撮影。黒板に勾配終点の寸法を記入。",eParts);
  }

  add("ダミー管","","特殊部（マンホール）内で配管固定用スペーサーの取付状況を撮影。スペーサー単体と配管を当てた状態の両方を撮影すること。");

  // 管台測定〜埋設シート：DP入力がある管のみ表示
  var showT1=r.hasT1||r.hasT1g;  // 通信管いずれか入力あり
  var showT2=r.hasT2||r.hasT2g;  // 電力管いずれか入力あり
  // どちらも未入力なら両方表示（初期表示用）
  var bothEmpty=!r.hasT1&&!r.hasT1g&&!r.hasT2&&!r.hasT2g;
  var dispT1=bothEmpty||showT1;
  var dispT2=bothEmpty||showT2;

  if(dispT1) add("①通信管　管台測定","","管台の長さが0.5m以上2.5m以内になっているか確認しながら撮影。管台の下に隙間なく転圧されている状態で撮影すること。");
  if(dispT2) add("②電力管　管台測定","","管台の長さが0.5m以上2.5m以内になっているか確認しながら撮影。管台の下に隙間なく転圧されている状態で撮影すること。");
  if(dispT1) add("①通信管　配管延長確認","","配管の全長がわかるように全景を撮影。起点から終点まで一枚に収める。");
  if(dispT2) add("②電力管　配管延長確認","","配管の全長がわかるように全景を撮影。起点から終点まで一枚に収める。");
  if(dispT1) add("①通信管　オフセット確認","","下振りを使ってL字側溝などの基準点からの距離を確認。基準点と配管の両方が写るように撮影。");
  if(dispT2) add("②電力管　オフセット確認","","下振りを使ってL字側溝などの基準点からの距離を確認。基準点と配管の両方が写るように撮影。");

  if(dispT1) add("①通信管　土被り確認",tr(glTag(r.f23,1)),"管の上面からGLまでの深さ（土被り）をスケールで確認しながら撮影。黒板にDP値を記載してから撮影。");
  if(dispT1&&showT1g) add("①通信管　土被り確認（勾配終点）",tr(glTag(r.f24,1)),"勾配終点側の土被り確認。低い方と高い方それぞれで撮影。黒板に勾配終点のDP値を記載。");
  if(dispT2) add("②電力管　土被り確認",tr(glTag(r.g25,2)),"管の上面からGLまでの深さをスケールで確認しながら撮影。黒板にDP値を記載してから撮影。");
  if(dispT2&&showT2g) add("②電力管　土被り確認（勾配終点）",tr(glTag(r.g26,2)),"勾配終点側の土被り確認。低い方と高い方それぞれで撮影。黒板に勾配終点のDP値を記載。");

  // ── 中間転圧（水締め）: 値が同じなら1項目に統合 ──
  var mizuNote="水を注いで土を締め固めた状態を撮影。管の上面から100mm以上の位置で撮影。";
  var mizuNoteG="勾配終点側の水締め。低い方・高い方それぞれでGL値を記載して撮影すること。";

  // 直線部
  var mizu28same = dispT1&&dispT2 && r.f28!==""&&r.g28!==""&&String(r.f28)===String(r.g28);
  if(mizu28same){
    // ①②同値 → 1項目にまとめて①②両タグ
    add("中間転圧（水締め）",tr(glTag(r.f28,1)+glTag(r.g28,2)),mizuNote);
  } else {
    if(dispT1) add("中間転圧（水締め）",tr(glTag(r.f28,1)),mizuNote);
    if(dispT2) add("中間転圧（水締め）",tr(glTag(r.g28,2)),mizuNote);
  }
  // 勾配終点
  var mizu29same = showT1g&&showT2g && r.f29!==""&&r.g29!==""&&String(r.f29)===String(r.g29);
  if(mizu29same){
    add("中間転圧（水締め）勾配終点",tr(glTag(r.f29,1)+glTag(r.g29,2)),mizuNoteG);
  } else {
    if(dispT1&&showT1g) add("中間転圧（水締め）勾配終点",tr(glTag(r.f29,1)),mizuNoteG);
    if(dispT2&&showT2g) add("中間転圧（水締め）勾配終点",tr(glTag(r.g29,2)),mizuNoteG);
  }

  // ── 中間転圧・埋設シート敷設: 値が同じなら1項目に統合 ──
  var embTxt="ランマーで転圧している状況とスケールを使ったGL値の高さ確認も撮影。管の上面から300mm上の位置に埋設シートを敷設した状態を撮影。シート全体が広がっていることを確認してから撮影。路盤材の中に入る場合は路盤材の下に敷くこと。管幅に応じてシート幅は400mm・600mm・800mm（400mm×2枚）とする。";
  var embTxtG="勾配時の中間転圧・埋設シート敷設。ランマー転圧状況とGL値をスケールで確認して撮影。低い方・高い方それぞれでH=GL-〇mを記載して撮影。管幅に応じてシート幅は400mm・600mm・800mm（400mm×2枚）とする。";

  // 直線部
  var emb30same = dispT1&&dispT2 && r.f30!==""&&r.g30!==""&&String(r.f30)===String(r.g30);
  if(emb30same){
    add("中間転圧・埋設シート敷設",tr(glTag(r.f30,1)+glTag(r.g30,2)),embTxt);

function getMaster(){
  try{return JSON.parse(localStorage.getItem("hata_master")||"[]");}catch(e){return [];}
}

function findHata(num){
  var master=getMaster();
  for(var i=0;i<master.length;i++){
    if(String(master[i].hata)===String(num)){
      // マスタにあるがimgDataが未登録の場合、埋め込み画像で補完
      var entry=master[i];
      if(!entry.imgData && HATA_IMAGES[String(num)]){
        entry=JSON.parse(JSON.stringify(entry)); // shallow copy
        entry.imgData=HATA_IMAGES[String(num)];
      }
      return entry;
    }
  }
  // localStorageにない場合でも埋め込み画像だけで表示
  if(HATA_IMAGES[String(num)]){
    return {hata:num, imgData:HATA_IMAGES[String(num)]};
  }
  return null;
}

function onHataInput(val){
  // 入力中はリセット
  var info=document.getElementById("hata-info");
  var notfound=document.getElementById("hata-notfound");
  var imgBtn=document.getElementById("hata-img-btn");
  info.className="hata-info";
  notfound.className="hata-notfound";
  imgBtn.style.display="none";
  _hataEntry=null;
}

function applyHata(){
  var val=document.getElementById("hata-num").value.trim();
  var info=document.getElementById("hata-info");
  var notfound=document.getElementById("hata-notfound");
  var imgBtn=document.getElementById("hata-img-btn");
  info.className="hata-info";
  notfound.className="hata-notfound";
  imgBtn.style.display="none";
  _hataEntry=null;

  if(!val){return;}
  var entry=findHata(val);
  if(!entry){
    notfound.className="hata-notfound show";
    return;
  }
  _hataEntry=entry;

  // 情報表示
  var lines=[];
  if(entry.name) lines.push("<b>"+entry.name+"</b>");
  if(entry.pipetype) lines.push("管種："+entry.pipetype);
  lines.push("DP：<b>"+entry.dp+"m</b>　管下H：<b>"+entry.dph+"m</b>");
  if(entry.dp1||entry.dph1) lines.push("勾配始点　DP："+entry.dp1+"m　管下H："+entry.dph1+"m");
  if(entry.dp2||entry.dph2) lines.push("勾配終点　DP："+entry.dp2+"m　管下H："+entry.dph2+"m");
  if(entry.note) lines.push("備考："+entry.note);
  info.innerHTML=lines.join("<br>");
  info.className="hata-info show";

  imgBtn.style.display="inline-block"; // 画像なしでもDP確認用に常に表示

  // DP・管下Hを入力欄に自動セット
  function setVal(id, v){
    var el=document.getElementById(id);
    if(el&&v!==undefined&&v!=="") el.value=v;
  }
  setVal("i_c9",  entry.dp);
  setVal("i_c10", entry.dph);
  setVal("i_c13", entry.dp1||"");
  setVal("i_c14", entry.dph1||"");
  setVal("i_c17", entry.dp);
  setVal("i_c18", entry.dph);
  setVal("i_c21", entry.dp2||"");
  setVal("i_c22", entry.dph2||"");
}

function getRecords(){
  try{return JSON.parse(localStorage.getItem('koji_records')||'[]');}catch(e){return [];}
}

  localStorage.setItem('koji_records', JSON.stringify(arr));
  updateRecBadge();
}
function updateRecBadge(){
  var n=getRecords().length;
  document.getElementById('rec-badge').textContent=n;
}

function recordCheck(itemName, done, total, hataNo){
  // 施工前状況を最初にチェックした時→施工日を固定＋記録開始
  if(itemName==='施工前状況' && !_kojibiFixed){
    fixKojibi();
  }
  // 現在の状態をスナップショットして記録更新
  saveCurrentRecord(done, total, hataNo);
}

function saveCurrentRecord(done, total, hataNo){
  var kojibi = getKojibi();
  var hata = hataNo || (document.getElementById('hata-num')?document.getElementById('hata-num').value.trim():'');
  var isComplete = (done+0 >= total+0 && total > 0);
  var now = new Date().toISOString();

  // レコードID = 施工日＋旗揚げ番号＋型式
  var rid = kojibi+'_hata'+hata+'_'+cur;

  var records = getRecords();
  var existing = records.find(function(r){return r.id===rid;});

  var entry = existing || {
    id: rid,
    kojibi: kojibi,
    hata: hata,
    type: cur,
    startedAt: now,
    dp: '',
    dph: ''
  };

  // DP・管下H取得
  var dpEl = document.getElementById('i_c9')||document.getElementById('i_c17');
  var dphEl= document.getElementById('i_c10')||document.getElementById('i_c18');
  if(dpEl&&dpEl.value) entry.dp = dpEl.value;
  if(dphEl&&dphEl.value) entry.dph = dphEl.value;

  entry.done = done;
  entry.total = total;
  entry.pct = total>0?Math.round(done/total*100):0;
  entry.updatedAt = now;
  if(isComplete && !entry.completedAt) entry.completedAt = now;

  if(existing){
    var idx = records.indexOf(existing);
    records[idx] = entry;
  } else {
    records.push(entry);
  }
  records.sort(function(a,b){ return b.kojibi.localeCompare(a.kojibi); });
  saveRecords(records);
}

function renderRecords(){
  updateRecBadge();
  var arr = getRecords();
  var el = document.getElementById('rec-list');
  if(!arr.length){
    el.innerHTML='<div style="text-align:center;color:#aaa;padding:20px;font-size:12px;">📂 まだ記録がありません</div>';
    return;
  }
  el.innerHTML = arr.map(function(r){
    var pctCls = r.pct>=100?'rec-done':'rec-partial';
    var pctTxt = r.pct>=100?'✅ 完了':'⏳ '+r.pct+'%';
    var compTxt = r.completedAt?'完了:'+r.completedAt.slice(0,16).replace('T',' '):'';
    return '<div class="rec-item">'
      +'<div style="display:flex;align-items:baseline;gap:10px;margin-bottom:4px;">'
      +'<span class="rec-date">'+r.kojibi+'</span>'
      +'<span class="rec-hata">No.'+r.hata+'</span>'
      +'<span style="font-size:11px;color:#888;">'+r.type+'</span>'
      +'<span class="rec-progress '+pctCls+'">'+pctTxt+'</span>'
      +'</div>'
      +'<div class="rec-vals">DP:'+r.dp+'m　管下H:'+r.dph+'m　'+r.done+'/'+r.total+'項目'
      +(compTxt?'　'+compTxt:'')+'</div>'
      +'<div style="margin-top:5px;display:flex;gap:6px;">'
      +'<button class="mact-btn mact-del" onclick="deleteRecord(this)" data-id="'+r.id+'">削除</button>'
      +'</div>'
      +'</div>';
  }).join('');
}
function deleteRecord(btn){
  var id=btn.getAttribute('data-id');
  if(!confirm('この記録を削除しますか？'))return;
  var arr=getRecords().filter(function(r){return r.id!==id;});
  saveRecords(arr);
  renderRecords();
}

  if(!confirm('施工記録を全件削除しますか？'))return;

function exportCSV(){
  var arr=getRecords();
  if(!arr.length){alert('記録がありません');return;}
  var rows=[['施工日','旗揚げNo','型式','DP(m)','管下H(m)','完了項目','総項目','進捗%','完了日時','更新日時']];
  arr.forEach(function(r){
    rows.push([
      r.kojibi, r.hata, r.type, r.dp, r.dph,
      r.done, r.total, r.pct,
      r.completedAt?r.completedAt.slice(0,16).replace('T',' '):'',
      r.updatedAt?r.updatedAt.slice(0,16).replace('T',' '):''
    ]);
  });
  var csv=rows.map(function(r){return r.join(',');}).join('\r\n');
  var bom='﻿';
  var blob=new Blob([bom+csv],{type:'text/csv;charset=utf-8;'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='施工記録_'+todayStr()+'.csv';
  a.click();
}

function initState(){
  Object.keys(SHEETS).forEach(function(s){
    appState[s]={params:{},checks:{}};
    PIPE_PARAMS.forEach(function(p){appState[s].params[p.k]=p.def;});
  });
}

function recalc(){
  var p={};
  PIPE_PARAMS.forEach(function(pm){
    var el=document.getElementById("i_"+pm.k);
    var v=el?el.value.trim():"";
    var f=parseFloat(v);
    p[pm.k]=(v===""||isNaN(f))?"":f;
    appState[cur].params[pm.k]=p[pm.k];
  });
  var sh=SHEETS[cur],pv=PAVEMENT[cur];
  calcRes[cur]=calcAll(p,pv,sh.sheetType,sh.embedMm);
  renderList();renderStats();
}

function setStatus(k,st){
  var c=appState[cur].checks;
  c[k]=(c[k]===st)?"none":st;
  renderList();
  renderStats();
  // 施工記録フック
  var r=calcRes[cur];
  if(r){
    var items=buildItems(r);
    // 今チェックした項目名を取得
    var idx=parseInt(k.replace('k',''));
    var itemName=items[idx]?items[idx].name:'';
    var total=items.length,done=0,na=0;
    items.forEach(function(_,i){var ck='k'+i;if(c[ck]==='done')done++;if(c[ck]==='na')na++;});
    recordCheck(itemName, done+na, total, '');
  }
}
function resetCurrent(){
  if(!confirm(cur+" のチェックをリセットしますか？"))return;
  appState[cur].checks={};renderList();renderStats();
}
function toggleSec(id){
  document.getElementById(id).classList.toggle("open");
  document.getElementById("ch_"+id).classList.toggle("open");
}

function renderTabs(){
  var c=document.getElementById("tabs");c.innerHTML="";
  Object.keys(SHEETS).forEach(function(s){
    var b=document.createElement("button");
    b.className="tab"+(s===cur?" active":"");
    b.textContent=s;
    b.onclick=(function(ss){return function(){cur=ss;renderInputPanel();recalc();};})(s);
    c.appendChild(b);
  });
}

function renderInputPanel(){
  document.getElementById("inp-title").textContent="入力項目："+cur;
  var pv=PAVEMENT[cur];
  var colorMap={as:"#fbbf24",rm:"#93c5fd",rc:"#86efac","":" transparent"};
  var lyrs=pv.layers.map(function(l){
    return '<div class="pavement-layer"><span class="layer-bar" style="background:'+(colorMap[l.type]||"transparent")+'"></span>'
      +'<span class="layer-label">'+l.lb+"</span>"
      +(l.t?'<span class="layer-t">'+l.t+"mm</span>":"")+"</div>";
  }).join("");
  document.getElementById("pavement-display").innerHTML=
    '<div class="pavement-box"><div class="pb-title">仮復旧路盤構成（PDFより・固定値）</div>'+lyrs+"</div>";
  var g=document.getElementById("inp-grid");g.innerHTML="";
  var lastGrp=null;
  PIPE_PARAMS.forEach(function(pm){
    if(pm.grp&&pm.grp!==lastGrp){
      var lb=document.createElement("div");lb.className="grp-label";lb.textContent=pm.grp;g.appendChild(lb);lastGrp=pm.grp;
    }
    var saved=appState[cur].params[pm.k];
    var d=document.createElement("div");d.className="input-group";
    d.innerHTML="<label>"+pm.lb+"</label>"
      +'<input id="i_'+pm.k+'" type="number" step="0.01" value="'+(saved!==""&&saved!==null?saved:"")+'" placeholder="'+pm.hint+'">'
      +'<div class="input-hint">'+pm.hint+"</div>";
    g.appendChild(d);
  });
}

function renderStats(){
  var r=calcRes[cur];if(!r)return;
  var items=buildItems(r),checks=appState[cur].checks;
  var total=0,done=0,na=0;
  items.forEach(function(_,i){total++;var k="k"+i;if(checks[k]==="done")done++;if(checks[k]==="na")na++;});
  var pct=total>0?Math.round((done+na)/total*100):0;
  document.getElementById("s-total").textContent=total;
  document.getElementById("s-done").textContent=done;
  document.getElementById("s-na").textContent=na;
  document.getElementById("s-pct").textContent=pct+"%";
  document.getElementById("prog-fill").style.width=pct+"%";
}

function renderList(){
  var c=document.getElementById("list");c.innerHTML="";
  var r=calcRes[cur];if(!r)return;
  var items=buildItems(r),checks=appState[cur].checks;
  // 「①通信管　中間転圧（水締め）」以降を「仮復旧・施工後」グループに
  var splitKeywords=["中間転圧（水締め）","中間転圧・埋設シート","中間転圧（路盤構成変更）","中間転圧","仮復旧","施工後"];
  var splitIdx=-1;
  for(var si=0;si<items.length;si++){
    var nm=items[si].name;
    if(nm.indexOf("中間転圧（水締め）")>=0){splitIdx=si;break;}
  }
  var groups=[{name:"施工前・施工中",items:[]},{name:"埋戻し・仮復旧・施工後",items:[]}];
  items.forEach(function(item,i){
    var g=(splitIdx>=0&&i>=splitIdx)?1:0;
    groups[g].items.push({item:item,i:i});
  });
  groups.forEach(function(group,gi){
    if(!group.items.length)return;
    var done=0,na=0;
    group.items.forEach(function(x){var k="k"+x.i;if(checks[k]==="done")done++;if(checks[k]==="na")na++;});
    var sid="s"+gi;
    var sec=document.createElement("div");sec.className="section";
    sec.innerHTML=
      '<div class="sec-hd" onclick="toggleSec(\''+sid+'\')">'
      +'<span class="sec-title">'+group.name+"</span>"
      +'<span class="sec-badge '+(done+na===group.items.length?"":"warn")+'">'+(done+na)+"/"+group.items.length+"</span>"
      +'<span class="chev open" id="ch_'+sid+'">▼</span></div>'
      +'<div class="items open" id="'+sid+'"></div>';
    c.appendChild(sec);
    var box=sec.querySelector("#"+sid);
    group.items.forEach(function(x){
      var item=x.item,i=x.i;
      var k="k"+i,st=checks[k]||"none";
      var extraHtml=(item.extra&&item.extra.length)
        ?'<div class="timing-row">'+item.extra.map(function(e){return '<span class="timing-tag yuka">'+e+"</span>";}).join("")+"</div>":"";
      var d=document.createElement("div");d.className="item";
      d.innerHTML='<div class="item-row">'
        +'<button class="cbtn '+(st==="done"?"done":"")+" "+'" onclick="setStatus(\''+k+'\',\'done\')" title="完了">✓</button>'
        +'<button class="cbtn '+(st==="na"?"na":"")+" "+'" onclick="setStatus(\''+k+'\',\'na\')" title="対象外">—</button>'
        +'<div class="item-body">'
        +'<div class="item-name">'+item.name+"</div>"
        +item.timingHtml+extraHtml
        +(item.note?'<div class="item-note">'+item.note+"</div>":"")
        +"</div></div>";
      box.appendChild(d);
    });
  });
}

function ilTypeMatch(types, filter){
  if(filter==='all') return true;
  if(types==='all') return true;
  return types.indexOf(filter)>=0;
}

function ilFilter(f){
  IL_FILTER=f;
  // ボタン更新
  var btnIds={'all':'il-btn-all','車道乗入れ40型':'il-btn-40','車道85型':'il-btn-85',
              '歩道乗入れ30型':'il-btn-30','歩道乗入れ20型':'il-btn-20','歩道14型':'il-btn-14'};
  Object.keys(btnIds).forEach(function(k){
    var b=document.getElementById(btnIds[k]);
    if(b) b.className='tab'+(k===f?' active':'');
  });
  ilRender();
}

function ilRender(){
  var c=document.getElementById('il-list');
  if(!c) return;
  c.innerHTML='';
  var no=0;
  IL_ITEMS.forEach(function(d){
    if(d.phase){
      // フェーズ行 — 絞り込み時も常に表示
      var ph=document.createElement('div');
      ph.style.cssText='padding:8px 13px;border-radius:10px;margin-bottom:6px;font-size:12px;font-weight:700;';
      ph.style.background=d.color; ph.style.color=d.fontColor;
      ph.textContent=d.phase;
      c.appendChild(ph);
      return;
    }
    // 型フィルター
    if(!ilTypeMatch(d.types, IL_FILTER)) return;
    no++;

    // 対象型バッジ生成
    var typeArr=(d.types==='all')?ALL_TYPES:d.types;
    var badgesHtml=typeArr.map(function(t){
      var short=t.replace('車道乗入れ','車道').replace('歩道乗入れ','歩道');
      var bg=t.indexOf('車道')>=0?'#dbeafe':'#dcfce7';
      var co=t.indexOf('車道')>=0?'#1d4ed8':'#166534';
      return '<span style="display:inline-block;padding:2px 7px;border-radius:8px;font-size:10px;font-weight:700;background:'+bg+';color:'+co+';margin:1px 2px;">'+short+'</span>';
    }).join('');

    var noteHtml=d.note
      ?'<div style="font-size:11px;color:#555;margin-top:5px;padding:5px 9px;background:#f9f8f5;border-radius:6px;border-left:2px solid #d0cfc8;line-height:1.6;white-space:pre-wrap;">'+d.note+'</div>'
      :'';
    var unitHtml=d.unit
      ?'<span style="display:inline-block;padding:2px 9px;border-radius:6px;font-size:11px;font-weight:700;background:#dbeafe;color:#1d4ed8;margin-left:6px;white-space:pre-wrap;">'+d.unit+'</span>'
      :'';
    var linkHtml=d.url
      ?'<a href="'+d.url+'" target="_blank" style="display:inline-block;padding:4px 10px;border:1px solid #7030a0;border-radius:7px;font-size:11px;font-weight:700;color:#7030a0;text-decoration:none;background:#ede7f6;flex-shrink:0;">📷 見本</a>'
      :'';

    var el=document.createElement('div');
    el.style.cssText='background:#fff;border:1px solid #e0dfd8;border-radius:10px;padding:10px 12px;margin-bottom:7px;box-shadow:0 1px 2px rgba(0,0,0,.04);';
    el.innerHTML=
      '<div style="display:flex;align-items:flex-start;gap:8px;">'
      +'<span style="font-size:18px;font-weight:900;color:#94a3b8;min-width:28px;line-height:1.3;">'+no+'</span>'
      +'<div style="flex:1;min-width:0;">'
      +'<div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap;">'
      +'<span style="font-size:13px;font-weight:700;">'+d.name+'</span>'
      +unitHtml
      +'</div>'
      +'<div style="margin-top:4px;">'+badgesHtml+'</div>'
      +noteHtml
      +'</div>'
      +linkHtml
      +'</div>';
    c.appendChild(el);
  });
  if(no===0){
    c.innerHTML='<div style="text-align:center;color:#aaa;padding:30px;font-size:13px;">該当する品目がありません</div>';
  }
}
