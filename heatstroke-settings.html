<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a237e">
<title>🛠 熱中症カード　設定</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#f5f5f5;color:#222;}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Meiryo',sans-serif;padding-bottom:40px;}

header{background:#1a237e;color:#fff;padding:14px 16px 12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 6px rgba(0,0,0,.3);}
header h1{font-size:17px;font-weight:700;}
header .sub{font-size:11px;opacity:.8;margin-top:3px;}

.container{max-width:600px;margin:0 auto;padding:14px 14px;}

.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.09);}
.card-title{font-size:12px;font-weight:700;color:#888;letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #eee;}

.field{margin-bottom:10px;}
.field label{display:block;font-size:12px;color:#555;font-weight:600;margin-bottom:4px;}
.field input,.field textarea,.field select{
  width:100%;padding:9px 10px;border:1.5px solid #ddd;border-radius:8px;
  font-size:14px;font-family:inherit;background:#fff;color:#222;
  transition:border-color .15s;
}
.field input:focus,.field textarea:focus{border-color:#1a237e;outline:none;}
.field textarea{resize:vertical;min-height:56px;line-height:1.5;}

.contact-block{border:1.5px solid #e8eaf6;border-radius:10px;padding:12px;margin-bottom:10px;background:#fafafa;position:relative;}
.contact-block .block-num{font-size:11px;font-weight:700;color:#9fa8da;margin-bottom:8px;}
.contact-block .btn-remove{position:absolute;top:10px;right:10px;background:none;border:none;color:#ef9a9a;font-size:18px;cursor:pointer;line-height:1;padding:2px 4px;}
.contact-block .btn-remove:active{color:#c62828;}

.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

.btn-add{width:100%;padding:9px;border:2px dashed #9fa8da;border-radius:8px;background:none;color:#3949ab;font-size:13px;font-weight:700;cursor:pointer;margin-top:4px;}
.btn-add:active{background:#e8eaf6;}

.preset-btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border:1.5px solid #b71c1c;border-radius:7px;background:none;color:#b71c1c;font-size:12px;font-weight:700;cursor:pointer;margin-bottom:12px;}
.preset-btn:active{background:#ffebee;}

.save-bar{position:fixed;bottom:0;left:0;right:0;padding:12px 16px;background:#fff;border-top:1px solid #e0e0e0;display:flex;gap:10px;z-index:200;}
.btn-save{flex:1;padding:13px;background:#1a237e;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;}
.btn-save:active{background:#0d47a1;}
.btn-open{padding:13px 16px;background:#b71c1c;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;}
.btn-open:active{background:#7f0000;}

.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:#1a237e;color:#fff;padding:9px 20px;border-radius:20px;font-size:13px;font-weight:700;z-index:999;opacity:0;transition:opacity .25s;pointer-events:none;}
.toast.show{opacity:1;}

.section-toggle{display:flex;align-items:center;gap:6px;padding:8px 0 4px;cursor:pointer;user-select:none;}
.section-toggle .arrow{font-size:12px;transition:transform .2s;color:#9fa8da;}
.section-toggle.open .arrow{transform:rotate(90deg);}
</style>
</head>
<body>

<header>
  <h1>🛠 熱中症カード　設定</h1>
  <div class="sub">入力内容は端末に保存され、緊急連絡アプリに反映されます</div>
</header>

<div class="container">

  <!-- プリセット -->
  <button class="preset-btn" onclick="loadPreset()">📋 小田原現場　デフォルト値を読込</button>

  <!-- 現場情報 -->
  <div class="card">
    <div class="card-title">🏗 現場情報</div>
    <div class="field"><label>工事名</label><input id="siteName" type="text" placeholder="例：〇〇地下埋設管敷設工事"></div>
    <div class="field"><label>現場住所（ヘッダー表示）</label><input id="siteAddr" type="text" placeholder="例：現場：〇〇市〇〇2-33-11他"></div>
    <div class="field"><label>フッター注記（年度・施工者など）</label><textarea id="footerText" rows="2" placeholder="例：令和7年度　株式会社型枠屋"></textarea></div>
  </div>

  <!-- 担当者連絡先 -->
  <div class="card">
    <div class="card-title">📞 担当者連絡先</div>
    <div id="contactsWrap"></div>
    <button class="btn-add" onclick="addContact()">＋ 担当者を追加</button>
  </div>

  <!-- 病院 -->
  <div class="card">
    <div class="card-title">🏥 最寄り医療機関</div>
    <div class="field"><label>病院名</label><input id="hospName" type="text" placeholder="例：小田原市民病院"></div>
    <div class="field"><label>住所</label><input id="hospAddr" type="text" placeholder="例：〒250-8558　神奈川県小田原市久野46"></div>
    <div class="field"><label>電話番号（ハイフンなし）</label><input id="hospTel" type="tel" placeholder="例：0465343175"></div>
    <div class="field"><label>地図検索キーワード</label><input id="hospMap" type="text" placeholder="例：神奈川県小田原市久野46+小田原市民病院"></div>
  </div>

  <!-- 協力業者 -->
  <div class="card">
    <div class="card-title">🤝 協力業者　緊急連絡先</div>
    <div id="subContactsWrap"></div>
    <button class="btn-add" onclick="addSubContact()">＋ 業者を追加</button>
  </div>

</div>

<!-- 保存バー -->
<div class="save-bar">
  <button class="btn-save" onclick="saveConfig()">💾 保存する</button>
  <a class="btn-open" href="heatstroke.html">🌡 カードを開く</a>
</div>

<div id="toast" class="toast">保存しました ✓</div>

<script>
var PHONE_SVG='<svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.27-.27.68-.36 1.04-.22 1.12.42 2.33.65 3.56.65.55 0 1 .45 1 1V20c0 .55-.45 1-1 1C10.18 21 3 13.82 3 5c0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.22 1.01l-2.25 2.22z"/></svg>';

var DEFAULT_CONFIG = {
  siteName: '小田原市富士フィルム地下埋設管敷設工事',
  siteAddr: '現場：小田原市扇町2-33-11他',
  footerText: '小田原市富士フィルム地下埋設管敷設工事\n令和7年度　株式会社型枠屋',
  contacts: [
    {role:'現場責任者',       name:'三枝　裕太',    romaji:'Saegusa Yuta',       tel:'09092901004'},
    {role:'安全衛生管理者',   name:'柴田　興平',    romaji:'Shibata Kohei',      tel:'08057047075'},
    {role:'元請担当（昼間）', name:'山本　克貴',    romaji:'Yamamoto Katsuki',   tel:'08054000259'},
    {role:'元請　夜間・休日緊急', name:'夜間緊急連絡先', romaji:'',             tel:'09048124651'},
  ],
  hospital: {
    name: '小田原市民病院',
    addr: '〒250-8558　神奈川県小田原市久野46',
    tel:  '0465343175',
    map:  '神奈川県小田原市久野46+小田原市民病院'
  },
  subContacts: [
    {role:'（1次）株式会社型枠屋',            name:'佐藤　嘉秀',  romaji:'Sato Yoshihide',    tel:'09027279654'},
    {role:'（2次）クラフトマンシップ・パートナーズ', name:'萩原　一彦', romaji:'Hagiwara Kazuhiko', tel:'09086440519'},
  ]
};

// ── 連絡先ブロック生成 ──
var _contactCount = 0;
var _subContactCount = 0;

function addContact(data){
  _contactCount++;
  var idx = _contactCount;
  var d = data || {};
  var wrap = document.getElementById('contactsWrap');
  var div = document.createElement('div');
  div.className = 'contact-block';
  div.dataset.idx = idx;
  div.innerHTML =
    '<div class="block-num">担当者 '+idx+'</div>'+
    '<button class="btn-remove" onclick="removeBlock(this)" title="削除">✕</button>'+
    '<div class="field"><label>役割・役職</label><input type="text" name="c_role" placeholder="例：現場責任者" value="'+(d.role||'')+'"></div>'+
    '<div class="row2">'+
      '<div class="field"><label>氏名</label><input type="text" name="c_name" placeholder="例：山田　太郎" value="'+(d.name||'')+'"></div>'+
      '<div class="field"><label>ローマ字（任意）</label><input type="text" name="c_romaji" placeholder="Yamada Taro" value="'+(d.romaji||'')+'"></div>'+
    '</div>'+
    '<div class="field"><label>電話番号（ハイフンなし）</label><input type="tel" name="c_tel" placeholder="例：09012345678" value="'+(d.tel||'')+'"></div>';
  wrap.appendChild(div);
}

function addSubContact(data){
  _subContactCount++;
  var idx = _subContactCount;
  var d = data || {};
  var wrap = document.getElementById('subContactsWrap');
  var div = document.createElement('div');
  div.className = 'contact-block';
  div.dataset.subIdx = idx;
  div.innerHTML =
    '<div class="block-num">業者 '+idx+'</div>'+
    '<button class="btn-remove" onclick="removeBlock(this)" title="削除">✕</button>'+
    '<div class="field"><label>会社名・役割</label><input type="text" name="s_role" placeholder="例：（1次）株式会社〇〇" value="'+(d.role||'')+'"></div>'+
    '<div class="row2">'+
      '<div class="field"><label>氏名</label><input type="text" name="s_name" placeholder="例：鈴木　一郎" value="'+(d.name||'')+'"></div>'+
      '<div class="field"><label>ローマ字（任意）</label><input type="text" name="s_romaji" placeholder="Suzuki Ichiro" value="'+(d.romaji||'')+'"></div>'+
    '</div>'+
    '<div class="field"><label>電話番号（ハイフンなし）</label><input type="tel" name="s_tel" placeholder="例：09012345678" value="'+(d.tel||'')+'"></div>';
  wrap.appendChild(div);
}

function removeBlock(btn){
  btn.closest('.contact-block').remove();
}

// ── プリセット読込 ──
function loadPreset(){
  if(!confirm('現在の入力をデフォルト値で上書きしますか？')) return;
  applyConfig(DEFAULT_CONFIG);
}

// ── 設定を画面に反映 ──
function applyConfig(cfg){
  document.getElementById('siteName').value   = cfg.siteName  || '';
  document.getElementById('siteAddr').value   = cfg.siteAddr  || '';
  document.getElementById('footerText').value = cfg.footerText|| '';
  document.getElementById('hospName').value   = (cfg.hospital||{}).name|| '';
  document.getElementById('hospAddr').value   = (cfg.hospital||{}).addr|| '';
  document.getElementById('hospTel').value    = (cfg.hospital||{}).tel || '';
  document.getElementById('hospMap').value    = (cfg.hospital||{}).map || '';

  // 担当者リセット
  document.getElementById('contactsWrap').innerHTML=''; _contactCount=0;
  (cfg.contacts||[]).forEach(function(c){ addContact(c); });

  // 協力業者リセット
  document.getElementById('subContactsWrap').innerHTML=''; _subContactCount=0;
  (cfg.subContacts||[]).forEach(function(c){ addSubContact(c); });
}

// ── 画面から設定を収集 ──
function collectConfig(){
  var cfg = {
    siteName:    document.getElementById('siteName').value.trim(),
    siteAddr:    document.getElementById('siteAddr').value.trim(),
    footerText:  document.getElementById('footerText').value.trim(),
    hospital: {
      name: document.getElementById('hospName').value.trim(),
      addr: document.getElementById('hospAddr').value.trim(),
      tel:  document.getElementById('hospTel').value.replace(/[^0-9]/g,''),
      map:  document.getElementById('hospMap').value.trim()
    },
    contacts: [],
    subContacts: []
  };
  document.querySelectorAll('#contactsWrap .contact-block').forEach(function(b){
    cfg.contacts.push({
      role:   b.querySelector('[name=c_role]').value.trim(),
      name:   b.querySelector('[name=c_name]').value.trim(),
      romaji: b.querySelector('[name=c_romaji]').value.trim(),
      tel:    b.querySelector('[name=c_tel]').value.replace(/[^0-9]/g,'')
    });
  });
  document.querySelectorAll('#subContactsWrap .contact-block').forEach(function(b){
    cfg.subContacts.push({
      role:   b.querySelector('[name=s_role]').value.trim(),
      name:   b.querySelector('[name=s_name]').value.trim(),
      romaji: b.querySelector('[name=s_romaji]').value.trim(),
      tel:    b.querySelector('[name=s_tel]').value.replace(/[^0-9]/g,'')
    });
  });
  return cfg;
}

// ── 保存 ──
function saveConfig(){
  var cfg = collectConfig();
  localStorage.setItem('hs_config', JSON.stringify(cfg));
  showToast('保存しました ✓');
}

function showToast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2200);
}

// ── 初期化 ──
window.addEventListener('DOMContentLoaded', function(){
  var saved = localStorage.getItem('hs_config');
  if(saved){
    try{ applyConfig(JSON.parse(saved)); return; }catch(e){}
  }
  // 初回：デフォルトを表示
  applyConfig(DEFAULT_CONFIG);
});
</script>
</body>
</html>
