<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>路盤マスタ登録ツール</title>
<style>
  body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 16px; background: #f0f4f8; }
  h2 { color: #1e2233; }
  .card { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
  label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; }
  input[type=email], input[type=password] { width: 100%; box-sizing: border-box; padding: 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 15px; margin-bottom: 12px; }
  button { padding: 12px 24px; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; }
  .btn-login  { background: #1d4ed8; color: #fff; width: 100%; }
  .btn-upload { background: #16a34a; color: #fff; width: 100%; margin-top: 8px; }
  .btn-logout { background: #e53e3e; color: #fff; width: 100%; margin-top: 8px; }
  #status { margin-top: 12px; padding: 12px; border-radius: 8px; display: none; }
  .ok  { background: #d1fae5; color: #065f46; }
  .err { background: #fee2e2; color: #991b1b; }
  .info { background: #dbeafe; color: #1e40af; }
  .preset { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px; padding: 12px; margin-bottom: 8px; font-size: 13px; }
  .preset h4 { margin: 0 0 6px; color: #1e2233; }
  .layer { display: flex; gap: 8px; align-items: center; margin-bottom: 4px; }
  .layer-name { flex: 1; }
  .layer-t { color: #6b7280; font-size: 12px; width: 70px; text-align: right; }
  #userInfo { font-size: 13px; color: #374151; margin-bottom: 8px; display: none; }
</style>
</head>
<body>

<h2>🏗️ 路盤マスタ登録ツール</h2>
<p style="font-size:13px;color:#555;">管理者でFirebaseにログインして、下記の路盤構成を登録します。</p>

<!-- ログインフォーム -->
<div class="card" id="loginCard">
  <label>管理者メールアドレス</label>
  <input type="email" id="email" value="sato.k.katawakuya@gmail.com">
  <label>パスワード</label>
  <input type="password" id="password" placeholder="パスワードを入力">
  <button class="btn-login" onclick="doLogin()">🔑 ログイン</button>
</div>

<!-- 登録内容プレビュー -->
<div class="card">
  <b>登録予定の路盤構成（2件）</b>

  <div class="preset" style="margin-top:10px;">
    <h4>① 小田原扇町計画NO1〜NO4</h4>
    <div class="layer"><span class="layer-name">As表層工（密粒度）</span><span class="layer-t">t=50mm</span></div>
    <div class="layer"><span class="layer-name">上層路盤工 RM-30</span><span class="layer-t">t=100mm</span></div>
    <div class="layer"><span class="layer-name">下層路盤工 RC-40</span><span class="layer-t">t=150mm</span></div>
    <div style="font-size:12px;color:#6b7280;margin-top:4px;">合計 H=300mm</div>
  </div>

  <div class="preset">
    <h4>② 小田原扇町計画NO5+2.50</h4>
    <div style="font-size:11px;color:#4f8ef7;margin-bottom:4px;">▼ AS層</div>
    <div class="layer"><span class="layer-name">　密粒改良1</span><span class="layer-t">t=50mm</span></div>
    <div class="layer"><span class="layer-name">　粗粒度AS</span><span class="layer-t">t=50mm</span></div>
    <div class="layer"><span class="layer-name">　瀝青安定処理</span><span class="layer-t">t=100mm</span></div>
    <div style="font-size:11px;color:#888;margin-bottom:4px;margin-top:6px;">▼ 路盤</div>
    <div class="layer"><span class="layer-name">　既設路盤</span><span class="layer-t">t=300mm</span></div>
    <div style="font-size:12px;color:#6b7280;margin-top:4px;">合計 H=500mm</div>
  </div>
</div>

<!-- ログイン後の操作エリア -->
<div class="card" id="actionCard" style="display:none;">
  <div id="userInfo"></div>
  <button class="btn-upload" onclick="uploadPresets()">📤 Firebase に路盤マスタを登録する</button>
  <button class="btn-logout" onclick="doLogout()">🚪 ログアウト</button>
</div>

<div id="status"></div>

<!-- Firebase SDK (compat v9) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCuSWsmOZhseuBV7dJt6-iSYA1MCYzDF9o",
  authDomain: "alrit-kandenkou.firebaseapp.com",
  projectId: "alrit-kandenkou",
  storageBucket: "alrit-kandenkou.firebasestorage.app",
  messagingSenderId: "640432772833",
  appId: "1:640432772833:web:ab2aff11980621322809a0"
};
const ADMIN_EMAIL = 'sato.k.katawakuya@gmail.com';

firebase.initializeApp(FIREBASE_CONFIG);
const db   = firebase.firestore();
const auth = firebase.auth();

function showStatus(msg, type) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = type;
  el.style.display = 'block';
}

function doLogin() {
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('password').value;
  if (!email || !pass) { showStatus('メールアドレスとパスワードを入力してください', 'err'); return; }
  showStatus('ログイン中...', 'info');
  auth.signInWithEmailAndPassword(email, pass)
    .then(cred => {
      if (cred.user.email !== ADMIN_EMAIL) {
        auth.signOut();
        showStatus('このアカウントには管理者権限がありません', 'err');
        return;
      }
      document.getElementById('loginCard').style.display = 'none';
      document.getElementById('actionCard').style.display = 'block';
      document.getElementById('userInfo').textContent = '✅ ログイン済み: ' + cred.user.email;
      document.getElementById('userInfo').style.display = 'block';
      showStatus('ログイン成功！「Firebase に登録する」ボタンを押してください。', 'ok');
    })
    .catch(e => showStatus('ログイン失敗: ' + e.message, 'err'));
}

function doLogout() {
  auth.signOut().then(() => {
    document.getElementById('loginCard').style.display = 'block';
    document.getElementById('actionCard').style.display = 'none';
    showStatus('ログアウトしました', 'info');
  });
}

async function uploadPresets() {
  const user = auth.currentUser;
  if (!user || user.email !== ADMIN_EMAIL) {
    showStatus('管理者でログインしてください', 'err'); return;
  }
  showStatus('Firebaseから現在のデータを読み込み中...', 'info');

  // --- 登録するプリセット2件 ---
  const now = new Date().toISOString().slice(0,10);

  const newEntries = [
    {
      key:   'rm_odawara_no1to4',
      label: '小田原扇町計画NO1〜NO4',
      color: '#4f8ef7',
      // 仮復旧
      kariAsLayers: [{ name: 'As表層工（密粒度）', t: 50 }],
      kariRmSize:   30,
      kariRmH:      0.10,
      kariRmLayers: 't=100mm',
      kariRcSize:   40,
      kariRcH:      0.15,
      kariRcLayers: 't=150mm',
      kariTotalH:   0.30,
      // 本復旧（同じ構成）
      honAsLayers: [{ name: 'As表層工（密粒度）', t: 50 }],
      honRmSize:   30,
      honRmH:      0.10,
      honRmLayers: 't=100mm',
      honRcSize:   40,
      honRcH:      0.15,
      honRcLayers: 't=150mm',
      honTotalH:   0.30,
      updatedAt: now,
    },
    {
      key:   'rm_odawara_no5',
      label: '小田原扇町計画NO5+2.50',
      color: '#f59e0b',
      // 仮復旧
      // AS層：密粒改良1 + 粗粒度AS + 瀝青安定処理
      kariAsLayers: [
        { name: '密粒改良1',    t: 50 },
        { name: '粗粒度AS',     t: 50 },
        { name: '瀝青安定処理', t: 100 },
      ],
      kariRmSize:   40,
      kariRmH:      0,      // 上層路盤なし
      kariRmLayers: '',
      kariRcSize:   40,
      kariRcH:      0.30,   // 既設路盤（RC欄を流用、ラベルは「既設路盤」）
      kariRcLayers: '既設路盤',
      kariTotalH:   0.50,
      // 本復旧（同じ構成）
      honAsLayers: [
        { name: '密粒改良1',    t: 50 },
        { name: '粗粒度AS',     t: 50 },
        { name: '瀝青安定処理', t: 100 },
      ],
      honRmSize:   40,
      honRmH:      0,
      honRmLayers: '',
      honRcSize:   40,
      honRcH:      0.30,
      honRcLayers: '既設路盤',
      honTotalH:   0.50,
      updatedAt: now,
    }
  ];

  try {
    // 既存データを取得
    const snap = await db.collection('masters').doc('roadbed_masters').get();
    let existing = [];
    if (snap.exists) {
      existing = snap.data().data || [];
    }

    // 同じkeyがあれば上書き、なければ追加
    for (const entry of newEntries) {
      const idx = existing.findIndex(r => r.key === entry.key);
      if (idx >= 0) {
        existing[idx] = entry;
        console.log('上書き:', entry.label);
      } else {
        existing.push(entry);
        console.log('追加:', entry.label);
      }
    }

    // Firebase に保存
    await db.collection('masters').doc('roadbed_masters').set({
      data: existing,
      updatedAt: new Date().toISOString()
    });

    showStatus(
      `✅ 登録完了！\n` +
      `「小田原扇町計画NO1〜NO4」\n` +
      `「小田原扇町計画NO5+2.50」\n` +
      `の路盤マスタを Firebase に保存しました。\n` +
      `（計 ${existing.length} 件）`,
      'ok'
    );
  } catch (e) {
    showStatus('エラー: ' + e.message, 'err');
  }
}
</script>
</body>
</html>
