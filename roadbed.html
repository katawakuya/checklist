<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>路盤構成管理 v1.1</title>
<style>
:root {
  --bg:#0f1117; --surface:#1a1d2e; --surface2:#22263a; --surface3:#2a2f45;
  --border:#2e3450; --text:#e2e8f0; --text2:#94a3b8; --text3:#64748b;
  --blue:#4f8ef7; --green:#22c55e; --orange:#f59e0b; --red:#ef4444;
  --purple:#a78bfa; --mono:'Consolas',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Hiragino Kaku Gothic Pro','Meiryo',sans-serif;font-size:14px;min-height:100vh;}

header{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:0;z-index:100;}
header h1{font-size:16px;font-weight:700;color:var(--text);white-space:nowrap;}
header .site-sel{flex:1;min-width:160px;max-width:300px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:8px 12px;font-size:13px;}
header .btn-admin{margin-left:auto;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text2);padding:7px 14px;cursor:pointer;font-size:13px;}
header .btn-admin.active{background:rgba(79,142,247,.2);border-color:var(--blue);color:var(--blue);}
.admin-badge{background:rgba(79,142,247,.15);border:1px solid var(--blue);color:var(--blue);border-radius:6px;padding:3px 10px;font-size:12px;display:none;}

.main{display:grid;grid-template-columns:1fr 1fr;gap:0;height:calc(100vh - 54px);}
@media(max-width:700px){.main{grid-template-columns:1fr;height:auto;}}

.panel-left{border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.viewer-toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.viewer-toolbar label{font-size:12px;color:var(--text2);}
.btn-file{background:var(--blue);color:#fff;border:none;border-radius:7px;padding:7px 14px;cursor:pointer;font-size:12px;white-space:nowrap;}
.page-nav{display:flex;align-items:center;gap:6px;margin-left:auto;}
.page-nav button{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:13px;}
.page-nav span{font-size:12px;color:var(--text2);white-space:nowrap;}
.viewer-area{flex:1;overflow:auto;display:flex;align-items:flex-start;justify-content:center;background:#111;padding:8px;}
.viewer-area canvas,.viewer-area img{max-width:100%;height:auto;display:block;box-shadow:0 2px 12px rgba(0,0,0,.5);}
.viewer-empty{color:var(--text3);font-size:13px;text-align:center;margin:auto;padding:40px;}

.panel-right{display:flex;flex-direction:column;overflow-y:auto;}
.form-area{padding:14px 16px;flex:1;}
.section-title{font-size:13px;font-weight:700;color:var(--text2);margin:14px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--border);}
.field{margin-bottom:10px;}
.field label{display:block;font-size:11px;color:var(--text3);margin-bottom:4px;}
.field input[type=text],.field input[type=number],.field select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);padding:8px 10px;font-size:13px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.tab-bar{display:flex;gap:4px;margin-bottom:12px;background:var(--surface2);border-radius:9px;padding:4px;}
.tab-bar button{flex:1;padding:7px;border:none;border-radius:7px;cursor:pointer;font-size:12px;font-weight:600;color:var(--text2);background:none;}
.tab-bar button.active{background:var(--blue);color:#fff;}
.add-btn{background:none;border:1px dashed var(--border);color:var(--text3);border-radius:7px;padding:6px;cursor:pointer;font-size:12px;width:100%;margin-bottom:8px;}
.add-btn:hover{border-color:var(--blue);color:var(--blue);}
.total-chip{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:6px 12px;font-size:12px;color:var(--text2);text-align:right;margin-top:6px;}
.total-chip b{color:var(--purple);}
.btn-save{background:var(--blue);color:#fff;border:none;border-radius:9px;padding:12px;cursor:pointer;font-size:14px;font-weight:700;width:100%;margin-top:12px;}
.btn-cancel{background:var(--surface2);color:var(--text2);border:1px solid var(--border);border-radius:9px;padding:10px;cursor:pointer;font-size:13px;width:100%;margin-top:6px;display:none;}

.list-area{border-top:2px solid var(--border);padding:14px 16px;}
.list-area h3{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:10px;}
.config-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:8px;}
.config-card .card-head{display:flex;align-items:center;gap:10px;}
.config-card .color-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;}
.config-card .info{flex:1;}
.config-card .info .name{font-size:14px;font-weight:600;}
.config-card .info .sub{font-size:11px;color:var(--text3);margin-top:2px;}
.config-card .actions{display:flex;gap:6px;flex-shrink:0;}
.config-card .layers-detail{margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-size:11px;color:var(--text2);}
.layer-row{display:flex;gap:6px;align-items:center;margin-bottom:3px;}
.layer-badge{border-radius:4px;padding:2px 6px;font-size:10px;font-weight:700;white-space:nowrap;}
.btn-sm{padding:5px 10px;border-radius:6px;font-size:11px;cursor:pointer;border:1px solid;}
.btn-edit{background:rgba(79,142,247,.1);border-color:var(--blue);color:var(--blue);}
.btn-del{background:rgba(239,68,68,.1);border-color:var(--red);color:var(--red);}
.empty-state{text-align:center;color:var(--text3);font-size:13px;padding:24px 0;}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;width:340px;max-width:90vw;}
.modal h3{font-size:16px;font-weight:700;margin-bottom:16px;}
.modal input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px;font-size:14px;margin-bottom:10px;}
.modal .btn-login{background:var(--blue);color:#fff;border:none;border-radius:9px;padding:11px;cursor:pointer;font-size:14px;font-weight:700;width:100%;}
.modal .btn-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:20px;float:right;margin-top:-4px;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1e293b;border:1px solid var(--border);border-radius:10px;padding:10px 20px;font-size:13px;z-index:300;display:none;white-space:pre-line;text-align:center;}
.toast.show{display:block;}
</style>
</head>
<body>

<header>
  <h1>🏗️ 路盤構成管理</h1>
  <select class="site-sel" id="siteSelect" onchange="onSiteChange(this.value)">
    <option value="">― 現場を選択 ―</option>
  </select>
  <span class="admin-badge" id="adminBadge">👑 管理者</span>
  <button class="btn-admin" id="btnAdmin" onclick="onAdminBtn()">🔑</button>
</header>

<div class="main">

  <!-- 左：図面ビューア -->
  <div class="panel-left">
    <div class="viewer-toolbar">
      <label>断面図</label>
      <input type="file" id="fileInput" accept=".pdf,.jpg,.jpeg,.png" style="display:none" onchange="handleFile(this.files[0])">
      <button class="btn-file" onclick="document.getElementById('fileInput').click()">📁 PDF/画像を開く</button>
      <div class="page-nav" id="pageNav" style="display:none">
        <button onclick="changePage(-1)">◀</button>
        <span id="pageInfo">1 / 1</span>
        <button onclick="changePage(1)">▶</button>
      </div>
    </div>
    <div class="viewer-area" id="viewerArea">
      <div class="viewer-empty">📄 PDF または 画像ファイルを開くと<br>ここに断面図が表示されます</div>
    </div>
  </div>

  <!-- 右：入力フォーム -->
  <div class="panel-right">
    <div class="form-area">
      <div class="section-title">路盤構成を登録</div>
      <input type="hidden" id="editKey">

      <div class="row2">
        <div class="field">
          <label>構成名（例：NO1〜NO4）</label>
          <input type="text" id="rbLabel" placeholder="構成名を入力">
        </div>
        <div class="field">
          <label>表示色</label>
          <input type="color" id="rbColor" value="#4f8ef7" style="height:38px;padding:2px 4px;">
        </div>
      </div>

      <div class="tab-bar">
        <button id="tabKari" class="active" onclick="switchTab('kari')">仮復旧</button>
        <button id="tabHon"  onclick="switchTab('hon')">本復旧</button>
      </div>

      <!-- 仮復旧 -->
      <div id="formKari">
        <div style="font-size:11px;color:var(--text3);margin-bottom:6px;">▼ AS層（上から順に追加）</div>
        <div id="kari-as-rows"></div>
        <button class="add-btn" onclick="addAsRow('kari')">＋ AS層を追加</button>

        <div style="font-size:11px;color:var(--text3);margin:10px 0 6px;">▼ 路盤工層（RM・RC・単層・その他）</div>
        <div id="kari-rb-rows"></div>
        <button class="add-btn" onclick="addRbRow('kari')">＋ 路盤層を追加</button>
        <div class="total-chip" id="kari-total">合計 H = <b>0 mm</b></div>
      </div>

      <!-- 本復旧 -->
      <div id="formHon" style="display:none">
        <div style="font-size:11px;color:var(--text3);margin-bottom:6px;">▼ AS層（上から順に追加）</div>
        <div id="hon-as-rows"></div>
        <button class="add-btn" onclick="addAsRow('hon')">＋ AS層を追加</button>

        <div style="font-size:11px;color:var(--text3);margin:10px 0 6px;">▼ 路盤工層（RM・RC・単層・その他）</div>
        <div id="hon-rb-rows"></div>
        <button class="add-btn" onclick="addRbRow('hon')">＋ 路盤層を追加</button>
        <div class="total-chip" id="hon-total">合計 H = <b>0 mm</b></div>
      </div>

      <button class="btn-save" onclick="saveConfig()">💾 路盤構成を登録</button>
      <button class="btn-cancel" id="btnCancel" onclick="cancelEdit()">キャンセル</button>
    </div>

    <div class="list-area">
      <h3 id="listTitle">登録済み路盤構成</h3>
      <div id="configList"><div class="empty-state">現場を選択してください</div></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="loginModal">
  <div class="modal">
    <button class="btn-close" onclick="closeModal()">✕</button>
    <h3>🔑 管理者ログイン</h3>
    <input type="email" id="loginEmail" value="sato.k.katawakuya@gmail.com">
    <input type="password" id="loginPass" placeholder="パスワード" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn-login" onclick="doLogin()">ログイン</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
'use strict';
const FIREBASE_CONFIG = {
  apiKey:"AIzaSyCuSWsmOZhseuBV7dJt6-iSYA1MCYzDF9o",
  authDomain:"alrit-kandenkou.firebaseapp.com",
  projectId:"alrit-kandenkou",
  storageBucket:"alrit-kandenkou.firebasestorage.app",
  messagingSenderId:"640432772833",
  appId:"1:640432772833:web:ab2aff11980621322809a0"
};
const ADMIN_EMAIL = 'sato.k.katawakuya@gmail.com';

let _fbDb=null,_fbAuth=null,_isAdmin=false;
let _selectedSiteId='';
let _kariAsRows=[], _honAsRows=[];
let _kariRbRows=[], _honRbRows=[];   // 路盤工層
let _pdfDoc=null, _pdfPage=1, _pdfTotal=0;

if(typeof pdfjsLib!=='undefined'){
  pdfjsLib.GlobalWorkerOptions.workerSrc=
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
}

// AS層選択肢
const AS_OPTIONS={
  surface:['再生密粒度AS混合物','密粒度AS混合物','密粒度改質AS混合物','密粒改良1','表層ポーラスAS混合物（透水性）','開粒度AS混合物','その他（自由入力）'],
  base:   ['再生粗粒度AS混合物','粗粒度AS混合物','粗粒度改質AS混合物（改質Ⅱ型）','その他（自由入力）'],
  other:  ['瀝青安定処理','その他（自由入力）'],
};

// 路盤層 区分ごとの種別選択肢
const RB_SIZES = {
  rm:   ['RM-30','RM-40'],
  rc:   ['RC-30','RC-40'],
  free: [],
};

// ---- Firebase ----
function initFirebase(){
  try{
    firebase.initializeApp(FIREBASE_CONFIG);
    _fbDb=firebase.firestore(); _fbAuth=firebase.auth();
    _fbAuth.onAuthStateChanged(u=>{ _isAdmin=!!(u&&u.email===ADMIN_EMAIL); updateAdminUI(); });
    loadSitesFromFirebase();
  }catch(e){ console.warn('[FB]',e); loadSitesLocal(); }
}
function loadSitesFromFirebase(){
  if(!_fbDb){loadSitesLocal();return;}
  _fbDb.collection('masters').doc('site_master').get()
    .then(doc=>{ if(doc.exists&&doc.data().data) localStorage.setItem('site_master',JSON.stringify(doc.data().data)); loadSitesLocal(); })
    .catch(()=>loadSitesLocal());
}
function loadSitesLocal(){
  const sites=JSON.parse(localStorage.getItem('site_master')||'[]');
  const sel=document.getElementById('siteSelect');
  sel.innerHTML='<option value="">― 現場を選択 ―</option>';
  sites.forEach(s=>{ const o=document.createElement('option'); o.value=s.id||s.siteId||s.name; o.textContent=s.name||s.siteName||s.id; sel.appendChild(o); });
}

// ---- 現場選択 ----
function onSiteChange(id){ _selectedSiteId=id; if(!id){document.getElementById('configList').innerHTML='<div class="empty-state">現場を選択してください</div>';return;} loadRoadbedsForSite(id); }
function getRbKey(id){ return 'roadbed_masters_'+id; }
function loadRoadbedsForSite(id){
  if(!_fbDb){renderConfigList(getLocalRb(id));return;}
  _fbDb.collection('masters').doc('roadbed_masters').get()
    .then(doc=>{ if(doc.exists&&doc.data().data){ const all=doc.data().data; if(all[id]) localStorage.setItem(getRbKey(id),JSON.stringify(all[id])); } renderConfigList(getLocalRb(id)); })
    .catch(()=>renderConfigList(getLocalRb(id)));
}
function getLocalRb(id){ return JSON.parse(localStorage.getItem(getRbKey(id))||'[]'); }
function saveRbForSite(id,configs){
  localStorage.setItem(getRbKey(id),JSON.stringify(configs));
  if(!_fbDb||!_isAdmin) return;
  _fbDb.collection('masters').doc('roadbed_masters').get()
    .then(doc=>{ const all=(doc.exists&&doc.data().data)?doc.data().data:{}; all[id]=configs; return _fbDb.collection('masters').doc('roadbed_masters').set({data:all,updatedAt:new Date().toISOString()}); })
    .catch(e=>console.warn('[FB]',e));
}

// ---- AS層 ----
function addAsRow(s){ (s==='kari'?_kariAsRows:_honAsRows).push({role:'surface',preset:'',custom:'',t:0}); renderAsRows(s); }
function removeAsRow(s,i){ (s==='kari'?_kariAsRows:_honAsRows).splice(i,1); renderAsRows(s); updateTotal(s); }
function updateAsRow(s,i,f,v){
  const arr=s==='kari'?_kariAsRows:_honAsRows; if(!arr[i])return;
  arr[i][f]=v; if(f==='role'){arr[i].preset='';arr[i].custom='';}
  renderAsRows(s); updateTotal(s);
}
function renderAsRows(s){
  const arr=s==='kari'?_kariAsRows:_honAsRows;
  const el=document.getElementById(s+'-as-rows'); if(!el)return;
  const f='background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:6px 8px;font-size:12px;';
  el.innerHTML=arr.map((a,i)=>{
    const role=a.role||'surface';
    const opts=AS_OPTIONS[role]||AS_OPTIONS.surface;
    const isOther=a.preset==='その他（自由入力）';
    const rc=role==='surface'?'rgba(79,142,247,0.9)':role==='base'?'rgba(34,197,94,0.9)':'var(--orange)';
    const optHtml=opts.map(o=>`<option value="${o}"${a.preset===o?' selected':''}>${o}</option>`).join('');
    const preview=isOther?a.custom:a.preset;
    return`<div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 10px;margin-bottom:6px;">
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
        <select style="${f}width:72px;flex-shrink:0;color:${rc};font-weight:700;" onchange="updateAsRow('${s}',${i},'role',this.value)">
          <option value="surface"${role==='surface'?' selected':''}>表層</option>
          <option value="base"${role==='base'?' selected':''}>基層</option>
          <option value="other"${role==='other'?' selected':''}>その他</option>
        </select>
        <select style="${f}flex:1;min-width:100px;" onchange="updateAsRow('${s}',${i},'preset',this.value);var ci=document.getElementById('aci-${s}-${i}');if(ci)ci.style.display=this.value==='その他（自由入力）'?'':'none'">
          <option value="">― 選択 ―</option>${optHtml}
        </select>
        <input id="aci-${s}-${i}" type="text" value="${a.custom||''}" placeholder="材料名"
          style="${f}flex:1;min-width:70px;${isOther?'':'display:none;'}"
          onchange="updateAsRow('${s}',${i},'custom',this.value)">
        <input type="number" value="${a.t||''}" placeholder="mm" min="0" step="5"
          style="${f}width:58px;text-align:right;flex-shrink:0;"
          onchange="updateAsRow('${s}',${i},'t',+this.value)">
        <span style="font-size:11px;color:var(--text3);">mm</span>
        <button onclick="removeAsRow('${s}',${i})" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:16px;padding:2px 4px;line-height:1;">✕</button>
      </div>
      ${preview||a.t>0?`<div style="font-size:10px;color:var(--text3);margin-top:3px;margin-left:4px;">→ ${preview||'未入力'}${a.t>0?' t='+a.t+'mm':''}</div>`:''}
    </div>`;
  }).join('');
}

// ---- 路盤工層（RB）----
// row: { cat:'rm'|'rc'|'free', size:'RM-30'|'RM-40'|'RC-30'|'RC-40'|'', name:'', t:0, n:1 }
function addRbRow(s){ (s==='kari'?_kariRbRows:_honRbRows).push({cat:'rm',size:'RM-40',name:'',t:0,n:1}); renderRbRows(s); }
function removeRbRow(s,i){ (s==='kari'?_kariRbRows:_honRbRows).splice(i,1); renderRbRows(s); updateTotal(s); }
function updateRbRow(s,i,f,v){
  const arr=s==='kari'?_kariRbRows:_honRbRows; if(!arr[i])return;
  arr[i][f]=v;
  if(f==='cat'){
    // 区分変更時にsize初期化
    if(v==='rm') arr[i].size='RM-40';
    else if(v==='rc') arr[i].size='RC-40';
    else arr[i].size='';
  }
  renderRbRows(s); updateTotal(s);
}
function rbRowTotal(r){ return (r.t||0)*(r.n||1); }

function renderRbRows(s){
  const arr=s==='kari'?_kariRbRows:_honRbRows;
  const el=document.getElementById(s+'-rb-rows'); if(!el)return;
  const f='background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:6px 8px;font-size:12px;';
  if(arr.length===0){ el.innerHTML='<div style="font-size:11px;color:var(--text3);padding:4px 0 8px;">（路盤層なし）＋ボタンで追加</div>'; return; }
  el.innerHTML=arr.map((r,i)=>{
    const cat=r.cat||'rm';
    const catColor=cat==='rm'?'rgba(34,197,94,0.9)':cat==='rc'?'rgba(167,139,250,0.9)':'var(--orange)';
    const catLabel=cat==='rm'?'上層RM':cat==='rc'?'下層RC':'フリー';
    const sizes=RB_SIZES[cat]||[];
    const sizeOpts=sizes.map(sz=>`<option value="${sz}"${r.size===sz?' selected':''}>${sz}</option>`).join('');
    const isFree=cat==='free';
    const rowMm=rbRowTotal(r);
    return`<div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 10px;margin-bottom:6px;">
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
        <!-- 区分 -->
        <select style="${f}width:76px;flex-shrink:0;color:${catColor};font-weight:700;" onchange="updateRbRow('${s}',${i},'cat',this.value)">
          <option value="rm"${cat==='rm'?' selected':''}>上層RM</option>
          <option value="rc"${cat==='rc'?' selected':''}>下層RC</option>
          <option value="free"${cat==='free'?' selected':''}>フリー</option>
        </select>
        <!-- 種別 or 名称 -->
        ${isFree
          ?`<input type="text" value="${r.name||''}" placeholder="層名（例：既設路盤）"
              style="${f}flex:1;min-width:90px;"
              onchange="updateRbRow('${s}',${i},'name',this.value)">`
          :`<select style="${f}width:80px;flex-shrink:0;" onchange="updateRbRow('${s}',${i},'size',this.value)">
              ${sizeOpts}
            </select>`
        }
        <!-- 1層の厚み -->
        <input type="number" value="${r.t||''}" placeholder="t(mm)" min="0" step="10"
          style="${f}width:68px;text-align:right;flex-shrink:0;"
          onchange="updateRbRow('${s}',${i},'t',+this.value)">
        <span style="font-size:11px;color:var(--text3);flex-shrink:0;">mm</span>
        <!-- 層数 -->
        <span style="font-size:11px;color:var(--text3);flex-shrink:0;">×</span>
        <input type="number" value="${r.n||1}" min="1" step="1"
          style="${f}width:48px;text-align:center;flex-shrink:0;"
          onchange="updateRbRow('${s}',${i},'n',+this.value)">
        <span style="font-size:11px;color:var(--text3);flex-shrink:0;">層</span>
        <!-- 合計表示 -->
        <span style="font-size:12px;color:var(--purple);font-weight:700;flex-shrink:0;min-width:52px;text-align:right;">= ${rowMm}mm</span>
        <button onclick="removeRbRow('${s}',${i})" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:16px;padding:2px 4px;line-height:1;">✕</button>
      </div>
      <div style="font-size:10px;color:var(--text3);margin-top:3px;margin-left:4px;">
        → ${catLabel}${isFree?(r.name?' ('+r.name+')'):''}${r.size?' '+r.size:''}${r.t>0?' t='+r.t+'mm':''}${(r.n||1)>1?' × '+(r.n||1)+'層':''}${rowMm>0?' = '+rowMm+'mm':''}
      </div>
    </div>`;
  }).join('');
}

// ---- 合計計算 ----
function updateTotal(s){
  const asArr=s==='kari'?_kariAsRows:_honAsRows;
  const rbArr=s==='kari'?_kariRbRows:_honRbRows;
  const asTotal=asArr.reduce((a,r)=>a+(r.t||0),0);
  const rbTotal=rbArr.reduce((a,r)=>a+rbRowTotal(r),0);
  const total=asTotal+rbTotal;
  const el=document.getElementById(s+'-total');
  if(el) el.innerHTML=`合計 H = <b>${total} mm</b>`;
}

// ---- タブ ----
function switchTab(tab){
  document.getElementById('formKari').style.display=tab==='kari'?'':'none';
  document.getElementById('formHon').style.display=tab==='hon'?'':'none';
  document.getElementById('tabKari').className=tab==='kari'?'active':'';
  document.getElementById('tabHon').className=tab==='hon'?'active':'';
}

// ---- 登録 ----
function saveConfig(){
  if(!_selectedSiteId){showToast('⚠️ 現場を選択してください');return;}
  if(!_isAdmin){showToast('⚠️ 管理者ログインが必要です');return;}
  const label=document.getElementById('rbLabel').value.trim();
  if(!label){showToast('⚠️ 構成名を入力してください');return;}
  const color=document.getElementById('rbColor').value;
  const editKey=document.getElementById('editKey').value;

  // AS層
  const asFilter=arr=>arr.filter(a=>a.preset||a.custom||a.t>0).map(a=>({name:a.preset==='その他（自由入力）'?a.custom:a.preset, t:+a.t}));
  // RB層 → 保存 + order.html互換フィールド自動生成
  const rbToLayers=arr=>arr.filter(r=>r.t>0||r.name||r.size).map(r=>({cat:r.cat, size:r.size||'', name:r.name||'', t:r.t||0, n:r.n||1, totalMm:rbRowTotal(r)}));
  const kariRbL=rbToLayers(_kariRbRows);
  const honRbL =rbToLayers(_honRbRows);

  // order.html互換: RM/RC合算
  const sumCat=(arr,cat)=>arr.filter(r=>r.cat===cat).reduce((s,r)=>s+rbRowTotal(r),0);
  const firstSize=(arr,cat)=>{ const r=arr.find(x=>x.cat===cat&&x.size); return r?parseInt(r.size.replace(/\D/g,''))||40:40; };
  const layerStr=(arr,cat)=>arr.filter(r=>r.cat===cat&&r.t>0).map(r=>`${r.size||r.name} t=${r.t}mm${(r.n||1)>1?'×'+r.n+'層':''}`).join('、');

  const kariAsTotal=_kariAsRows.reduce((s,a)=>s+(a.t||0),0);
  const honAsTotal =_honAsRows.reduce((s,a)=>s+(a.t||0),0);
  const kariRbTotal=_kariRbRows.reduce((s,r)=>s+rbRowTotal(r),0);
  const honRbTotal =_honRbRows.reduce((s,r)=>s+rbRowTotal(r),0);

  const entry={
    key: editKey||('rb_'+Date.now()),
    label, color,
    kariAsLayers:  asFilter(_kariAsRows),
    kariRbLayers:  kariRbL,
    kariRmSize:    firstSize(_kariRbRows,'rm'),
    kariRmH:       sumCat(_kariRbRows,'rm')/1000,
    kariRmLayers:  layerStr(_kariRbRows,'rm'),
    kariRcSize:    firstSize(_kariRbRows,'rc'),
    kariRcH:       sumCat(_kariRbRows,'rc')/1000,
    kariRcLayers:  layerStr(_kariRbRows,'rc'),
    kariTotalH:    (kariAsTotal+kariRbTotal)/1000,
    honAsLayers:   asFilter(_honAsRows),
    honRbLayers:   honRbL,
    honRmSize:     firstSize(_honRbRows,'rm'),
    honRmH:        sumCat(_honRbRows,'rm')/1000,
    honRmLayers:   layerStr(_honRbRows,'rm'),
    honRcSize:     firstSize(_honRbRows,'rc'),
    honRcH:        sumCat(_honRbRows,'rc')/1000,
    honRcLayers:   layerStr(_honRbRows,'rc'),
    honTotalH:     (honAsTotal+honRbTotal)/1000,
    updatedAt: new Date().toISOString().slice(0,10),
  };

  const configs=getLocalRb(_selectedSiteId);
  const idx=configs.findIndex(r=>r.key===entry.key);
  if(idx>=0) configs[idx]=entry; else configs.push(entry);
  saveRbForSite(_selectedSiteId,configs);
  renderConfigList(configs);
  clearForm();
  showToast(`✅「${label}」を登録しました`);
}

// ---- 編集 ----
function editConfig(key){
  const r=getLocalRb(_selectedSiteId).find(x=>x.key===key); if(!r)return;
  document.getElementById('editKey').value=r.key;
  document.getElementById('rbLabel').value=r.label||'';
  document.getElementById('rbColor').value=r.color||'#4f8ef7';
  // AS層
  _kariAsRows=(r.kariAsLayers||[]).map(a=>({role:'surface',preset:'',custom:a.name||'',t:a.t||0}));
  _honAsRows =(r.honAsLayers ||[]).map(a=>({role:'surface',preset:'',custom:a.name||'',t:a.t||0}));
  if(!_kariAsRows.length) _kariAsRows=[{role:'surface',preset:'',custom:'',t:0}];
  if(!_honAsRows.length)  _honAsRows =[{role:'surface',preset:'',custom:'',t:0}];
  // RB層: kariRbLayers があれば使用、なければ旧RM/RCから復元
  _kariRbRows=restoreRbRows(r,'kari');
  _honRbRows =restoreRbRows(r,'hon');
  renderAsRows('kari'); renderAsRows('hon');
  renderRbRows('kari'); renderRbRows('hon');
  updateTotal('kari'); updateTotal('hon');
  document.getElementById('btnCancel').style.display='';
  document.getElementById('rbLabel').scrollIntoView({behavior:'smooth',block:'center'});
  switchTab('kari');
}

function restoreRbRows(r,s){
  const key=s+'RbLayers';
  if(r[key]&&r[key].length>0){
    return r[key].map(x=>({cat:x.cat||'rm',size:x.size||'',name:x.name||'',t:x.t||0,n:x.n||1}));
  }
  // 旧データ互換: RM/RCフィールドから復元
  const rows=[];
  const rmH=r[s+'RmH']||0; const rcH=r[s+'RcH']||0;
  const rmSz=r[s+'RmSize']||40; const rcSz=r[s+'RcSize']||40;
  if(rmH>0) rows.push({cat:'rm',size:'RM-'+rmSz,name:'',t:Math.round(rmH*1000),n:1});
  if(rcH>0) rows.push({cat:'rc',size:'RC-'+rcSz,name:'',t:Math.round(rcH*1000),n:1});
  return rows.length?rows:[{cat:'rm',size:'RM-40',name:'',t:0,n:1}];
}

// ---- 削除 ----
function deleteConfig(key){
  const r=getLocalRb(_selectedSiteId).find(x=>x.key===key);
  if(!r||!confirm(`「${r.label}」を削除しますか？`))return;
  saveRbForSite(_selectedSiteId,getLocalRb(_selectedSiteId).filter(x=>x.key!==key));
  renderConfigList(getLocalRb(_selectedSiteId));
  showToast('🗑️ 削除しました');
}

function cancelEdit(){ clearForm(); }
function clearForm(){
  document.getElementById('editKey').value='';
  document.getElementById('rbLabel').value='';
  document.getElementById('rbColor').value='#4f8ef7';
  _kariAsRows=[{role:'surface',preset:'',custom:'',t:0}];
  _honAsRows =[{role:'surface',preset:'',custom:'',t:0}];
  _kariRbRows=[{cat:'rm',size:'RM-40',name:'',t:0,n:1}];
  _honRbRows =[{cat:'rm',size:'RM-40',name:'',t:0,n:1}];
  renderAsRows('kari'); renderAsRows('hon');
  renderRbRows('kari'); renderRbRows('hon');
  document.getElementById('kari-total').innerHTML='合計 H = <b>0 mm</b>';
  document.getElementById('hon-total').innerHTML='合計 H = <b>0 mm</b>';
  document.getElementById('btnCancel').style.display='none';
}

// ---- リスト描画 ----
const CAT_COLOR={rm:'rgba(34,197,94,0.2)',rc:'rgba(167,139,250,0.2)',free:'rgba(245,158,11,0.2)'};
const CAT_TC   ={rm:'var(--green)',rc:'var(--purple)',free:'var(--orange)'};
const CAT_LBL  ={rm:'上層RM',rc:'下層RC',free:'フリー'};

function renderConfigList(configs){
  const el=document.getElementById('configList');
  const siteName=document.getElementById('siteSelect').options[document.getElementById('siteSelect').selectedIndex]?.text||'';
  document.getElementById('listTitle').textContent=`登録済み路盤構成（${siteName}）`;
  if(!configs||configs.length===0){ el.innerHTML='<div class="empty-state">📐 まだ登録されていません</div>'; return; }
  el.innerHTML=configs.map(r=>{
    const kariMm=Math.round((r.kariTotalH||0)*1000);
    const honMm =Math.round((r.honTotalH||0)*1000);
    const diff=kariMm!==honMm;
    const sub=diff?`仮:${kariMm}mm ／ 本:${honMm}mm`:`H=${kariMm}mm`;
    // AS層サマリ
    const asStr=(r.kariAsLayers||[]).map(a=>a.name).filter(Boolean).join('＋')||'（AS層なし）';
    // 路盤層詳細
    const rbRows=(r.kariRbLayers||[]);
    const rbDetail=rbRows.map(rb=>{
      const lbl=rb.cat==='free'?(rb.name||'フリー'):(rb.size||CAT_LBL[rb.cat]||'');
      const nStr=(rb.n||1)>1?` × ${rb.n}層`:'';
      const total=rbRowTotal(rb);
      return`<div class="layer-row">
        <span class="layer-badge" style="background:${CAT_COLOR[rb.cat]||'var(--surface2)'};color:${CAT_TC[rb.cat]||'var(--text2)'};">${CAT_LBL[rb.cat]||''}</span>
        <span style="color:var(--text);">${lbl}</span>
        <span style="color:var(--text3);margin-left:auto;">t=${rb.t}mm${nStr} = <b style="color:var(--purple);">${total}mm</b></span>
      </div>`;
    }).join('');
    const adminBtns=_isAdmin
      ?`<button class="btn-sm btn-edit" onclick="editConfig('${r.key}')">編集</button>
        <button class="btn-sm btn-del"  onclick="deleteConfig('${r.key}')">削除</button>`:'';
    return`<div class="config-card">
      <div class="card-head">
        <div class="color-dot" style="background:${r.color||'#4f8ef7'}"></div>
        <div class="info"><div class="name">${r.label}</div><div class="sub">${asStr}　${sub}</div></div>
        <div class="actions">${adminBtns}</div>
      </div>
      ${rbRows.length?`<div class="layers-detail">${rbDetail}</div>`:''}
    </div>`;
  }).join('');
}

// ---- PDF/画像ビューア ----
async function handleFile(file){
  if(!file)return;
  if(file.name.split('.').pop().toLowerCase()==='pdf') await loadPdf(file); else loadImage(file);
}
async function loadPdf(file){
  const buf=await file.arrayBuffer();
  _pdfDoc=await pdfjsLib.getDocument({data:buf}).promise;
  _pdfTotal=_pdfDoc.numPages; _pdfPage=1;
  renderPdfPage(1);
  document.getElementById('pageNav').style.display=_pdfTotal>1?'':'none';
  document.getElementById('pageInfo').textContent=`1 / ${_pdfTotal}`;
}
async function renderPdfPage(p){
  if(!_pdfDoc)return;
  const page=await _pdfDoc.getPage(p);
  const vp=page.getViewport({scale:1.5});
  const c=document.createElement('canvas'); c.width=vp.width; c.height=vp.height;
  await page.render({canvasContext:c.getContext('2d'),viewport:vp}).promise;
  const va=document.getElementById('viewerArea'); va.innerHTML=''; va.appendChild(c);
}
function loadImage(file){
  const fr=new FileReader();
  fr.onload=e=>{ document.getElementById('viewerArea').innerHTML=`<img src="${e.target.result}" alt="断面図">`; _pdfDoc=null; document.getElementById('pageNav').style.display='none'; };
  fr.readAsDataURL(file);
}
function changePage(d){
  if(!_pdfDoc)return;
  _pdfPage=Math.max(1,Math.min(_pdfTotal,_pdfPage+d));
  document.getElementById('pageInfo').textContent=`${_pdfPage} / ${_pdfTotal}`;
  renderPdfPage(_pdfPage);
}

// ---- 管理者UI ----
function updateAdminUI(){
  document.getElementById('adminBadge').style.display=_isAdmin?'':'none';
  document.getElementById('btnAdmin').textContent=_isAdmin?'🔓':'🔑';
  document.getElementById('btnAdmin').className=_isAdmin?'btn-admin active':'btn-admin';
  if(_selectedSiteId) renderConfigList(getLocalRb(_selectedSiteId));
}
function onAdminBtn(){ if(_isAdmin){if(confirm('ログアウトしますか？'))_fbAuth.signOut();}else document.getElementById('loginModal').classList.add('open'); }
function doLogin(){
  _fbAuth.signInWithEmailAndPassword(document.getElementById('loginEmail').value.trim(),document.getElementById('loginPass').value)
    .then(()=>{closeModal();showToast('✅ 管理者ログイン成功');})
    .catch(e=>showToast('❌ '+e.message));
}
function closeModal(){ document.getElementById('loginModal').classList.remove('open'); document.getElementById('loginPass').value=''; }

// ---- トースト ----
function showToast(msg,d=2500){
  const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),d);
}

  _honRbRows =[{cat:'rm',size:'RM-40',name:'',t:0,n:1}];
