<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>路盤構成管理 v1.0</title>
<style>
:root {
  --bg:#0f1117; --surface:#1a1d2e; --surface2:#22263a; --surface3:#2a2f45;
  --border:#2e3450; --text:#e2e8f0; --text2:#94a3b8; --text3:#64748b;
  --blue:#4f8ef7; --green:#22c55e; --orange:#f59e0b; --red:#ef4444;
  --purple:#a78bfa; --mono:'Consolas',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Hiragino Kaku Gothic Pro','Meiryo',sans-serif;font-size:14px;min-height:100vh;}

/* ヘッダー */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:0;z-index:100;}
header h1{font-size:16px;font-weight:700;color:var(--text);white-space:nowrap;}
header .site-sel{flex:1;min-width:160px;max-width:300px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:8px 12px;font-size:13px;}
header .btn-admin{margin-left:auto;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text2);padding:7px 14px;cursor:pointer;font-size:13px;}
header .btn-admin.active{background:rgba(79,142,247,.2);border-color:var(--blue);color:var(--blue);}
.admin-badge{background:rgba(79,142,247,.15);border:1px solid var(--blue);color:var(--blue);border-radius:6px;padding:3px 10px;font-size:12px;display:none;}

/* メインレイアウト */
.main{display:grid;grid-template-columns:1fr 1fr;gap:0;height:calc(100vh - 54px);}
@media(max-width:700px){.main{grid-template-columns:1fr;height:auto;}}

/* 左パネル：図面ビューア */
.panel-left{border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.viewer-toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.viewer-toolbar label{font-size:12px;color:var(--text2);}
.btn-file{background:var(--blue);color:#fff;border:none;border-radius:7px;padding:7px 14px;cursor:pointer;font-size:12px;white-space:nowrap;}
.page-nav{display:flex;align-items:center;gap:6px;margin-left:auto;}
.page-nav button{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:13px;}
.page-nav span{font-size:12px;color:var(--text2);white-space:nowrap;}
.viewer-area{flex:1;overflow:auto;display:flex;align-items:flex-start;justify-content:center;background:#111;padding:8px;}
.viewer-area canvas, .viewer-area img{max-width:100%;height:auto;display:block;box-shadow:0 2px 12px rgba(0,0,0,.5);}
.viewer-empty{color:var(--text3);font-size:13px;text-align:center;margin:auto;padding:40px;}

/* 右パネル：入力フォーム */
.panel-right{display:flex;flex-direction:column;overflow-y:auto;}
.form-area{padding:14px 16px;flex:1;}
.section-title{font-size:13px;font-weight:700;color:var(--text2);margin:14px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--border);}
.field{margin-bottom:10px;}
.field label{display:block;font-size:11px;color:var(--text3);margin-bottom:4px;}
.field input[type=text],.field input[type=number],.field select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);padding:8px 10px;font-size:13px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.row3{display:grid;grid-template-columns:auto 1fr 1fr;gap:8px;align-items:end;}
.row3 label{font-size:11px;color:var(--text3);margin-bottom:4px;display:block;}
.row3 input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);padding:8px 10px;font-size:13px;}
.row3 .size-lbl{font-size:12px;color:var(--text2);padding-bottom:9px;}
.tab-bar{display:flex;gap:4px;margin-bottom:12px;background:var(--surface2);border-radius:9px;padding:4px;}
.tab-bar button{flex:1;padding:7px;border:none;border-radius:7px;cursor:pointer;font-size:12px;font-weight:600;color:var(--text2);background:none;}
.tab-bar button.active{background:var(--blue);color:#fff;}
.as-add-btn{background:none;border:1px dashed var(--border);color:var(--text3);border-radius:7px;padding:6px;cursor:pointer;font-size:12px;width:100%;margin-bottom:8px;}
.as-add-btn:hover{border-color:var(--blue);color:var(--blue);}
.total-chip{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:6px 12px;font-size:12px;color:var(--text2);text-align:right;margin-top:6px;}
.total-chip b{color:var(--purple);}
.btn-save{background:var(--blue);color:#fff;border:none;border-radius:9px;padding:12px;cursor:pointer;font-size:14px;font-weight:700;width:100%;margin-top:12px;}
.btn-cancel{background:var(--surface2);color:var(--text2);border:1px solid var(--border);border-radius:9px;padding:10px;cursor:pointer;font-size:13px;width:100%;margin-top:6px;display:none;}

/* 登録済みリスト */
.list-area{border-top:2px solid var(--border);padding:14px 16px;}
.list-area h3{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:10px;}
.config-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;}
.config-card .color-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;}
.config-card .info{flex:1;}
.config-card .info .name{font-size:14px;font-weight:600;}
.config-card .info .sub{font-size:11px;color:var(--text3);margin-top:2px;}
.config-card .actions{display:flex;gap:6px;flex-shrink:0;}
.btn-sm{padding:5px 10px;border-radius:6px;font-size:11px;cursor:pointer;border:1px solid;}
.btn-edit{background:rgba(79,142,247,.1);border-color:var(--blue);color:var(--blue);}
.btn-del{background:rgba(239,68,68,.1);border-color:var(--red);color:var(--red);}
.empty-state{text-align:center;color:var(--text3);font-size:13px;padding:24px 0;}

/* ログインモーダル */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;width:340px;max-width:90vw;}
.modal h3{font-size:16px;font-weight:700;margin-bottom:16px;}
.modal input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px;font-size:14px;margin-bottom:10px;}
.modal .btn-login{background:var(--blue);color:#fff;border:none;border-radius:9px;padding:11px;cursor:pointer;font-size:14px;font-weight:700;width:100%;}
.modal .btn-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:20px;float:right;margin-top:-4px;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1e293b;border:1px solid var(--border);border-radius:10px;padding:10px 20px;font-size:13px;z-index:300;display:none;}
.toast.show{display:block;animation:fadeIn .2s;}
@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>
</head>
<body>

<!-- ヘッダー -->
<header>
  <h1>🏗️ 路盤構成管理</h1>
  <select class="site-sel" id="siteSelect" onchange="onSiteChange(this.value)">
    <option value="">― 現場を選択 ―</option>
  </select>
  <span class="admin-badge" id="adminBadge">👑 管理者</span>
  <button class="btn-admin" id="btnAdmin" onclick="onAdminBtn()">🔑</button>
</header>

<!-- メイン -->
<div class="main">

  <!-- 左：図面ビューア -->
  <div class="panel-left">
    <div class="viewer-toolbar">
      <label>断面図</label>
      <input type="file" id="fileInput" accept=".pdf,.jpg,.jpeg,.png" style="display:none" onchange="handleFile(this.files[0])">
      <button class="btn-file" onclick="document.getElementById('fileInput').click()">📁 PDF/画像を開く</button>
      <div class="page-nav" id="pageNav" style="display:none">
        <button onclick="changePage(-1)">◀</button>
        <span id="pageInfo">1 / 1</span>
        <button onclick="changePage(1)">▶</button>
      </div>
    </div>
    <div class="viewer-area" id="viewerArea">
      <div class="viewer-empty">📄 PDF または 画像ファイルを開くと<br>ここに断面図が表示されます</div>
    </div>
  </div>

  <!-- 右：入力フォーム -->
  <div class="panel-right">
    <div class="form-area">
      <div class="section-title">路盤構成を登録</div>

      <input type="hidden" id="editKey">

      <div class="row2">
        <div class="field">
          <label>構成名（例：NO1〜NO4）</label>
          <input type="text" id="rbLabel" placeholder="構成名を入力">
        </div>
        <div class="field">
          <label>表示色</label>
          <input type="color" id="rbColor" value="#4f8ef7" style="height:38px;padding:2px 4px;">
        </div>
      </div>

      <!-- 仮復旧/本復旧タブ -->
      <div class="tab-bar">
        <button id="tabKari" class="active" onclick="switchTab('kari')">仮復旧</button>
        <button id="tabHon" onclick="switchTab('hon')">本復旧</button>
      </div>

      <!-- 仮復旧入力 -->
      <div id="formKari">
        <div style="font-size:11px;color:var(--text3);margin-bottom:6px;">▼ AS層（上から順に追加）</div>
        <div id="kari-as-rows"></div>
        <button class="as-add-btn" onclick="addAsRow('kari')">＋ AS層を追加</button>

        <div style="font-size:11px;color:var(--text3);margin:10px 0 6px;">▼ 上層路盤工（RM）</div>
        <div class="row3">
          <div><label>粒度</label><select id="kari-rmsize" style="background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);padding:8px 6px;font-size:13px;width:80px;"><option value="0">なし</option><option value="30">RM-30</option><option value="40" selected>RM-40</option></select></div>
          <div><label>厚さ H（m）</label><input type="number" id="kari-rmh" step="0.01" placeholder="例 0.10" min="0" onchange="updateTotal('kari')"></div>
          <div><label>層構成メモ</label><input type="text" id="kari-rmlayers" placeholder="例 t=100mm"></div>
        </div>

        <div style="font-size:11px;color:var(--text3);margin:10px 0 6px;">▼ 下層路盤工（RC）</div>
        <div class="row3">
          <div><label>粒度</label><select id="kari-rcsize" style="background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);padding:8px 6px;font-size:13px;width:80px;"><option value="0">なし</option><option value="30">RC-30</option><option value="40" selected>RC-40</option></select></div>
          <div><label>厚さ H（m）</label><input type="number" id="kari-rch" step="0.01" placeholder="例 0.15" min="0" onchange="updateTotal('kari')"></div>
          <div><label>層構成メモ</label><input type="text" id="kari-rclayers" placeholder="例 t=150mm"></div>
        </div>
        <div class="total-chip" id="kari-total">合計 H = <b>0 mm</b></div>
      </div>

      <!-- 本復旧入力 -->
      <div id="formHon" style="display:none">
        <div style="font-size:11px;color:var(--text3);margin-bottom:6px;">▼ AS層（上から順に追加）</div>
        <div id="hon-as-rows"></div>
        <button class="as-add-btn" onclick="addAsRow('hon')">＋ AS層を追加</button>

        <div style="font-size:11px;color:var(--text3);margin:10px 0 6px;">▼ 上層路盤工（RM）</div>
        <div class="row3">
          <div><label>粒度</label><select id="hon-rmsize" style="background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);padding:8px 6px;font-size:13px;width:80px;"><option value="0">なし</option><option value="30">RM-30</option><option value="40" selected>RM-40</option></select></div>
          <div><label>厚さ H（m）</label><input type="number" id="hon-rmh" step="0.01" placeholder="例 0.10" min="0" onchange="updateTotal('hon')"></div>
          <div><label>層構成メモ</label><input type="text" id="hon-rmlayers" placeholder="例 t=100mm"></div>
        </div>

        <div style="font-size:11px;color:var(--text3);margin:10px 0 6px;">▼ 下層路盤工（RC）</div>
        <div class="row3">
          <div><label>粒度</label><select id="hon-rcsize" style="background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);padding:8px 6px;font-size:13px;width:80px;"><option value="0">なし</option><option value="30">RC-30</option><option value="40" selected>RC-40</option></select></div>
          <div><label>厚さ H（m）</label><input type="number" id="hon-rch" step="0.01" placeholder="例 0.15" min="0" onchange="updateTotal('hon')"></div>
          <div><label>層構成メモ</label><input type="text" id="hon-rclayers" placeholder="例 t=150mm"></div>
        </div>
        <div class="total-chip" id="hon-total">合計 H = <b>0 mm</b></div>
      </div>

      <button class="btn-save" onclick="saveConfig()">💾 路盤構成を登録</button>
      <button class="btn-cancel" id="btnCancel" onclick="cancelEdit()">キャンセル</button>
    </div>

    <!-- 登録済みリスト -->
    <div class="list-area">
      <h3 id="listTitle">登録済み路盤構成</h3>
      <div id="configList"><div class="empty-state">現場を選択してください</div></div>
    </div>
  </div>
</div>

<!-- 管理者ログインモーダル -->
<div class="modal-overlay" id="loginModal">
  <div class="modal">
    <button class="btn-close" onclick="closeModal()">✕</button>
    <h3>🔑 管理者ログイン</h3>
    <input type="email" id="loginEmail" value="sato.k.katawakuya@gmail.com" placeholder="メールアドレス">
    <input type="password" id="loginPass" placeholder="パスワード" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn-login" onclick="doLogin()">ログイン</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
'use strict';
// ---- Firebase設定 ----
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCuSWsmOZhseuBV7dJt6-iSYA1MCYzDF9o",
  authDomain: "alrit-kandenkou.firebaseapp.com",
  projectId: "alrit-kandenkou",
  storageBucket: "alrit-kandenkou.firebasestorage.app",
  messagingSenderId: "640432772833",
  appId: "1:640432772833:web:ab2aff11980621322809a0"
};
const ADMIN_EMAIL = 'sato.k.katawakuya@gmail.com';

// ---- 状態変数 ----
let _fbDb = null, _fbAuth = null, _isAdmin = false;
let _selectedSiteId = '';
let _kariAsRows = [], _honAsRows = [];
let _currentTab = 'kari';
let _pdfDoc = null, _pdfPage = 1, _pdfTotal = 0;

// PDF.js ワーカー
if (typeof pdfjsLib !== 'undefined') {
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
}

// AS層選択肢
const AS_OPTIONS = {
  surface: ['再生密粒度AS混合物','密粒度AS混合物','密粒度改質AS混合物','密粒改良1','表層ポーラスAS混合物（透水性）','開粒度AS混合物','その他（自由入力）'],
  base:    ['再生粗粒度AS混合物','粗粒度AS混合物','粗粒度改質AS混合物（改質Ⅱ型）','その他（自由入力）'],
  other:   ['瀝青安定処理','その他（自由入力）'],
};

// ---- Firebase初期化 ----
function initFirebase() {
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    _fbDb  = firebase.firestore();
    _fbAuth = firebase.auth();
    _fbAuth.onAuthStateChanged(user => {
      _isAdmin = !!(user && user.email === ADMIN_EMAIL);
      updateAdminUI();
    });
    loadSitesFromFirebase();
  } catch(e) { console.warn('[FB]', e); loadSitesLocal(); }
}

function loadSitesFromFirebase() {
  if (!_fbDb) { loadSitesLocal(); return; }
  _fbDb.collection('masters').doc('site_master').get()
    .then(doc => {
      if (doc.exists && doc.data().data) {
        localStorage.setItem('site_master', JSON.stringify(doc.data().data));
      }
      loadSitesLocal();
    }).catch(() => loadSitesLocal());
}

function loadSitesLocal() {
  const sites = JSON.parse(localStorage.getItem('site_master') || '[]');
  const sel = document.getElementById('siteSelect');
  sel.innerHTML = '<option value="">― 現場を選択 ―</option>';
  sites.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.id || s.siteId || s.name;
    opt.textContent = s.name || s.siteName || s.id;
    sel.appendChild(opt);
  });
}

// ---- 現場選択 ----
function onSiteChange(siteId) {
  _selectedSiteId = siteId;
  if (!siteId) { document.getElementById('configList').innerHTML = '<div class="empty-state">現場を選択してください</div>'; return; }
  loadRoadbedsForSite(siteId);
}

function getRoadbedKey(siteId) { return 'roadbed_masters_' + siteId; }

function loadRoadbedsForSite(siteId) {
  if (!_fbDb) { renderConfigList(getLocalRoadbeds(siteId)); return; }
  _fbDb.collection('masters').doc('roadbed_masters').get()
    .then(doc => {
      if (doc.exists && doc.data().data) {
        const all = doc.data().data;
        if (all[siteId]) localStorage.setItem(getRoadbedKey(siteId), JSON.stringify(all[siteId]));
      }
      renderConfigList(getLocalRoadbeds(siteId));
    }).catch(() => renderConfigList(getLocalRoadbeds(siteId)));
}

function getLocalRoadbeds(siteId) {
  return JSON.parse(localStorage.getItem(getRoadbedKey(siteId)) || '[]');
}

function saveRoadbedsForSite(siteId, configs) {
  localStorage.setItem(getRoadbedKey(siteId), JSON.stringify(configs));
  if (!_fbDb || !_isAdmin) return;
  // 全サイトのデータを読み込んでからマージして保存
  _fbDb.collection('masters').doc('roadbed_masters').get()
    .then(doc => {
      const all = (doc.exists && doc.data().data) ? doc.data().data : {};
      all[siteId] = configs;
      return _fbDb.collection('masters').doc('roadbed_masters').set({ data: all, updatedAt: new Date().toISOString() });
    }).catch(e => console.warn('[FB] save err:', e));
}

// ---- AS層操作 ----
function addAsRow(side) {
  const arr = side === 'kari' ? _kariAsRows : _honAsRows;
  arr.push({ role: 'surface', preset: '', custom: '', t: 0 });
  renderAsRows(side);
}
function removeAsRow(side, idx) {
  if (side === 'kari') _kariAsRows.splice(idx, 1); else _honAsRows.splice(idx, 1);
  renderAsRows(side);
  updateTotal(side);
}
function updateAsRow(side, idx, field, value) {
  const arr = side === 'kari' ? _kariAsRows : _honAsRows;
  if (!arr[idx]) return;
  arr[idx][field] = value;
  if (field === 'role') { arr[idx].preset = ''; arr[idx].custom = ''; }
  renderAsRows(side);
  updateTotal(side);
}

function renderAsRows(side) {
  const arr = side === 'kari' ? _kariAsRows : _honAsRows;
  const el  = document.getElementById(side + '-as-rows');
  if (!el) return;
  const f = 'background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:6px 8px;font-size:12px;';
  el.innerHTML = arr.map((a, i) => {
    const role = a.role || 'surface';
    const opts = AS_OPTIONS[role] || AS_OPTIONS.surface;
    const isOther = a.preset === 'その他（自由入力）';
    const rc = role==='surface'?'rgba(79,142,247,0.9)':role==='base'?'rgba(34,197,94,0.9)':'var(--orange)';
    const optHtml = opts.map(o => `<option value="${o}"${a.preset===o?' selected':''}>${o}</option>`).join('');
    const preview = a.preset === 'その他（自由入力）' ? a.custom : a.preset;
    return `<div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 10px;margin-bottom:6px;">
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
        <select style="${f}width:74px;flex-shrink:0;color:${rc};font-weight:700;" onchange="updateAsRow('${side}',${i},'role',this.value)">
          <option value="surface"${role==='surface'?' selected':''}>表層</option>
          <option value="base"${role==='base'?' selected':''}>基層</option>
          <option value="other"${role==='other'?' selected':''}>その他</option>
        </select>
        <select style="${f}flex:1;min-width:110px;" onchange="updateAsRow('${side}',${i},'preset',this.value);document.getElementById('ci-${side}-${i}')&&(document.getElementById('ci-${side}-${i}').style.display=this.value==='その他（自由入力）'?'':'none')">
          <option value="">― 選択 ―</option>${optHtml}
        </select>
        <input id="ci-${side}-${i}" type="text" value="${a.custom||''}" placeholder="材料名"
          style="${f}flex:1;min-width:80px;${isOther?'':'display:none;'}"
          onchange="updateAsRow('${side}',${i},'custom',this.value)">
        <input type="number" value="${a.t||''}" placeholder="mm" min="0" step="5"
          style="${f}width:60px;text-align:right;flex-shrink:0;"
          onchange="updateAsRow('${side}',${i},'t',+this.value);updateTotal('${side}')">
        <span style="font-size:11px;color:var(--text3);flex-shrink:0;">mm</span>
        <button onclick="removeAsRow('${side}',${i})" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:16px;padding:2px 4px;line-height:1;">✕</button>
      </div>
      ${preview||a.t>0?`<div style="font-size:10px;color:var(--text3);margin-top:3px;margin-left:4px;">→ ${preview||'未入力'}${a.t>0?' t='+a.t+'mm':''}</div>`:''}
    </div>`;
  }).join('');
}

function updateTotal(side) {
  const arr = side === 'kari' ? _kariAsRows : _honAsRows;
  const asTotal = arr.reduce((s, a) => s + (a.t || 0), 0);
  const rmH = parseFloat(document.getElementById(side + '-rmh')?.value) || 0;
  const rcH = parseFloat(document.getElementById(side + '-rch')?.value) || 0;
  const total = asTotal + Math.round((rmH + rcH) * 1000);
  const el = document.getElementById(side + '-total');
  if (el) el.innerHTML = `合計 H = <b>${total} mm</b>`;
}

// ---- タブ切替 ----
function switchTab(tab) {
  _currentTab = tab;
  document.getElementById('formKari').style.display = tab === 'kari' ? '' : 'none';
  document.getElementById('formHon').style.display  = tab === 'hon'  ? '' : 'none';
  document.getElementById('tabKari').className = tab === 'kari' ? 'active' : '';
  document.getElementById('tabHon').className  = tab === 'hon'  ? 'active' : '';
}

// ---- 登録・編集・削除 ----
function saveConfig() {
  if (!_selectedSiteId) { showToast('⚠️ 現場を選択してください'); return; }
  if (!_isAdmin) { showToast('⚠️ 管理者ログインが必要です'); return; }
  const label = document.getElementById('rbLabel').value.trim();
  if (!label) { showToast('⚠️ 構成名を入力してください'); return; }
  const color   = document.getElementById('rbColor').value;
  const editKey = document.getElementById('editKey').value;

  const kariAsTotal = _kariAsRows.reduce((s,a) => s + (a.t||0), 0);
  const honAsTotal  = _honAsRows.reduce((s,a) => s + (a.t||0), 0);
  const kariRmH = parseFloat(document.getElementById('kari-rmh').value) || 0;
  const kariRcH = parseFloat(document.getElementById('kari-rch').value) || 0;
  const honRmH  = parseFloat(document.getElementById('hon-rmh').value)  || 0;
  const honRcH  = parseFloat(document.getElementById('hon-rch').value)  || 0;

  const entry = {
    key: editKey || ('rb_' + Date.now()),
    label, color,
    kariAsLayers: _kariAsRows.filter(a => a.preset || a.custom || a.t > 0).map(a => ({
      name: a.preset === 'その他（自由入力）' ? a.custom : a.preset, t: +a.t
    })),
    kariRmSize: parseInt(document.getElementById('kari-rmsize').value) || 0,
    kariRmH, kariRmLayers: document.getElementById('kari-rmlayers').value.trim(),
    kariRcSize: parseInt(document.getElementById('kari-rcsize').value) || 0,
    kariRcH, kariRcLayers: document.getElementById('kari-rclayers').value.trim(),
    kariTotalH: kariAsTotal / 1000 + kariRmH + kariRcH,
    honAsLayers: _honAsRows.filter(a => a.preset || a.custom || a.t > 0).map(a => ({
      name: a.preset === 'その他（自由入力）' ? a.custom : a.preset, t: +a.t
    })),
    honRmSize: parseInt(document.getElementById('hon-rmsize').value) || 0,
    honRmH, honRmLayers: document.getElementById('hon-rmlayers').value.trim(),
    honRcSize: parseInt(document.getElementById('hon-rcsize').value) || 0,
    honRcH, honRcLayers: document.getElementById('hon-rclayers').value.trim(),
    honTotalH: honAsTotal / 1000 + honRmH + honRcH,
    updatedAt: new Date().toISOString().slice(0, 10),
  };

  const configs = getLocalRoadbeds(_selectedSiteId);
  const idx = configs.findIndex(r => r.key === entry.key);
  if (idx >= 0) configs[idx] = entry; else configs.push(entry);
  saveRoadbedsForSite(_selectedSiteId, configs);
  renderConfigList(configs);
  clearForm();
  showToast(`✅「${label}」を登録しました`);
}

function editConfig(key) {
  const configs = getLocalRoadbeds(_selectedSiteId);
  const r = configs.find(x => x.key === key);
  if (!r) return;
  document.getElementById('editKey').value   = r.key;
  document.getElementById('rbLabel').value   = r.label || '';
  document.getElementById('rbColor').value   = r.color || '#4f8ef7';
  document.getElementById('kari-rmsize').value  = r.kariRmSize || 40;
  document.getElementById('kari-rmh').value     = r.kariRmH || '';
  document.getElementById('kari-rmlayers').value= r.kariRmLayers || '';
  document.getElementById('kari-rcsize').value  = r.kariRcSize || 40;
  document.getElementById('kari-rch').value     = r.kariRcH || '';
  document.getElementById('kari-rclayers').value= r.kariRcLayers || '';
  document.getElementById('hon-rmsize').value   = r.honRmSize || 40;
  document.getElementById('hon-rmh').value      = r.honRmH || '';
  document.getElementById('hon-rmlayers').value = r.honRmLayers || '';
  document.getElementById('hon-rcsize').value   = r.honRcSize || 40;
  document.getElementById('hon-rch').value      = r.honRcH || '';
  document.getElementById('hon-rclayers').value = r.honRcLayers || '';
  _kariAsRows = (r.kariAsLayers || []).map(a => ({ role: 'surface', preset: a.preset || '', custom: a.custom || a.name || '', t: a.t || 0 }));
  _honAsRows  = (r.honAsLayers  || []).map(a => ({ role: 'surface', preset: a.preset || '', custom: a.custom || a.name || '', t: a.t || 0 }));
  if (_kariAsRows.length === 0) _kariAsRows = [{ role: 'surface', preset: '', custom: '', t: 0 }];
  if (_honAsRows.length  === 0) _honAsRows  = [{ role: 'surface', preset: '', custom: '', t: 0 }];
  renderAsRows('kari'); renderAsRows('hon');
  updateTotal('kari'); updateTotal('hon');
  document.getElementById('btnCancel').style.display = '';
  document.getElementById('rbLabel').scrollIntoView({ behavior: 'smooth', block: 'center' });
  switchTab('kari');
}

function deleteConfig(key) {
  const configs = getLocalRoadbeds(_selectedSiteId);
  const r = configs.find(x => x.key === key);
  if (!r || !confirm(`「${r.label}」を削除しますか？`)) return;
  saveRoadbedsForSite(_selectedSiteId, configs.filter(x => x.key !== key));
  renderConfigList(getLocalRoadbeds(_selectedSiteId));
  showToast('🗑️ 削除しました');
}

function cancelEdit() {
  clearForm();
}

function clearForm() {
  document.getElementById('editKey').value = '';
  document.getElementById('rbLabel').value = '';
  document.getElementById('rbColor').value = '#4f8ef7';
  ['kari', 'hon'].forEach(s => {
    document.getElementById(s + '-rmsize').value  = '40';
    document.getElementById(s + '-rmh').value     = '';
    document.getElementById(s + '-rmlayers').value= '';
    document.getElementById(s + '-rcsize').value  = '40';
    document.getElementById(s + '-rch').value     = '';
    document.getElementById(s + '-rclayers').value= '';
    document.getElementById(s + '-total').innerHTML = '合計 H = <b>0 mm</b>';
  });
  _kariAsRows = [{ role: 'surface', preset: '', custom: '', t: 0 }];
  _honAsRows  = [{ role: 'surface', preset: '', custom: '', t: 0 }];
  renderAsRows('kari'); renderAsRows('hon');
  document.getElementById('btnCancel').style.display = 'none';
}

// ---- リスト描画 ----
function renderConfigList(configs) {
  const el = document.getElementById('configList');
  const siteName = document.getElementById('siteSelect').options[document.getElementById('siteSelect').selectedIndex]?.text || '';
  document.getElementById('listTitle').textContent = `登録済み路盤構成（${siteName}）`;
  if (!configs || configs.length === 0) {
    el.innerHTML = '<div class="empty-state">📐 まだ登録されていません</div>'; return;
  }
  el.innerHTML = configs.map(r => {
    const kariTotal = Math.round((r.kariTotalH || 0) * 1000);
    const honTotal  = Math.round((r.honTotalH  || 0) * 1000);
    const diff = kariTotal !== honTotal;
    const sub = diff ? `仮:${kariTotal}mm ／ 本:${honTotal}mm` : `H=${kariTotal}mm`;
    const asStr = (r.kariAsLayers||[]).map(a => a.name).filter(Boolean).join(' + ') || '（AS層なし）';
    const adminBtns = _isAdmin
      ? `<button class="btn-sm btn-edit" onclick="editConfig('${r.key}')">編集</button>
         <button class="btn-sm btn-del"  onclick="deleteConfig('${r.key}')">削除</button>`
      : '';
    return `<div class="config-card">
      <div class="color-dot" style="background:${r.color||'#4f8ef7'}"></div>
      <div class="info">
        <div class="name">${r.label}</div>
        <div class="sub">${asStr}　${sub}</div>
      </div>
      <div class="actions">${adminBtns}</div>
    </div>`;
  }).join('');
}

// ---- PDF/画像ビューア ----
async function handleFile(file) {
  if (!file) return;
  const ext = file.name.split('.').pop().toLowerCase();
  if (ext === 'pdf') {
    await loadPdf(file);
  } else {
    loadImage(file);
  }
}

async function loadPdf(file) {
  const buf = await file.arrayBuffer();
  _pdfDoc = await pdfjsLib.getDocument({ data: buf }).promise;
  _pdfTotal = _pdfDoc.numPages;
  _pdfPage  = 1;
  renderPdfPage(_pdfPage);
  document.getElementById('pageNav').style.display = _pdfTotal > 1 ? '' : 'none';
  document.getElementById('pageInfo').textContent = `${_pdfPage} / ${_pdfTotal}`;
}

async function renderPdfPage(pageNum) {
  if (!_pdfDoc) return;
  const page = await _pdfDoc.getPage(pageNum);
  const vp   = page.getViewport({ scale: 1.5 });
  const canvas = document.createElement('canvas');
  canvas.width  = vp.width;
  canvas.height = vp.height;
  const ctx = canvas.getContext('2d');
  await page.render({ canvasContext: ctx, viewport: vp }).promise;
  const va = document.getElementById('viewerArea');
  va.innerHTML = '';
  va.appendChild(canvas);
}

function loadImage(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const va = document.getElementById('viewerArea');
    va.innerHTML = `<img src="${e.target.result}" alt="断面図">`;
    _pdfDoc = null;
    document.getElementById('pageNav').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

function changePage(delta) {
  if (!_pdfDoc) return;
  _pdfPage = Math.max(1, Math.min(_pdfTotal, _pdfPage + delta));
  document.getElementById('pageInfo').textContent = `${_pdfPage} / ${_pdfTotal}`;
  renderPdfPage(_pdfPage);
}

// ---- 管理者UI ----
function updateAdminUI() {
  document.getElementById('adminBadge').style.display = _isAdmin ? '' : 'none';
  document.getElementById('btnAdmin').textContent = _isAdmin ? '🔓' : '🔑';
  document.getElementById('btnAdmin').className = _isAdmin ? 'btn-admin active' : 'btn-admin';
  if (_selectedSiteId) renderConfigList(getLocalRoadbeds(_selectedSiteId));
}

function onAdminBtn() {
  if (_isAdmin) { if (confirm('ログアウトしますか？')) _fbAuth.signOut(); }
  else { document.getElementById('loginModal').classList.add('open'); }
}

function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;
  _fbAuth.signInWithEmailAndPassword(email, pass)
    .then(() => { closeModal(); showToast('✅ 管理者ログイン成功'); })
    .catch(e => showToast('❌ ' + e.message));
}

function closeModal() {
  document.getElementById('loginModal').classList.remove('open');
  document.getElementById('loginPass').value = '';
}

// ---- トースト ----
function showToast(msg, duration = 2500) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), duration);
}

// ---- 初期化 ----
window.addEventListener('DOMContentLoaded', () => {
  _kariAsRows = [{ role: 'surface', preset: '', custom: '', t: 0 }];
  _honAsRows  = [{ role: 'surface', preset: '', custom: '', t: 0 }];
  renderAsRows('kari');
  renderAsRows('hon');
  initFirebase();
});
</script>
